 ARE YOU UP TO?\nWhat is he really doing?","sourceUid":"merged-mrm8bkfy-215","sourceNo":670,"viRanges":[{"start":2493.596131,"end":2506.744083}],"koRanges":[{"start":2506.947239,"end":2519.546983}]},{"id":679,"readerNo":680,"displayNo":672,"n":672,"kind":"sub","type":"merged","vi":"[Tiếng mở cửa]\n[Tiếng đóng cửa]","ko":"[문 여는 소리]\n[문 닫는 소리]","en":"[Sound of door opening]\n[Sound of door closing]","text":"[Tiếng mở cửa]\n[Tiếng đóng cửa]\n[문 여는 소리]\n[문 닫는 소리]\n[Sound of door opening]\n[Sound of door closing]","sourceUid":"merged-mrm8don0-217","sourceNo":672,"viRanges":[],"koRanges":[]},{"id":680,"readerNo":681,"displayNo":"N509","n":"N509","kind":"narration","type":"dialogue","vi":"Song Ji-won: (ném điện thoại di động của mình đi)...","ko":"송지원: (자기 핸드폰을 툭 던져준다)···.","en":"Song Ji-won: (throws away his cell phone)...","text":"Song Ji-won: (ném điện thoại di động của mình đi)...\n송지원: (자기 핸드폰을 툭 던져준다)···.\nSong Ji-won: (throws away his cell phone)...","sourceUid":"nar-mrnkrdqe-2obxi1","sourceNo":"N509","viRanges":[],"koRanges":[]},{"id":681,"readerNo":682,"displayNo":"N510","n":"N510","kind":"narration","type":"narration","vi":"Jeong Ye-eun nhìn vào điện thoại di động của Song Ji-won.","ko":"정예은이 송지원의 핸드폰을 본다.","en":"Jeong Ye-eun looks at Song Ji-won's cell phone.","text":"Jeong Ye-eun nhìn vào điện thoại di động của Song Ji-won.\n정예은이 송지원의 핸드폰을 본다.\nJeong Ye-eun looks at Song Ji-won's cell phone.","sourceUid":"nar-mrnkree5-cfm5y8","sourceNo":"N510","viRanges":[],"koRanges":[]},{"id":682,"readerNo":683,"displayNo":679,"n":679,"kind":"sub","type":"merged","vi":"Nhỏ bạn giới thiệu người ấy cho tớ nhắn tin đến. Bạn ấy nói gì? CẬU ẤY THẤY CẬU RẤT TỐT VÀ THÚ VỊ… NHƯNG CHỈ MUỐN LÀM BẠN THÔI. Cậu ấy không coi tớ là con gái. Vì sao? Tớ chưa đủ nữ tính à? Hay tớ tiêm thêm estrogen nhỉ?","ko":"왜 그래? 방금 중매쟁이한테 문자 왔어 뭐라고? 재미있고 좋은 사람인 건 알겠는데... 그냥 친구로 지내고 싶단다 내가 여자로 느껴지지 않는대 왜? 나 여성호르몬이 부족한가? 호르몬 주사 맞을까?","en":"I got a text from my friend who set me up with him.\nWhat did it say?\nHe thinks you're a fun and nice person... but just wants to be friends.\nHe doesn't like me as a girl.\nWhy? Am I not girly enough?\nShould I take estrogen or something?","text":"Nhỏ bạn giới thiệu người ấy cho tớ nhắn tin đến. Bạn ấy nói gì? CẬU ẤY THẤY CẬU RẤT TỐT VÀ THÚ VỊ… NHƯNG CHỈ MUỐN LÀM BẠN THÔI. Cậu ấy không coi tớ là con gái. Vì sao? Tớ chưa đủ nữ tính à? Hay tớ tiêm thêm estrogen nhỉ?\n왜 그래? 방금 중매쟁이한테 문자 왔어 뭐라고? 재미있고 좋은 사람인 건 알겠는데... 그냥 친구로 지내고 싶단다 내가 여자로 느껴지지 않는대 왜? 나 여성호르몬이 부족한가? 호르몬 주사 맞을까?\nI got a text from my friend who set me up with him.\nWhat did it say?\nHe thinks you're a fun and nice person... but just wants to be friends.\nHe doesn't like me as a girl.\nWhy? Am I not girly enough?\nShould I take estrogen or something?","sourceUid":"merged-mrm8fkl8-220","sourceNo":679,"viRanges":[{"start":2506.744083,"end":2538.446705}],"koRanges":[{"start":2519.546983,"end":2551.324}]},{"id":683,"readerNo":684,"displayNo":683,"n":683,"kind":"sub","type":"merged","vi":"Hay tớ bị rối loạn nhiễm sắc thể?\nBảo sao dạo này lông rậm hơn.\nCậu nhìn đi. Tớ có trái cổ nè.\nCậu đã giả giọng lúc xem mắt đúng không?\nLẽ nào…\ncậu làm cả thế này?\nCậu làm vậy chứ gì.\nNhưng cậu ấy thích mà.","ko":"허... 혹시 나 XXY인 거 아냐? 어쩐지 요새 솜털이 굵어지는 게... 봐 봐 나 목젖 나왔어? 어? 너 소개팅 할 때 성대모사 했지? 혹시... 이것도 했어?\n하셨네요 그렇지만 좋아했단 말이야","en":"Am I a genetic freak?\nI knew my peach fuzz was getting thicker.\nLook, I have an Adam's apple.\nYou did an impersonation, didn't you?\nDid you...\ndo this too?\nYou did.\nBut he liked it.","text":"Hay tớ bị rối loạn nhiễm sắc thể?\nBảo sao dạo này lông rậm hơn.\nCậu nhìn đi. Tớ có trái cổ nè.\nCậu đã giả giọng lúc xem mắt đúng không?\nLẽ nào…\ncậu làm cả thế này?\nCậu làm vậy chứ gì.\nNhưng cậu ấy thích mà.\n허... 혹시 나 XXY인 거 아냐? 어쩐지 요새 솜털이 굵어지는 게... 봐 봐 나 목젖 나왔어? 어? 너 소개팅 할 때 성대모사 했지? 혹시... 이것도 했어?\n하셨네요 그렇지만 좋아했단 말이야\nAm I a genetic freak?\nI knew my peach fuzz was getting thicker.\nLook, I have an Adam's apple.\nYou did an impersonation, didn't you?\nDid you...\ndo this too?\nYou did.\nBut he liked it.","sourceUid":"merged-mrm8g7vl-224","sourceNo":683,"viRanges":[{"start":2538.446705,"end":2559.313916}],"koRanges":[{"start":2551.324,"end":2575.614745}]},{"id":684,"readerNo":685,"displayNo":"N511","n":"N511","kind":"narration","type":"dialogue","vi":"Song Ji-won: (làm mặt khó hiểu)...","ko":"송지원: (애매한 얼굴이 된다)···.","en":"Song Ji-won: (makes an ambiguous face)...","text":"Song Ji-won: (làm mặt khó hiểu)...\n송지원: (애매한 얼굴이 된다)···.\nSong Ji-won: (makes an ambiguous face)...","sourceUid":"nar-mrnks3uo-kk393u","sourceNo":"N511","viRanges":[],"koRanges":[]},{"id":685,"readerNo":686,"displayNo":691,"n":691,"kind":"sub","type":"merged","vi":"- Bọn tớ nói chuyện rất hợp rơ. - Trời.\nCậu nói mấy phần và cậu ấy nói mấy phần?\n/50?\n/40?\n/30?\nChính xác là 75/25.\nĐấy là trò chuyện hả? Rõ ràng là giảng đạo.\nVậy tớ phải làm sao? Tớ chỉ cố phá vỡ khoảng lặng thôi.","ko":"얘기도 잘 통하고 아휴... 그 남자랑 너랑 토크 비율이 몇 대 몇이었어? 대 5? 대 4? 대 3? 정확하게는 7.5 대 2.5? 그게 대화야? 강의지 아, 몰라... 그럼 중간에 침묵이 흐르는데 어쩌라고","en":"-He was easy to talk to. -Gosh. How much did you talk and how much did he talk? /50? /40? /30? /25, to be exact. That's not a conversation. It's a lecture.\nWhat was I supposed to do? I had to fill the silence.","text":"- Bọn tớ nói chuyện rất hợp rơ. - Trời.\nCậu nói mấy phần và cậu ấy nói mấy phần?\n/50?\n/40?\n/30?\nChính xác là 75/25.\nĐấy là trò chuyện hả? Rõ ràng là giảng đạo.\nVậy tớ phải làm sao? Tớ chỉ cố phá vỡ khoảng lặng thôi.\n얘기도 잘 통하고 아휴... 그 남자랑 너랑 토크 비율이 몇 대 몇이었어? 대 5? 대 4? 대 3? 정확하게는 7.5 대 2.5? 그게 대화야? 강의지 아, 몰라... 그럼 중간에 침묵이 흐르는데 어쩌라고\n-He was easy to talk to. -Gosh. How much did you talk and how much did he talk? /50? /40? /30? /25, to be exact. That's not a conversation. It's a lecture.\nWhat was I supposed to do? I had to fill the silence.","sourceUid":"merged-mrm8vd56-230","sourceNo":691,"viRanges":[{"start":2559.313916,"end":2593.500326},{"start":2559.313916,"end":2568.775685}],"koRanges":[{"start":2575.614745,"end":2607.214201},{"start":2575.614745,"end":2584.954972}]},{"id":686,"readerNo":687,"displayNo":702,"n":702,"kind":"sub","type":"merged","vi":"Nếu ngừng nói còn sượng hơn.\nTớ không hiểu tại sao mọi người chịu được sự im lặng đó.\nTrời ạ.\nTại sao anh ấy không gọi lại?","ko":"말 끊기면 얼마나 어색한데\n아휴... 남들은 그 침묵을 어떻게 견디나 몰라\n에이씨...\n아유!\n아니 왜 연락을 안 해?","en":"Once there's a silence, it gets so awkward.\nI don't know how people put up with that silence.\nJeez.\nWhy doesn't he get back to me?","text":"Nếu ngừng nói còn sượng hơn.\nTớ không hiểu tại sao mọi người chịu được sự im lặng đó.\nTrời ạ.\nTại sao anh ấy không gọi lại?\n말 끊기면 얼마나 어색한데\n아휴... 남들은 그 침묵을 어떻게 견디나 몰라\n에이씨...\n아유!\n아니 왜 연락을 안 해?\nOnce there's a silence, it gets so awkward.\nI don't know how people put up with that silence.\nJeez.\nWhy doesn't he get back to me?","sourceUid":"merged-mrm8y57n-238","sourceNo":702,"viRanges":[{"start":2593.500326,"end":2615.093051}],"koRanges":[{"start":2607.214201,"end":2630.004586}]},{"id":687,"readerNo":688,"displayNo":707,"n":707,"kind":"sub","type":"merged","vi":"Sinh viên gì bận dữ vậy? Anh ấy còn chẳng học.\nAnh ấy có thời gian với bạn bè nhưng không rảnh trò chuyện với tớ.\nCậu biết điều tớ ghét nhất là gì không?\nLà ký hiệu \"chưa đọc\" đáng ghét ấy.","ko":"학생이 뭐가 그렇게 바빠? 공부도 안 하면서 친구들이랑 놀 시간은 있고 나한테 연락할 시간은 없다 이거지... 치! 내가 제일 싫어하는 숫자가 뭔지 알아?\n이야. 1... 지긋지긋한 1","en":"Why would a student be so busy? He doesn't even study.\nHe has time to be with his friends, but he has no time to talk to me.\nDo you know what I hate the most?\nThe \"unread\" sign.","text":"Sinh viên gì bận dữ vậy? Anh ấy còn chẳng học.\nAnh ấy có thời gian với bạn bè nhưng không rảnh trò chuyện với tớ.\nCậu biết điều tớ ghét nhất là gì không?\nLà ký hiệu \"chưa đọc\" đáng ghét ấy.\n학생이 뭐가 그렇게 바빠? 공부도 안 하면서 친구들이랑 놀 시간은 있고 나한테 연락할 시간은 없다 이거지... 치! 내가 제일 싫어하는 숫자가 뭔지 알아?\n이야. 1... 지긋지긋한 1\nWhy would a student be so busy? He doesn't even study.\nHe has time to be with his friends, but he has no time to talk to me.\nDo you know what I hate the most?\nThe \"unread\" sign.","sourceUid":"merged-mrm943u5-242","sourceNo":707,"viRanges":[{"start":2615.093051,"end":2629.550385}],"koRanges":[{"start":2630.004586,"end":2645.093376}]},{"id":688,"readerNo":689,"displayNo":497,"n":497,"kind":"sub","type":"merged","vi":"- Sao? - Tên khốn.\nNgón tay gãy rồi hay sao mà không gọi lại?\nLúc anh ta theo đuổi tớ,\nsáng trưa chiều tối anh ấy đều bám lấy tớ.\nTình yêu ấy đã nhạt phai.\nChắc chắn anh ta có mối mới.","ko":"왜?\n망할 놈의 시키\n손가락이 부러졌나 왜 연락을 안 해!\n나 좋다고 쫓아 다닐 땐 아침, 점심, 저녁\n밥 먹었어? 뭐 먹었어?\n꼭꼭 씹어 먹었어? 잘도 물어보더니...\n맘이 식었어\n딴 년 생긴 게야","en":"-What? -That bastard. Are his fingers broken? Why can't he contact me? When he was into me, he wanted to be with me all day long. He's not into me any more, he has someone else.","text":"- Sao? - Tên khốn.\nNgón tay gãy rồi hay sao mà không gọi lại?\nLúc anh ta theo đuổi tớ,\nsáng trưa chiều tối anh ấy đều bám lấy tớ.\nTình yêu ấy đã nhạt phai.\nChắc chắn anh ta có mối mới.\n왜?\n망할 놈의 시키\n손가락이 부러졌나 왜 연락을 안 해!\n나 좋다고 쫓아 다닐 땐 아침, 점심, 저녁\n밥 먹었어? 뭐 먹었어?\n꼭꼭 씹어 먹었어? 잘도 물어보더니...\n맘이 식었어\n딴 년 생긴 게야\n-What? -That bastard. Are his fingers broken? Why can't he contact me? When he was into me, he wanted to be with me all day long. He's not into me any more, he has someone else.","sourceUid":"merged-mrm95q25-243","sourceNo":497,"viRanges":[{"start":2629.550385,"end":2649.986928}],"koRanges":[{"start":2645.093376,"end":2664.841947}]},{"id":689,"readerNo":690,"displayNo":501,"n":501,"kind":"sub","type":"merged","vi":"Bao giờ tớ mới được nói những câu này?\nChẳng qua cậu không biết thôi.\nCậu đơn độc nhất khi có biển người vây quanh.\nVà thấy trống trải nhất khi sống trong sự sung túc.\nCậu vẫn cô đơn kể cả khi có bồ…","ko":"난 언제 이런 말 해보나?\n아휴, 네가 뭘 몰라서 그래\n고독 중의 고독은 군중 속의 고독이고\n빈곤 중의 빈곤은 풍요 속의 빈곤이고\n애인이 있는데도 외로운...","en":"When will I ever get to say that? You just don't know. You're loneliest when you have people. You feel lacking when you have things. You're lonely when you have a boyfriend...","text":"Bao giờ tớ mới được nói những câu này?\nChẳng qua cậu không biết thôi.\nCậu đơn độc nhất khi có biển người vây quanh.\nVà thấy trống trải nhất khi sống trong sự sung túc.\nCậu vẫn cô đơn kể cả khi có bồ…\n난 언제 이런 말 해보나?\n아휴, 네가 뭘 몰라서 그래\n고독 중의 고독은 군중 속의 고독이고\n빈곤 중의 빈곤은 풍요 속의 빈곤이고\n애인이 있는데도 외로운...\nWhen will I ever get to say that? You just don't know. You're loneliest when you have people. You feel lacking when you have things. You're lonely when you have a boyfriend...","sourceUid":"merged-mrm98lou-246","sourceNo":501,"viRanges":[{"start":2649.986928,"end":2677.491888},{"start":2649.986928,"end":2671.990663}],"koRanges":[{"start":2664.841947,"end":2692.598784}]},{"id":690,"readerNo":691,"displayNo":719,"n":719,"kind":"sub","type":"merged","vi":"[Thở dài]\n[cười]","ko":"[한숨 쉰다]\n[피식 웃는다]","en":"[Sighs]\n[laughter]","text":"[Thở dài]\n[cười]\n[한숨 쉰다]\n[피식 웃는다]\n[Sighs]\n[laughter]","sourceUid":"merged-mrm98p2b-247","sourceNo":719,"viRanges":[],"koRanges":[]},{"id":691,"readerNo":692,"displayNo":725,"n":725,"kind":"sub","type":"merged","vi":"[Thở dài]\n[Báo động văn bản]","ko":"[한숨 쉰다]\n[문자 알람]","en":"[Sighs]\n[Text Alarm]","text":"[Thở dài]\n[Báo động văn bản]\n[한숨 쉰다]\n[문자 알람]\n[Sighs]\n[Text Alarm]","sourceUid":"merged-mrm9apfx-249","sourceNo":725,"viRanges":[],"koRanges":[]},{"id":692,"readerNo":693,"displayNo":727,"n":727,"kind":"sub","type":"merged","vi":"","ko":"[문자 알람]","en":"","text":"[문자 알람]","sourceUid":"ko-mrli6nmw-1462","sourceNo":727,"viRanges":[],"koRanges":[]},{"id":693,"readerNo":694,"displayNo":"N512","n":"N512","kind":"narration","type":"narration","vi":". Phòng khách (ban đêm)","ko":". 거실(밤)","en":". Living room (night)","text":". Phòng khách (ban đêm)\n. 거실(밤)\n. Living room (night)","sourceUid":"nar-mrnl8sib-zoluzw","sourceNo":"N512","viRanges":[],"koRanges":[]},{"id":694,"readerNo":695,"displayNo":"N513","n":"N513","kind":"narration","type":"narration","vi":"Jeong Ye-eun xuất hiện với phong cách trang điểm hoa văn.","ko":"꽃단장을 한 정예은이 나온다.","en":"Jeong Ye-eun appears in a flowery make-up.","text":"Jeong Ye-eun xuất hiện với phong cách trang điểm hoa văn.\n꽃단장을 한 정예은이 나온다.\nJeong Ye-eun appears in a flowery make-up.","sourceUid":"nar-mrnl8u54-mo0vtp","sourceNo":"N513","viRanges":[],"koRanges":[]},{"id":695,"readerNo":696,"displayNo":"N514","n":"N514","kind":"narration","type":"narration","vi":"Tôi đang định xỏ giày, kiểm tra những lọn tóc trên tóc thì nhận được tin nhắn KakaoTalk.","ko":"머리의 컬을 확인하며 신발을 신으려는데, 카톡이 온다.","en":"I was about to put my shoes on, checking the curls in my hair, when I got a KakaoTalk message.","text":"Tôi đang định xỏ giày, kiểm tra những lọn tóc trên tóc thì nhận được tin nhắn KakaoTalk.\n머리의 컬을 확인하며 신발을 신으려는데, 카톡이 온다.\nI was about to put my shoes on, checking the curls in my hair, when I got a KakaoTalk message.","sourceUid":"nar-mrnl8uys-a6xtl1","sourceNo":"N514","viRanges":[],"koRanges":[]},{"id":696,"readerNo":697,"displayNo":"N515","n":"N515","kind":"narration","type":"narration","vi":"'Tôi không thể làm điều này. Bầu không khí giống như một làn sóng.","ko":"‘안 되겠다. 파장 분위기다.","en":"‘I can’t do this. The atmosphere is like a wave.","text":"'Tôi không thể làm điều này. Bầu không khí giống như một làn sóng.\n‘안 되겠다. 파장 분위기다.\n‘I can’t do this. The atmosphere is like a wave.","sourceUid":"nar-mrnl8wdf-9wt56u","sourceNo":"N515","viRanges":[],"koRanges":[]},{"id":697,"readerNo":698,"displayNo":729,"n":729,"kind":"sub","type":"merged","vi":"Anh đang ở Hongdae. Em qua đây không?\nMà thôi. Có vẻ mọi người sắp giải tán rồi. Để lần sau nhé.","ko":"홍대 앞인데, 올래?\n안 되겠다. 파장 분위기다\n다음에 보자","en":"I'm at Hongdae. Do you want to come?\nIt looks like everyone's leaving, let's get together next time.","text":"Anh đang ở Hongdae. Em qua đây không?\nMà thôi. Có vẻ mọi người sắp giải tán rồi. Để lần sau nhé.\n홍대 앞인데, 올래?\n안 되겠다. 파장 분위기다\n다음에 보자\nI'm at Hongdae. Do you want to come?\nIt looks like everyone's leaving, let's get together next time.","sourceUid":"merged-mr 피곤했는데\n내가 노예야? 대기조야?","en":"What? You do whatever you want. It's really annoying.\nGood.\n- I was tired. -You think I wait around for you?","text":"Cái gì? Anh chỉ biết làm theo ý anh thôi. Em bực rồi.\nVừa hay.\n- Em mệt rồi. - Em là con sen chờ anh sai việc à?\n뭐야? 이랬다저랬다 자기 마음대로야. 진짜 짜증 나\n잘됐네, 나도 피곤했는데\n내가 노예야? 대기조야?\nWhat? You do whatever you want. It's really annoying.\nGood.\n- I was tired. -You think I wait around for you?","sourceUid":"merged-mrm9dkuj-254","sourceNo":732,"viRanges":[{"start":2696.092377,"end":2722.944352}],"koRanges":[{"start":2711.897484,"end":2737.875219}]},{"id":703,"readerNo":704,"displayNo":"N520","n":"N520","kind":"narration","type":"narration","vi":"Kang Ina bước ra khỏi phòng.","ko":"강이나가 방에서 나온다.","en":"Kang Ina comes out of the room.","text":"Kang Ina bước ra khỏi phòng.\n강이나가 방에서 나온다.\nKang Ina comes out of the room.","sourceUid":"nar-mrnlcyyk-541crz","sourceNo":"N520","viRanges":[],"koRanges":[]},{"id":704,"readerNo":705,"displayNo":"738","n":"738","kind":"sub","type":"merged","vi":"Giữa đêm mà anh gọi thì em vẫn phải cun cút mò đến à?\nAnh rước thẻ của anh về đi. Em không dùng đâu.\nThôi đi. Đấy là vấn đề của anh. Em không thể ra ngoài. Không đi đâu.\nCúp đi. Em không nói lâu được. Em đi ngủ đây. Đừng gọi em.","ko":"오빠가 오라고 하면 한밤중에라도 뛰쳐나가야 돼?\n그럴 거면 카드 가져가 오빠 카드 안 써 아 됐어.\n그건 오빠 사정이고...\n난 못 나가. 안 나가!\n끊어. 나 지금 통화 길게 못 해\n잘 거니까, 연락하지 마!","en":"Do I have to run out to see you whenever you call?\nThen take the credit card, I don't want to use it.\nNo, that's your problem. I can't go. I won't.\nI have to go. I'm going to bed. Don't call me.","text":"Giữa đêm mà anh gọi thì em vẫn phải cun cút mò đến à?\nAnh rước thẻ của anh về đi. Em không dùng đâu.\nThôi đi. Đấy là vấn đề của anh. Em không thể ra ngoài. Không đi đâu.\nCúp đi. Em không nói lâu được. Em đi ngủ đây. Đừng gọi em.\n오빠가 오라고 하면 한밤중에라도 뛰쳐나가야 돼?\n그럴 거면 카드 가져가 오빠 카드 안 써 아 됐어.\n그건 오빠 사정이고...\n난 못 나가. 안 나가!\n끊어. 나 지금 통화 길게 못 해\n잘 거니까, 연락하지 마!\nDo I have to run out to see you u got scratched.","text":"Lúc nào cũng chị chị em em ngọt xớt nhưng tôi biết thừa là nó dè bỉu tôi.\nSao thế? Chú cũng nghĩ là tôi bị điên à? Cô bị trầy ở đây này.\n겉으로는 언니언니 하면서\n속으로는 삐쭉거리는 거 내가 모를 줄 알아요...\n왜요? 아저씨도 내가 미친년 같아요? 여기... 긁혔네\nShe acts so friendly, but I know she doesn't like me. What?\nDo you think I'm crazy too? You got scratched.","sourceUid":"merged-mrmvbfa5-6","sourceNo":545,"viRanges":[{"start":2854.126355,"end":2870.127451}],"koRanges":[{"start":2870.147846,"end":2891.600336}]},{"id":750,"readerNo":751,"displayNo":"N557","n":"N557","kind":"narration","type":"narration","vi":". Quán bar (đêm)","ko":". 바(밤)","en":". Bar (night)","text":". Quán bar (đêm)\n. 바(밤)\n. Bar (night)","sourceUid":"nar-mrnm9sr1-2f6khq","sourceNo":"N557","viRanges":[],"koRanges":[]},{"id":751,"readerNo":752,"displayNo":"N558","n":"N558","kind":"narration","type":"dialogue","vi":"Kang Ina: Tôi muốn giết một nửa trong số các bạn nhưng tôi đã kìm lại được.","ko":"강이나: 반 죽여놓을래다가 참았어요.","en":"Kang Ina: I wanted to kill half of you, but I held back.","text":"Kang Ina: Tôi muốn giết một nửa trong số các bạn nhưng tôi đã kìm lại được.\n강이나: 반 죽여놓을래다가 참았어요.\nKang Ina: I wanted to kill half of you, but I held back.","sourceUid":"nar-mrnm9tin-vk2q8p","sourceNo":"N558","viRanges":[],"koRanges":[]},{"id":752,"readerNo":753,"displayNo":"N559","n":"N559","kind":"narration","type":"narration","vi":"Như mọi khi, Kang Ina và Oh Jong-gyu ngồi cách nhau một ghế.","ko":"늘 그렇듯 한 자리 떨어져 앉은 강이나와 오종규.","en":"As always, Kang Ina and Oh Jong-gyu sat one seat apart.","text":"Như mọi khi, Kang Ina và Oh Jong-gyu ngồi cách nhau một ghế.\n늘 그렇듯 한 자리 떨어져 앉은 강이나와 오종규.\nAs always, Kang Ina and Oh Jong-gyu sat one seat apart.","sourceUid":"nar-mrnm9uyf-t5rv63","sourceNo":"N559","viRanges":[],"koRanges":[]},{"id":753,"readerNo":754,"displayNo":"N560","n":"N560","kind":"narration","type":"narration","vi":"Người phục vụ đang lau ly rượu.","ko":"바텐더는 와인 잔을 닦고 있다.","en":"The bartender is cleaning wine glasses."," .\nCảnh đẹp lắm. Nhất là cảnh đêm.","ko":"어때? 좋네\n몸만 들어오면 돼\n누가 쓰던 거야? 아, 오해하지 마\n가끔 친구들하고 포커치고 놀 때... 찝찝하면 바꿔. 바꿔줄게\n뷰도 좋아\n밤 되면 야경도 볼 수 있어...","en":"What do you think? It's good. All you have to do is to move in. Whose room was it?\nDon't get me wrong. Whenever I want to play poker with some friends...\nYou can change whatever you want to. The view is nice, too. Especially at night.","text":"Em thấy thế nào? Đẹp đấy. Em chỉ cần dọn vào ở thôi.\nPhòng này của ai? Em đừng hiểu lầm anh.\nKhi anh muốn đánh bài với bạn… Nếu em không ưng thì anh đổi phòng cho.\nCảnh đẹp lắm. Nhất là cảnh đêm.\n어때? 좋네\n몸만 들어오면 돼\n누가 쓰던 거야? 아, 오해하지 마\n가끔 친구들하고 포커치고 놀 때... 찝찝하면 바꿔. 바꿔줄게\n뷰도 좋아\n밤 되면 야경도 볼 수 있어...\nWhat do you think? It's good. All you have to do is to move in. Whose room was it?\nDon't get me wrong. Whenever I want to play poker with some friends...\nYou can change whatever you want to. The view is nice, too. Especially at night.","sourceUid":"merged-mrmvfs8f-8","sourceNo":796,"viRanges":[{"start":2887,"end":2915.624405}],"koRanges":[{"start":2903,"end":2936.025914}]},{"id":766,"readerNo":767,"displayNo":"N570","n":"N570","kind":"narration","type":"dialogue","vi":"Kang Ina: (Dù sao thì, nhìn quanh phòng tắm và mở nước trong bồn rửa)...","ko":"강이나: (그러거나 말거나 화장실도 구경하고 싱크대 물도 틀어본다)···.","en":"Kang Ina: (Anyway, look around the bathroom and turn on the water in the sink)...","text":"Kang Ina: (Dù sao thì, nhìn quanh phòng tắm và mở nước trong bồn rửa)...\n강이나: (그러거나 말거나 화장실도 구경하고 싱크대 물도 틀어본다)···.\nKang Ina: (Anyway, look around the bathroom and turn on the water in the sink)...","sourceUid":"nar-mrnmbg45-nhuze5","sourceNo":"N570","viRanges":[],"koRanges":[]},{"id":767,"readerNo":768,"displayNo":"N571","n":"N571","kind":"narration","type":"dialogue","vi":"Jang Seon-ho: (Kéo rèm lại) Quang cảnh cũng đẹp.","ko":"장선호: (커튼을 젖히며) 뷰도 좋아.","en":"Jang Seon-ho: (Pulling back the curtain) The view is nice too.","text":"Jang Seon-ho: (Kéo rèm lại) Quang cảnh cũng đẹp.\n장선호: (커튼을 젖히며) 뷰도 좋아.\nJang Seon-ho: (Pulling back the curtain) The view is nice too.","sourceUid":"nar-mrnmbjli-tsuhmd","sourceNo":"N571","viRanges":[],"koRanges":[]},{"id":768,"readerNo":769,"displayNo":"N572","n":"N572","kind":"narration","type":"narration","vi":"Vào ban đêm, cảnh đêm...","ko":"밤 되면 야경이···.","en":"At night, the night view...","text":"Vào ban đêm, cảnh đêm...\n밤 되면 야경이···.\nAt night, the night view...","sourceUid":"nar-mrnmbmwa-1waenl","sourceNo":"N572","viRanges":[],"koRanges":[]},{"id":769,"readerNo":770,"displayNo":"805","n":"805","kind":"sub","type":"merged","vi":"Em có thể uống rượu ở đây. Chúng ta có thể gặp nhau bất kỳ lúc nào.\nCũng không cần để ý ánh mắt dò xét của người khác.\nCó lúc em không thể nghe máy, anh cũng không thể gọi thường xuyên.\nEm sẽ dọn về đây chứ? Em sẽ cân nhắc. Em suy nghĩ gì nữa?","ko":"여기서 와인도 마실 수 있고... 보고 싶을 땐 언제든 볼 수 있고... 지금은 그렇잖아 다른 사람들 눈치 보인다고 통화 안 될 때도 있고 연락 안 될 때는 너무 많고 이사 올 거지? 생각 좀 해 보고... 생각할 게 뭐 있어?","en":"You can have wine here. We can see each other whenever we want to.\nWe don't have to care about other people this way.\nSometimes you can't talk on the phone, I can't reach you too often.\nYou'll move in, right? I'll think about it. What's there to think?","text":"Em có thể uống rượu ở đây. Chúng ta có thể gặp nhau bất kỳ lúc nào.\nCũng không cần để ý ánh mắt dò xét của người khác.\nCó lúc em không thể nghe máy, anh cũng không thể gọi thường xuyên.\nEm sẽ dọn về đây chứ? Em sẽ cân nhắc. Em suy nghĩ gì nữa?\n여기서 와인도 마실 수 있고... 보고 싶을 땐 언제든 볼 수 있고... 지금은 그렇잖아 다른 사람들 눈치 보인다고 통화 안 될 때도 있고 연락 안 될 때는 너무 많고 이사 올 거지? 생각 좀 해 보고... 생각할 게 뭐 있어?\nYou can have wine here. We can see each other whenever we want to.\nWe don't have to care about other people this way.\nSometimes you can't talk on the phone, I can't reach you too often.\nYou'll move in, right? I'll think about it. What's there to think?","sourceUid":"merged-mrmvi85h-9","sourceNo":805,"viRanges":[{"start":2915.624405,"end":2941.198277}],"koRanges":[{"start":2936.025914,"en  ít khách hàng hơn, hãy đổ nước vào ấm và thêm chanh thái lát.","ko":"손님이 뜸한 시간을 이용해서 주전자에 물을 채우고 레몬을 슬라이스 해서 집어넣는다.","en":"When there are fewer customers, fill the kettle with water and add sliced ​​lemons.","text":"Khi có ít khách hàng hơn, hãy đổ nước vào ấm và thêm chanh thái lát.\n손님이 뜸한 시간을 이용해서 주전자에 물을 채우고 레몬을 슬라이스 해서 집어넣는다.\nWhen there are fewer customers, fill the kettle with water and add sliced ​​lemons.","sourceUid":"nar-mrnmj25m-z12opy","sourceNo":"N609","viRanges":[],"koRanges":[]},{"id":819,"readerNo":820,"displayNo":"N610","n":"N610","kind":"narration","type":"narration","vi":"Khi chuyện đó kết thúc, tôi cất ly rượu của mình đi và khẽ thở dài mà không hề nhận ra.","ko":"그 일이 끝나자 와인 잔을 정리하다가 자기도 모르게 작은 한숨을 쉰다.","en":"When that was over, I put away my wine glass and let out a small sigh without realizing it.","text":"Khi chuyện đó kết thúc, tôi cất ly rượu của mình đi và khẽ thở dài mà không hề nhận ra.\n그 일이 끝나자 와인 잔을 정리하다가 자기도 모르게 작은 한숨을 쉰다.\nWhen that was over, I put away my wine glass and let out a small sigh without realizing it.","sourceUid":"nar-mrnmj3gu-lhy4zc","sourceNo":"N610","viRanges":[],"koRanges":[]},{"id":820,"readerNo":821,"displayNo":"860","n":"860","kind":"sub","type":"merged","vi":"Em có đang bận không? Giúp tôi một tay. Vâng. Hãy ngồi xuống kia.\nEm ăn đi. Đồ ngọt giúp giải tỏa tâm trạng. Nhìn tôi mệt mỏi lắm à?\nTại sao hôm nay em đuối sức sớm vậy?","ko":"지금 안 바쁘죠? 나 좀 도와줘요\n예... 저기 앉아봐요\n먹어요\n힘들 때 단 거 먹으면 좀 풀리잖아요\n내가 그렇게 힘들어 보였어요? 오늘은 왜 그렇게 일찍 지쳤어요?","en":"You're not busy, are you? Help me with something. Okay.\nHave a seat over there. Eat. Desserts always make things better.\nDid I look that tired? Why did you get tired so fast today?","text":"Em có đang bận không? Giúp tôi một tay. Vâng. Hãy ngồi xuống kia.\nEm ăn đi. Đồ ngọt giúp giải tỏa tâm trạng. Nhìn tôi mệt mỏi lắm à?\nTại sao hôm nay em đuối sức sớm vậy?\n지금 안 바쁘죠? 나 좀 도와줘요\n예... 저기 앉아봐요\n먹어요\n힘들 때 단 거 먹으면 좀 풀리잖아요\n내가 그렇게 힘들어 보였어요? 오늘은 왜 그렇게 일찍 지쳤어요?\nYou're not busy, are you? Help me with something. Okay.\nHave a seat over there. Eat. Desserts always make things better.\nDid I look that tired? Why did you get tired so fast today?","sourceUid":"merged-mrmwldum-45","sourceNo":860,"viRanges":[{"start":3163,"end":3201.130149},{"start":3163,"end":3193.038685}],"koRanges":[{"start":3178,"end":3216.344324},{"start":3178,"end":3194.015052}]},{"id":821,"readerNo":822,"displayNo":"N611","n":"N611","kind":"narration","type":"narration","vi":". Kho lương thực (ban đêm)","ko":". 식자재 창고(밤)","en":". Food warehouse (night)","text":". Kho lương thực (ban đêm)\n. 식자재 창고(밤)\n. Food warehouse (night)","sourceUid":"nar-mrnmlyke-8nw33j","sourceNo":"N611","viRanges":[],"koRanges":[]},{"id":822,"readerNo":823,"displayNo":"N612","n":"N612","kind":"narration","type":"narration","vi":"Jinmyeong Yoon đi theo sau Jaewan Park.","ko":"윤진명이 박재완을 따라 들어온다.","en":"Jinmyeong Yoon comes in following Jaewan Park.","text":"Jinmyeong Yoon đi theo sau Jaewan Park.\n윤진명이 박재완을 따라 들어온다.\nJinmyeong Yoon comes in following Jaewan Park.","sourceUid":"nar-mrnmlz8z-o3g3g3","sourceNo":"N612","viRanges":[],"koRanges":[]},{"id":823,"readerNo":824,"displayNo":"N613","n":"N613","kind":"narration","type":"dialogue","vi":"Jaewan Park: (Chỉ vào chỗ thích hợp) Ngồi đó đi.","ko":"박재완: (적당한 곳 가리키며) 거기 앉아봐요.","en":"Jaewan Park: (Pointing to an appropriate place) Sit there.","text":"Jaewan Park: (Chỉ vào chỗ thích hợp) Ngồi đó đi.\n박재완: (적당한 곳 가리키며) 거기 앉아봐요.\nJaewan Park: (Pointing to an appropriate place) Sit there.","sourceUid":"nar-mrnmm2fm-x1zi1r","sourceNo":"N613","viRanges":[],"koRanges":[]},{"id":824,"readerNo":825,"displayNo":"N614","n":"N614","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon: ···?","ko":"윤진명: ···?","en":"Jinmyeong Yoon: ···?","text":"Jinmyeong Yoon: ···?\n윤진명: ···?\nJinmyeong Yoon: ···?","sourceUid":"nar-mrnmm3is-dhjxfi","sourceNo":"N614","viRanges":[],"koRanges":[]},{"id":825,"readerNo":826,"displayNo":"N615","n":"N615","kind":"narration","type":"dialogue", i con hẻm.\n택시가 그들을 지나쳐 골목을 빠져나간다.\nThe taxi passes them and exits the alley.","sourceUid":"nar-mrnmvoy9-ypk686","sourceNo":"N642","viRanges":[],"koRanges":[]},{"id":859,"readerNo":860,"displayNo":"N643","n":"N643","kind":"narration","type":"narration","vi":"Kang Ina đi cạnh Yoon Jinmyeong.","ko":"강이나가 윤진명 옆에서 걷는다.","en":"Kang Ina walks next to Yoon Jinmyeong.","text":"Kang Ina đi cạnh Yoon Jinmyeong.\n강이나가 윤진명 옆에서 걷는다.\nKang Ina walks next to Yoon Jinmyeong.","sourceUid":"nar-mrnmvqf2-o5xuos","sourceNo":"N643","viRanges":[],"koRanges":[]},{"id":860,"readerNo":861,"displayNo":"N644","n":"N644","kind":"narration","type":"dialogue","vi":"Kang Ina: Cái này có mùi hoa cà phải không? (Hít một hơi thật sâu)···.","ko":"강이나: 이게 라일락 냄샌가? (심호흡한다)···.","en":"Kang Ina: Does this smell like lilac? (Takes a deep breath)···.","text":"Kang Ina: Cái này có mùi hoa cà phải không? (Hít một hơi thật sâu)···.\n강이나: 이게 라일락 냄샌가? (심호흡한다)···.\nKang Ina: Does this smell like lilac? (Takes a deep breath)···.","sourceUid":"nar-mrnmvrqh-ia7gi7","sourceNo":"N644","viRanges":[],"koRanges":[]},{"id":861,"readerNo":862,"displayNo":"N645","n":"N645","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon: (Sau đó cô ấy mới ngẩng đầu lên và nhận thấy một bông hoa đang nở)...","ko":"윤진명: (그제야 고개를 든다. 꽃이 피어 있는 걸 발견한다)···.","en":"Jinmyeong Yoon: (Only then does she raises her head and notices a flower blooming)...","text":"Jinmyeong Yoon: (Sau đó cô ấy mới ngẩng đầu lên và nhận thấy một bông hoa đang nở)...\n윤진명: (그제야 고개를 든다. 꽃이 피어 있는 걸 발견한다)···.\nJinmyeong Yoon: (Only then does she raises her head and notices a flower blooming)...","sourceUid":"nar-mrnmwykl-zcx7ga","sourceNo":"N645","viRanges":[],"koRanges":[]},{"id":862,"readerNo":863,"displayNo":"892","n":"892","kind":"sub","type":"merged","vi":"Vậy cũng coi như sắp xong. Chị muốn làm cho công ty nào?\nSamsung hay Hyundai? Hyundai trả bao nhiêu? Hơn 50 triệu một năm?","ko":"고생 끝나겠네 제일 가고 싶은 회사가 어디야? 삼성?\n현대? 그런 덴 연봉이 얼마야? 5천 넘어?","en":"You'll be done soon, then. Where do you want to work the most?\nSamsung hay Hyundai? Samsung? Hyundai?\nHow much do they pay? Over 50 million?","text":"Vậy cũng coi như sắp xong. Chị muốn làm cho công ty nào?\nSamsung hay Hyundai? Hyundai trả bao nhiêu? Hơn 50 triệu một năm?\n고생 끝나겠네 제일 가고 싶은 회사가 어디야? 삼성?\n현대? 그런 덴 연봉이 얼마야? 5천 넘어?\nYou'll be done soon, then. Where do you want to work the most?\nSamsung hay Hyundai? Samsung? Hyundai?\nHow much do they pay? Over 50 million?","sourceUid":"merged-mrmx0yvi-66","sourceNo":892,"viRanges":[{"start":3326.910286,"end":3343.017233}],"koRanges":[{"start":3342.853569,"end":3358.606568}]},{"id":863,"readerNo":864,"displayNo":895,"n":895,"kind":"sub","type":"merged","vi":"Chị cắm đầu làm từ sáng đến đêm, và rồi họ cho chị về hưu non khi chị bước sang tuổi 40.","ko":"아침부터 밤중까지 일하고\n죽으라 일해도 마흔 넘으면 대부분 명퇴라며?","en":"You put up with long work hours, and then you get laid off when you turn 40?","text":"Chị cắm đầu làm từ sáng đến đêm, và rồi họ cho chị về hưu non khi chị bước sang tuổi 40.\n아침부터 밤중까지 일하고\n죽으라 일해도 마흔 넘으면 대부분 명퇴라며?\nYou put up with long work hours, and then you get laid off when you turn 40?","sourceUid":"merged-mrmx4itg-69","sourceNo":895,"viRanges":[{"start":3343.017233,"end":3350.543488}],"koRanges":[]},{"id":864,"readerNo":865,"displayNo":"638","n":"638","kind":"sub","type":"merged","vi":"Chị sống rất chăm chỉ, đến mức em tự hỏi sao chị sống được như vậy.\nEm chỉ tò mò chị bán mạng như vậy chỉ để làm nhân viên văn phòng thôi sao.","ko":"윤 선배 보면 정말 열심히 사는데\n어떻게 저렇게 사나 싶을 정돈데...\n그렇게까지 열심히 해서 되고 싶은 게\n겨우 회사원인가 궁금해서...","en":"You really try hard, Do you like that? I do wonder how you do it.\nI just want to know if you work so hard for that sort of life.","text":"Chị sống rất chăm chỉ, đến mức em tự hỏi sao chị sống được như vậy.\nEm chỉ tò mò chị bán mạng như vậy chỉ để làm nhân viên văn phòng thôi sao.\n윤 선배 보면 정말 열심히 사는데\n어떻게 저렇게 사나 싶을 정돈데...\n그렇게까지 열심히 해서 되고 싶은 게\n겨우 회사원인가 궁금해서...\nYou really try hard, Do you like that? I do wonder how you do it.\nI just want to know if you work so hard for that sort of life.","sourceUid":"merged-mrmxedae-79","sourceNo":638,"viRanges":[{"start":3368,"end":3381.296327}],"koRanges":[{"start":3358.606568,"end":3395.064948}]},{"id":865,"readerNo":866,"displayNo":"N646","n":"N646","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon: (Sau đó cô ấy dừng lại và nhìn Kang Ina)...","ko":"윤진명: (그제야 멈춰 서서 강이나를 본다)···.","en":"Jinmyeong Yoon: (Only then she stops and looks at Kang Ina)...","text":"Jinmyeong Yoon: (Sau đó cô ấy dừng lại và nhìn Kang Ina)...\n윤진명: (그제야 멈춰 서서 강이나를 본다)···.\nJinmyeong Yoon: (Only then she stops and looks at Kang Ina)...","sourceUid":"nar-mrnmymyi-ot3inp","sourceNo":"N646","viRanges":[],"koRanges":[]},{"id":866,"readerNo":867,"displayNo":"N647","n":"N647","kind":"narration","type":"dialogue","vi":"Kang Ina: Nếu nhìn vào tiền bối Yoon, cô ấy sống rất vất vả.","ko":"강이나: 윤 선배 보면 정말 열심히 사는데,","en":"Kang Ina: If you look at Senior Yoon, she lives really hard.","text":"Kang Ina: Nếu nhìn vào tiền bối Yoon, cô ấy sống rất vất vả.\n강이나: 윤 선배 보면 정말 열심히 사는데,\nKang Ina: If you look at Senior Yoon, she lives really hard.","sourceUid":"nar-mrnmz5sv-iuo298","sourceNo":"N647","viRanges":[],"koRanges":[]},{"id":867,"readerNo":868,"displayNo":"N648","n":"N648","kind":"narration","type":"narration","vi":"Tôi tự hỏi làm sao họ có thể sống như vậy...","ko":"어떻게 저렇게 사나 싶을 정돈데···","en":"It makes me wonder how they can live like that...","text":"Tôi tự hỏi làm sao họ có thể sống như vậy...\n어떻게 저렇게 사나 싶을 정돈데···\nIt makes me wonder how they can live like that...","sourceUid":"nar-mrnmzbay-5w2k6f","sourceNo":"N648","viRanges":[],"koRanges":[]},{"id":868,"readerNo":869,"displayNo":"N649","n":"N649","kind":"narration","type":"narration","vi":"Tôi đang tự hỏi liệu tất cả những gì tôi muốn trở thành sau khi làm việc chăm chỉ chỉ là một nhân viên văn phòng...","ko":"그렇게까지 열심히 해서 되고 싶은 게 겨우 회사원인가 궁금 해서···.","en":"I was wondering if all I wanted to become after working so hard was an office worker...","text":"Tôi đang tự hỏi liệu tất cả những gì tôi muốn trở thành sau khi làm việc chăm chỉ chỉ là một nhân viên văn phòng...\n그렇게까지 열심히 해서 되고 싶은 게 겨우 회사원인가 궁금 해서···.\nI was wondering if all I wanted to become after working so hard was an office worker...","sourceUid":"nar-mrnmzcg7-uwsw2a","sourceNo":"N649","viRanges":[],"koRanges":[]},{"id":869,"readerNo":870,"displayNo":"640","n":"640","kind":"sub","type":"merged","vi":"Em nói đúng.\nThỉnh thoảng chị cũng xấu hổ lắm.","ko":"그치? 나도 가끔 쪽팔려.","en":"Right.\nI get embarrassed sometimes.","text":"Em nói đúng.\nThỉnh thoảng chị cũng xấu hổ lắm.\n그치? 나도 가끔 쪽팔려.\nRight.\nI get embarrassed sometimes.","sourceUid":"merged-mrmx8adb-75","sourceNo":640,"viRanges":[],"koRanges":[]},{"id":870,"readerNo":871,"displayNo":899,"n":899,"kind":"sub","type":"merged","vi":"[Nhạc chủ đề yên tĩnh bắt đầu]","ko":"[조용한 테마 음악 시작]","en":"[Quiet theme music starts]","text":"[Nhạc chủ đề yên tĩnh bắt đầu]\n[조용한 테마 음악 시작]\n[Quiet theme music starts]","sourceUid":"ko-mrli6nmx-1634","sourceNo":899,"viRanges":[],"koRanges":[]},{"id":871,"readerNo":872,"displayNo":"900","n":"900","kind":"sub","type":"merged","vi":"Nịnh nọt cấp trên, và uống rượu dù bản thân không muốn.\nChị thích điều đó sao? Chị muốn sống như vậy à?","ko":"상사한테 아부하고\n먹기 싫어도 술 마시고... 그게 좋아? 그렇게 살고 싶어?","en":"Kissing your boss' butt, and drinking even when you don't want to.\nIs that the life you want?","text":"Nịnh nọt cấp trên, và uống rượu dù bản thân không muốn.\nChị thích điều đó sao? Chị muốn sống như vậy à?\n상사한테 아부하고\n먹기 싫어도 술 마시고... 그게 좋아? 그렇게 살고 싶어?\nKissing your boss' butt, and drinking even when you don't want to.\nIs that the life you want?","sourceUid":"merged-mrmx70jt-74","sourceNo":900,"viRanges":[{"start":3350.543488,"end":3361.569899}],"koRanges":[]},{"id":872,"readerNo":873,"displayNo":646,"n":646,"kind":"sub","type":"merged","vi":"Em kể về chị với anh ấy và anh ấy muốn đóng tiền học cho chị.","ko":"윤 선배 얘기했더니 등록금 내줄까 그러던데...","en":"I told him about you and he wanted to pay for your tuition.","text":"Em kể về chị với anh ấy và anh ấy muốn đóng tiền học cho chị.\n윤 선배 얘기했더니 등록금 내줄까 그러던데...\nI told him about you and he wanted to pay for your tuition.","sourceUid":"merged-mrmxhq1a-87","sourceNo":646,"viRanges":[{"start":3402.71093,"end":3408.013242}],"koRanges":[{"start":3417.850712,"end":3421.899692}]},{"id":873,"readerNo":874,"displayNo":906,"n":906,"kind":"sub","type":"merged","vi":"Giá mà ước mơ của chị là phi hành gia hay tổng thư ký Liên Hợp Quốc.","ko":"그치?\n나도 가끔 쪽팔려\n내 꿈이 우주비행사나 유엔 사무총장쯤이면 좋을 텐데...","en":"I wish my dream was to be an astronaut or UN secretary-general.","text":"Giá mà ước mơ của chị là phi hành gia hay tổng thư ký Liên Hợp Quốc.\n그치?\n나도 가끔 쪽팔려\n내 꿈이 우주비행사나 유엔 사무총장쯤이면 좋을 텐데...\nI wish my dream was to be an astronaut or UN secretary-general.","sourceUid":"merged-mrmxfkfk-83","sourceNo":906,"viRanges":[{"start":3381.296327,"end":3391.759819}],"koRanges":[{"start":3395.064948,"end":3407.712284}]},{"id":874,"readerNo":875,"displayNo":"910","n":"910","kind":"sub","type":"merged","vi":"Chị nhận được tiền boa chưa? Rồi. Khá nhiều. Không đưa lộn đâu ha? Số tiền đó chẳng là gì với họ.","ko":"참, 팁 받았어? 응, 많이 놨더라\n잘못 놓은 거 아니지? 그 정도는 아무 것도 아니야 그 사람들한테는...","en":"Did you get the tip? Yes, that was a lot.\nThat wasn't a mistake, was it? That's nothing for them.","text":"Chị nhận được tiền boa chưa? Rồi. Khá nhiều. Không đưa lộn đâu ha? Số tiền đó chẳng là gì với họ.\n참, 팁 받았어? 응, 많이 놨더라\n잘못 놓은 거 아니지? 그 정도는 아무 것도 아니야 그 사람들한테는...\nDid you get the tip? Yes, that was a lot.\nThat wasn't a mistake, was it? That's nothing for them.","sourceUid":"merged-mrmxgucp-84","sourceNo":910,"viRanges":[{"start":3391.759819,"end":3402.71093}],"koRanges":[{"start":3407.712284,"end":3417.850712}]},{"id":875,"readerNo":876,"displayNo":"916","n":"916","kind":"sub","type":"merged","vi":"Em bảo anh ấy nhé? Tại sao?\nSao trăng gì? Em không muốn chị khổ như vậy. Không cần đâu.","ko":"어때, 말해볼까? 왜? 왜긴 왜야?\n윤 선배 고생 let idx=0,stop=false,viUrl='',koUrl='',unlocked=false,token=0;
const $=id=>document.getElementById(id);
const engine=()=>$('engine');
function toggleSettings(){const p=$('settingsPanel');if(p)p.classList.toggle('show')}
let audioCtx=null,gainNode=null,mediaSource=null,engineKind='vi';
const VOL_KEY='master_reader_volume_'+String(project.githubSlug||project.title||'reader').replace(/[^A-Za-z0-9._-]+/g,'_');

function esc2(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}
function fmt(t){t=Number(t||0);let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60),ms=Math.round((t-Math.floor(t))*1000);if(ms>=1000){s++;ms-=1000}return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+','+String(ms).padStart(3,'0')}
function rangeLabel(arr){if(!arr||!arr.length)return '';let a=arr[0],b=arr[arr.length-1];return fmt(a.start)+' → '+fmt(b.end)+(arr.length>1?' x'+arr.length:'')}
function hasRange(k,b){let arr=k==='vi'?b.viRanges:b.koRanges;return !!(arr&&arr.length)}
function folderPath(){let f=String(project.audioFolder||'audio').trim();while(f.endsWith('/'))f=f.slice(0,-1);return f||'audio'}
function pathFor(k){let folder=folderPath();let file=k==='vi'?project.viAudioFile:project.koAudioFile;if(!file)return '';if(file.startsWith('http://')||file.startsWith('https://'))return file;if(folder==='.'||folder==='')return './'+file;if(folder.startsWith('../')||folder.startsWith('./'))return folder+'/'+file;return './'+folder+'/'+file}
function clampVol(v){v=Number(v);if(!Number.isFinite(v))v=100;return Math.max(0,Math.min(200,v))}
function loadVolSettings(){try{return JSON.parse(localStorage.getItem(VOL_KEY)||'{}')||{}}catch(e){return {}}}
function saveVolSettings(){try{localStorage.setItem(VOL_KEY,JSON.stringify({vi:clampVol($('viVol')?.value||100),ko:clampVol($('koVol')?.value||100)}))}catch(e){}}
function volValue(k){return clampVol($(k+'Vol')?.value||100)}
function ensureGain(){
  try{
    const a=engine();
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(!mediaSource){
      mediaSource=audioCtx.createMediaElementSource(a);
      gainNode=audioCtx.createGain();
      mediaSource.connect(gainNode);
      gainNode.connect(audioCtx.destination);
    }
    if(audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
    return true;
  }catch(e){return false}
}
function applyVisibleVolume(k){
  const v=volValue(k), label=$(k+'VolLabel');
  if(label)label.textContent=Math.round(v)+'%';
}
function applyEngineVolume(k){
  engineKind=k||engineKind||'vi';
  const v=volValue(engineKind), a=engine();
  const ok=ensureGain();
  if(ok&&gainNode){a.volume=1;gainNode.gain.value=v/100}
  else a.volume=Math.min(1,v/100);
  applyVisibleVolume(engineKind);
}
function setReaderVolume(k,v,persist=true){
  const slider=$(k+'Vol');
  if(slider)slider.value=String(clampVol(v));
  applyVisibleVolume(k);
  if(engineKind===k)applyEngineVolume(k);
  if(persist)saveVolSettings();
}
function initReaderVolumeControls(){
  const saved=loadVolSettings();
  ['vi','ko'].forEach(k=>{
    const slider=$(k+'Vol');
    const val=clampVol(saved[k]??100);
    if(slider){
      slider.value=String(val);
      slider.oninput=()=>setReaderVolume(k,slider.value,true);
      slider.onchange=()=>setReaderVolume(k,slider.value,true);
    }
    setReaderVolume(k,val,false);
  });
}
function loadPaths(){viUrl=pathFor('vi');koUrl=pathFor('ko');applyVisibleVolume('vi');applyVisibleVolume('ko');$('audioInfo').textContent='Paths: '+viUrl+' | '+koUrl}
function showAudioPaths(){alert('VI: '+viUrl+'\nKO: '+koUrl+'\n\nNếu đặt reader trong thư mục subtitle-master, audio folder thường là ../audio.')}
function loadLocal(k,f){if(!f)return;if(k==='vi')viUrl=URL.createObjectURL(f);else koUrl=URL.createObjectURL(f);applyVisibleVolume(k);$('audioInfo').textContent='Loaded local '+k+': '+f.name}
function toggleAudio(){toggleSettings()}

function badgeHtml(b){
  const vi=hasRange('vi',b)?'<span class="badge vi timingBadge">VI '+rangeLabel(b.viRanges)+'</span>':'<span class="badge no">No VI</span>';
  const ko=hasRange('ko',b)?'<span class="badge vi timingBadge">KO '+rangeLabel(b.koRanges)+'</span>':'<span class="badge no">No KO</span>';
  const type=b.kind==='narration'?'<span class="badge narr">Narration</span>':'<span class="badge">Cue</span>';
  return '<div class="badges">'+type+vi+ko+'</div>';
}
function render(){
  const q=($('q').value||'').toLowerCase();
  let h='';
  project.blocks.forEach(function(b,i){
    const hay=[b.vi,b.ko,b.en,b.text,b.displayNo,b.sourceNo].join(' ').toLowerCase();
    if(q&&!hay.includes(q))return;
    const title=(b.kind==='narration'?'Narration #':'Cue #')+(b.displayNo||b.sourceNo||i+1);
    h+='<div class="item '+(b.kind==='narration'?'narr':'')+' '+(i===idx?'active':'')+'" onclick="idx='+i+';render()">';
    h+='<div class="meta"><span>'+esc2(title)+'</span><span>'+(i===idx?'SELECTED':'')+'</span></div>';
    h+=badgeHtml(b);
    h+='<div class="txt">'+(b.vi?'<div>'+esc2(b.vi)+'</div>':'')+(b.ko?'<div class="ko">'+esc2(b.ko)+'</div>':'')+(b.en?'<div class="en">'+esc2(b.en)+'</div>':'')+'</div>';
    h+='<div class="row" style="margin-top:8px"><button onclick="event.stopPropagation();idx='+i+';readKoCurrent()">Read KO</button><button class="good" onclick="event.stopPropagation();idx='+i+';playCurrent(\'vi\')">VI Dub</button><button class="violet" onclick="event.stopPropagation();idx='+i+';playCurrent(\'ko\')">KO Live</button><button class="warn" onclick="event.stopPropagation();idx='+i+';playCueMode()">VI→VI→KO→KO</button></div>';
    h+='</div>';
  });
  $('list').innerHTML=h||'<div class="item">Không có cue phù hợp.</div>';
  const viCount=project.blocks.filter(b=>hasRange('vi',b)).length, koCount=project.blocks.filter(b=>hasRange('ko',b)).length;
  $('stat').textContent=project.blocks.length+' blocks · VI '+viCount+' · KO '+koCount+' · current '+(idx+1);
}
function cur(){return project.blocks[idx]||{}}
function prev(){idx=Math.max(0,idx-1);render();scrollActive()}
function next(){idx=Math.min(project.blocks.length-1,idx+1);render();scrollActive()}
function scrollActive(){document.querySelector('.item.active')?.scrollIntoView({block:'center',behavior:'smooth'})}
function stopAll(){stop=true;token++;engine().pause();try{speechSynthesis.cancel()}catch(e){}}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}
function waitMedia(a,timeout){timeout=timeout||6000;return new Promise(res=>{if(a.readyState>=1)return res(true);let done=false;function ok(){if(done)return;done=true;clean();res(true)}function bad(){if(done)return;done=true;clean();res(false)}function clean(){a.removeEventListener('loadedmetadata',ok);a.removeEventListener('canplay',ok);a.removeEventListener('error',bad);clearTimeout(to)}a.addEventListener('loadedmetadata',ok,{once:true});a.addEventListener('canplay',ok,{once:true});a.addEventListener('error',bad,{once:true});let to=setTimeout(bad,timeout)})}
async function unlockAudio(){try{let a=engine();let src=viUrl||koUrl||pathFor('vi')||pathFor('ko');if(!src){alert('Chưa có audio path.');return false}if(a.src!==new URL(src,location.href).href){a.src=src;a.load();await waitMedia(a,5000)}let vol=a.volume;a.volume=0.001;await a.play();a.pause();a.volume=vol||1;applyEngineVolume(engineKind||'vi');unlocked=true;$('audioInfo').textContent+=' | unlocked';return true}catch(e){alert('iPhone chưa cho unlock audio. Bấm lại Unlock iPhone Audio. '+(e.message||e));return false}}
function playRange(src,r,myToken,k){
  return new Promise(async res=>{
    if(!src||!r){res(false);return}
    const a=engine();stop=false;
    try{
      const abs=new URL(src,location.href).href;
      if(a.src!==abs){a.pause();a.src=src;a.load();await waitMedia(a,7000)}
      applyEngineVolume(k||'vi');
      a.currentTime=Math.max(0,Number(r.start)||0);
      const end=Math.max(Number(r.end)||0,(Number(r.start)||0)+.2);
      function finish(ok){a.removeEventListener('timeupdate',tick);a.removeEventListener('ended',ended);a.removeEventListener('error',err);res(ok)}
      function tick(){if(stop||myToken!==token){a.pause();finish(false);return}if(a.currentTime>=end-0.03){a.pause();finish(true)}}
      function ended(){finish(true)} function err(){finish(false)}
      a.addEventListener('timeupdate',tick);a.addEventListener('ended',ended,{once:true});a.addEventListener('error',err,{once:true});
      await a.play();
    }catch(e){$('audioInfo').textContent='Không phát được audio: '+(e.message||e)+' | '+src;res(false)}
  })
}
async function playAudioKind(k,myToken){
  const b=cur();const ranges=k==='vi'?b.viRanges:b.koRanges;const src=k==='vi'?viUrl:koUrl;
  if(!ranges||!ranges.length)return false;
  let any=false;
  for(const r of ranges){if(stop||myToken!==token)break;let ok=await playRange(src,r,myToken,k);any=any||ok}
  return any;
}
async function playCurrent(k){const my=++token;stop=false;const ok=await playAudioKind(k,my);if(!ok)await readKoCurrent()}

function getBestVoice(lang){
  try{
    const voices=speechSynthesis.getVoices()||[];
    const prefix=String(lang||'').slice(0,2).toLowerCase();
    const scored=voices.map(v=>{
      const hay=((v.lang||'')+' '+(v.name||'')).toLowerCase();
      let score=0;
      if((v.lang||'').toLowerCase().startsWith(prefix))score+=100;
      if(lang==='ko-KR' && /ko|korean|한국|yuna|siri|google|microsoft|samsung|premium|enhanced/.test(hay))score+=60;
      if(lang==='vi-VN' && /vi|vietnam|tiếng việt|vietnamese|google|microsoft|premium|enhanced/.test(hay))score+=60;
      if(v.localService)score+=5;
      return {v,score};
    }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
    return scored[0]?.v||null;
  }catch(e){return null}
}
function readTts(text,lang,myToken,rate){
  return new Promise(res=>{
    text=String(text||'').trim();
    if(!text){res(false);return}
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text.slice(0,1200));
      u.lang=lang;
      u.rate=rate||1;
      u.pitch=1;
      const v=getBestVoice(lang); if(v)u.voice=v;
      let done=false;
      function finish(ok){if(done)return;done=true;res(ok)}
      u.onend=()=>finish(true);u.onerror=()=>finish(false);
      speechSynthesis.speak(u);
      setTimeout(()=>{if(myToken!==token){speechSynthesis.cancel();finish(false)}},50);
    }catch(e){res(false)}
  })
}
function readKo(text,myToken){return readTts(text,'ko-KR',myToken,0.88)}
function readVi(text,myToken){return readTts(text,'vi-VN',myToken,0.95)}
function readKoCurrent(){const my=++token;stop=false;return readKo(cur().ko||cur().text||'',my)}
function readViCurrent(){const my=++token;stop=false;return readVi(cur().vi||'',my)}
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=()=>{try{speechSynthesis.getVoices()}catch(e){}}}

async function playByModeForCurrent(mode,my){
  const b=cur();
  const hasVi=hasRange('vi',b), hasKo=hasRange('ko',b);
  if(mode==='vi-readvi-readko-ko'){
    if(hasVi) await playAudioKind('vi',my); else await readVi(b.vi||'',my);
    if(stop||my!==token)return;
    await readKo(b.ko||b.text||'',my);
    if(stop||my!==token)return;
    if(hasKo) await playAudioKind('ko',my);
  }else if(mode==='vi-readko-ko'){
    if(hasVi) await playAudioKind('vi',my);
    if(stop||my!==token)return;
    await readKo(b.ko||b.text||'',my);
    if(stop||my!==token)return;
    if(hasKo) await playAudioKind('ko',my);
  }else if(mode==='vi-ko'){
    if(hasVi)await playAudioKind('vi',my);
    if(stop||my!==token)return;
    if(hasKo)await playAudioKind('ko',my);
    else if(!hasVi)await readKo(b.ko||b.text||'',my);
  }else if(mode==='vi'){
    const ok=await playAudioKind('vi',my);
    if(!ok)await readVi(b.vi||'',my);
  }else if(mode==='ko'){
    const ok=await playAudioKind('ko',my);
    if(!ok)await readKo(b.ko||b.text||'',my);
  }else if(mode==='readko'){
    await readKo(b.ko||b.text||'',my);
  }
}
async function playCueMode(){
  const my=++token;stop=false;
  await playByModeForCurrent($('mode').value,my);
}
async function smart(){
  stop=false;const my=++token;
  const mode=$('mode').value;
  if((mode==='vi-readko-ko'||mode==='vi-readvi-readko-ko')&&!unlocked&&/iPad|iPhone|iPod/.test(navigator.userAgent)){await unlockAudio()}
  for(;idx<project.blocks.length&&my===token&&!stop;idx++){
    render();scrollActive();
    await playByModeForCurrent(mode,my);
    if(stop||my!==token)break;
  }
}
initReaderVolumeControls();loadPaths();render();
