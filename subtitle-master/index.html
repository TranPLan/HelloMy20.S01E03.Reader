chế đã phạm sai lầm.","ko":"바텐더가 실수를 했나 보다.","en":"I guess the bartender made a mistake.","text":"Tôi đoán người pha chế đã phạm sai lầm.\n바텐더가 실수를 했나 보다.\nI guess the bartender made a mistake.","sourceUid":"nar-mrn8jeqz-omrwm6","sourceNo":"N141","viRanges":[],"koRanges":[]},{"id":178,"readerNo":179,"displayNo":"N142","n":"N142","kind":"narration","type":"narration","vi":"Có vẻ như rượu của khách hàng đã được liệt kê không chính xác.","ko":"손님이 키핑한 술을 잘못 기재한 듯싶다.","en":"It seems that the customer's alcohol was incorrectly listed.","text":"Có vẻ như rượu của khách hàng đã được liệt kê không chính xác.\n손님이 키핑한 술을 잘못 기재한 듯싶다.\nIt seems that the customer's alcohol was incorrectly listed.","sourceUid":"nar-mrn8jgkw-muosda","sourceNo":"N142","viRanges":[],"koRanges":[]},{"id":179,"readerNo":180,"displayNo":"N143","n":"N143","kind":"narration","type":"narration","vi":"‘Tôi phải mất 200.000 won chi phí.","ko":"‘원가로 20만 원이나 손해야.","en":"‘I have to lose 200,000 won in cost.","text":"‘Tôi phải mất 200.000 won chi phí.\n‘원가로 20만 원이나 손해야.\n‘I have to lose 200,000 won in cost.","sourceUid":"nar-mrn8jj7x-mxvsjx","sourceNo":"N143","viRanges":[],"koRanges":[]},{"id":180,"readerNo":181,"displayNo":"N144","n":"N144","kind":"narration","type":"narration","vi":"Tôi nghe mọi người nói, ‘Chúng ta sẽ làm gì với sự mất mát này?’","ko":"이 손해를 어쩔 거냐’는 말이 들린다.","en":"I hear people say, ‘What are we going to do with this loss?’","text":"Tôi nghe mọi người nói, ‘Chúng ta sẽ làm gì với sự mất mát này?’\n이 손해를 어쩔 거냐’는 말이 들린다.\nI hear people say, ‘What are we going to do with this loss?’","sourceUid":"nar-mrn8jlot-1tfeta","sourceNo":"N144","viRanges":[],"koRanges":[]},{"id":181,"readerNo":182,"displayNo":"N145","n":"N145","kind":"narration","type":"narration","vi":"Người pha chế không có gì để nói.","ko":"바텐더는 할 말이 없다.","en":"The bartender has nothing to say.","text":"Người pha chế không có gì để nói.\n바텐더는 할 말이 없다.\nThe bartender has nothing to say.","sourceUid":"nar-mrn8jmxb-jf2tsg","sourceNo":"N145","viRanges":[],"koRanges":[]},{"id":182,"readerNo":183,"displayNo":"N146","n":"N146","kind":"narration","type":"dialogue","vi":"(Kang Ina): Bảy năm trước, Madam gặp một người đàn ông.","ko":"(강이나): 7년 전 마담은 한 남자를 만났다.","en":"(Kang Ina): Seven years ago, Madam met a man.","text":"(Kang Ina): Bảy năm trước, Madam gặp một người đàn ông.\n(강이나): 7년 전 마담은 한 남자를 만났다.\n(Kang Ina): Seven years ago, Madam met a man.","sourceUid":"nar-mrn8jpie-e510b4","sourceNo":"N146","viRanges":[],"koRanges":[]},{"id":183,"readerNo":184,"displayNo":"N147","n":"N147","kind":"narration","type":"narration","vi":"Người đàn ông đó tặng tôi một món quà mỗi lần tôi gặp anh ấy.","ko":"남자는 만날 때마다 선물을 안겼다.","en":"The man gave me a gift every time I met him.","text":"Người đàn ông đó tặng tôi một món quà mỗi lần tôi gặp anh ấy.\n남자는 만날 때마다 선물을 안겼다.\nThe man gave me a gift every time I met him.","sourceUid":"nar-mrn8jr3n-xyz3pr","sourceNo":"N147","viRanges":[],"koRanges":[]},{"id":184,"readerNo":185,"displayNo":"N148","n":"N148","kind":"narration","type":"narration","vi":"Dây chuyền, túi xách, mỹ phẩm...","ko":"목걸이, 가방, 화장품···.","en":"Necklaces, bags, cosmetics...","text":"Dây chuyền, túi xách, mỹ phẩm...\n목걸이, 가방, 화장품···.\nNecklaces, bags, cosmetics...","sourceUid":"nar-mrn8jrsx-gr13u7","sourceNo":"N148","viRanges":[],"koRanges":[]},{"id":185,"readerNo":186,"displayNo":111,"n":111,"kind":"sub","type":"merged","vi":"[la hét]","ko":"[소리를 지른다]","en":"[screams]","text":"[la hét]\n[소리를 지른다]\n[screams]","sourceUid":"ko-mrli6nms-846","sourceNo":111,"viRanges":[],"koRanges":[]},{"id":186,"readerNo":187,"displayNo":75,"n":75,"kind":"sub","type":"merged","vi":"- Mẹ ơi! - Đứng lại!\nCó thể nói đa phần thu nhập của ngành này luôn đi kèm rủi ro cao.\nKhi đụng chạm da thịt với một người đàn ông xa lạ,\nmọi điều kỳ dị đều có thể xảy ra.","ko":"아! 어머!\n(강이나) 어떻게 보면 우리 수입의 대부분은 위험수당인 셈이다\n잘 알지도 못하는 남자와 맨몸으로 부딪치다 보면\n별의별 일이 다 생긴다","en":"-Gosh! -Stop!\nYou could say majority of my income is risk premium.\nWhen you get naked with a guy you barely know,\nweirdest things happen.","text":"- Mẹ ơi! - Đứng lại!\nCó thể nói đa phần thu nhập của ngành này luôn đi kèm rủi ro cao.\nKhi đụng chạm da thịt với một người đàn ông xa lạ,\nmọi điều kỳ dị đều có thể xảy ra.\n아! 어머!\n(강이나) 어떻게 보면 우리 수입의 대부분은 위험수당인 셈이다\n잘 알지도 못하는 남자와 맨몸으로 부딪치다 보면\n별의별 일이 다 생긴다\n-Gosh! -Stop!\nYou could say majority of my income is risk premium.\nWhen you get naked with a guy you barely know,\nweirdest things happen.","sourceUid":"merged-mrloi6hk-32","sourceNo":75,"viRanges":[{"start":336.011928,"end":351.00259}],"koRanges":[{"start":373.021676,"end":389.582277}]},{"id":187,"readerNo":188,"displayNo":119,"n":119,"kind":"sub","type":"merged","vi":"[Chuông reo]\n[Tiếng bíp của bộ đếm]\n[Âm thanh đánh đồng xu]\n[Âm thanh cảnh báo]","ko":"[종 울린다]\n[계수 카운터 전자음]\n[동전 팅 소리]\n[경고 알람 소리]","en":"[Bell rings]\n[Counter beep]\n[Coin striking sound]\n[Warning alarm sound]","text":"[Chuông reo]\n[Tiếng bíp của bộ đếm]\n[Âm thanh đánh đồng xu]\n[Âm thanh cảnh báo]\n[종 울린다]\n[계수 카운터 전자음]\n[동전 팅 소리]\n[경고 알람 소리]\n[Bell rings]\n[Counter beep]\n[Coin striking sound]\n[Warning alarm sound]","sourceUid":"merged-mrloiq2l-33","sourceNo":119,"viRanges":[],"koRanges":[]},{"id":188,"readerNo":189,"displayNo":80,"n":80,"kind":"sub","type":"merged","vi":"Yếu tố tiên quyết là khả năng tài chính.\nMỗi khi họ chật vật chu cấp tiền tiêu vặt cho tôi thì đều nảy sinh vấn đề.\nBằng chứng ở ngay kia.\nCậu biết nó đáng giá bao nhiêu không? Hơn 200.000 won đấy.","ko":"무엇보다 중요한 건 경제력이다\n아등바등 모아서 주는 '용돈은' 꼭 탈이 생긴다\n산 증거가 저기 있다\n그게 원가가 얼만지 알아?\n만 원이면 선물로 적은 돈 아니야","en":"Money is the most important thing.\nWhen the guy struggles to pay me, there's always a problem.\nThat's the proof, right there.\nDo you realize how much that is? It's over 200,000 won.","text":"Yếu tố tiên quyết là khả năng tài chính.\nMỗi khi họ chật vật chu cấp tiền tiêu vặt cho tôi thì đều nảy sinh vấn đề.\nBằng chứng ở ngay kia.\nCậu biết nó đáng giá bao nhiêu không? Hơn 200.000 won đấy.\n무엇보다 중요한 건 경제력이다\n아등바등 모아서 주는 '용돈은' 꼭 탈이 생긴다\n산 증거가 저기 있다\n그게 원가가 얼만지 알아?\n만 원이면 선물로 적은 돈 아니야\nMoney is the most important thing.\nWhen the guy struggles to pay me, there's always a problem.\nThat's the proof, right there.\nDo you realize how much that is? It's over 200,000 won.","sourceUid":"merged-mrlolyju-36","sourceNo":80,"viRanges":[{"start":351.00259,"end":380.678338}],"koRanges":[{"start":389.582277,"end":417.581737}]},{"id":189,"readerNo":190,"displayNo":83,"n":83,"kind":"sub","type":"merged","vi":"Bảy năm trước, má mì quen một chàng trai.\nMỗi lần gặp gỡ, người ấy đều tặng quà.\nDây chuyền, túi xách, mỹ phẩm.","ko":"(강이나) 7년 전\n마담은 한 남자를 만났다\n남자는 만날 때마다 선물을 안겼다\n목걸이, 가방, 화장품...","en":"Seven years ago, the madam met a guy.\nThe guy gave her a gift whenever he saw her.\nA necklace, purse, makeup.","text":"Bảy năm trước, má mì quen một chàng trai.\nMỗi lần gặp gỡ, người ấy đều tặng quà.\nDây chuyền, túi xách, mỹ phẩm.\n(강이나) 7년 전\n마담은 한 남자를 만났다\n남자는 만날 때마다 선물을 안겼다\n목걸이, 가방, 화장품...\nSeven years ago, the madam met a guy.\nThe guy gave her a gift whenever he saw her.\nA necklace, purse, makeup.","sourceUid":"merged-mrloprd0-38","sourceNo":83,"viRanges":[{"start":380.678338,"end":389.478701}],"koRanges":[{"start":417.581737,"end":427.000063}]},{"id":190,"readerNo":191,"displayNo":86,"n":86,"kind":"sub","type":"merged","vi":"Rồi cảnh sát ập đến.\nNgười đàn ông kia là nhân viên ngân hàng. Anh ta biển thủ tiền của khách.\nSau khi anh ta thụ án một năm hai tháng tù,","ko":"그리고 경찰이 찾아왔다\n남자는 은행원이었고 고객의 돈을 횡령했단다\n년 2개월의 실형을 살고 나왔을 때","en":"And then, the cops came.\nThe guy was a bank clerk and stole the clients' money.\nAfter he spent a year and two months in prison,","text":"Rồi cảnh sát ập đến.\nNgười đàn ông kia là nhân viên ngân hàng. Anh ta biển thủ tiền của khách.\nSau khi anh ta thụ án một năm hai tháng tù,\n그리고 경찰이 찾아왔다\n남자는 은행원이었고 고객의 돈을 횡령했단다\n년 2개월의 실형을 살고 나왔을 때\nAnd then, the cops came.\nThe guy was a bank clerk and stole the clients' money.\nAfter he sp ":"Jeong Ye-eun: (As soon as she sees Yoo Eun-jae) Kang,","text":"Jeong Ye-eun: (Ngay khi cô ấy nhìn thấy Yoo Eun-jae) Kang,\n정예은: (유은재를 보자마자) 강 언니 말이야,\nJeong Ye-eun: (As soon as she sees Yoo Eun-jae) Kang,","sourceUid":"nar-mrna5tz4-yua6jv","sourceNo":"N161","viRanges":[],"koRanges":[]},{"id":208,"readerNo":209,"displayNo":"N162","n":"N162","kind":"narration","type":"dialogue","vi":"Eunjae Yoo: (Nhìn Jiwon Song)...","ko":"유은재: (송지원을 본다)···.","en":"Eunjae Yoo: (Looks at Jiwon Song)...","text":"Eunjae Yoo: (Nhìn Jiwon Song)...\n유은재: (송지원을 본다)···.\nEunjae Yoo: (Looks at Jiwon Song)...","sourceUid":"nar-mrna666o-e4eqrn","sourceNo":"N162","viRanges":[],"koRanges":[]},{"id":209,"readerNo":210,"displayNo":99,"n":99,"kind":"sub","type":"merged","vi":"Thật á? Ghê vậy.\nChuyện chị Yi Na là sinh viên cũng là nói dối nốt.\nChị quen một người trong nhóm báo trường nên nhờ họ điều tra.\nHọ nói khoa đó không có ai tên như vậy.\nSao chị ấy dám làm vậy?","ko":"진짜? 완전 대박\n강 언니 있잖아 대학생이라는 것도 거짓말이래\n그쪽 학보사에 아는 애가 있어서 알아봐 달라고 했거든\n경영학과에 그런 이름 없대\n어떻게 그럴 수가 있지","en":"Really?\nYi-Na isn't even in college.\nI know someone at the office, and asked them to look into it.\nThere's no one with that name in business school.\nHow does anyone do that?","text":"Thật á? Ghê vậy.\nChuyện chị Yi Na là sinh viên cũng là nói dối nốt.\nChị quen một người trong nhóm báo trường nên nhờ họ điều tra.\nHọ nói khoa đó không có ai tên như vậy.\nSao chị ấy dám làm vậy?\n진짜? 완전 대박\n강 언니 있잖아 대학생이라는 것도 거짓말이래\n그쪽 학보사에 아는 애가 있어서 알아봐 달라고 했거든\n경영학과에 그런 이름 없대\n어떻게 그럴 수가 있지\nReally?\nYi-Na isn't even in college.\nI know someone at the office, and asked them to look into it.\nThere's no one with that name in business school.\nHow does anyone do that?","sourceUid":"merged-mrlp5si8-50","sourceNo":99,"viRanges":[],"koRanges":[{"start":478.171956,"end":495.671104}]},{"id":210,"readerNo":211,"displayNo":104,"n":104,"kind":"sub","type":"merged","vi":"Chị ấy còn nói dối gì nữa?\nCái tên có phải thật không?\nBộ phim nào mà nhân vật nữ nói dối mọi thứ ấy nhỉ?\n- Vô Vọng. - Chính là nó.","ko":"도대체 진짜가 뭐야?\n이름은 진짠가?\n왜... 그런 영화 있지 않았어?\n그... 모든 게 다 거짓말인 여자 이야기\n화차!\n맞다, 그거...","en":"What else did she lie about?\nIs her name real?\nWasn't there a movie with a woman who lied about everything?\n-Helpless. -Right.","text":"Chị ấy còn nói dối gì nữa?\nCái tên có phải thật không?\nBộ phim nào mà nhân vật nữ nói dối mọi thứ ấy nhỉ?\n- Vô Vọng. - Chính là nó.\n도대체 진짜가 뭐야?\n이름은 진짠가?\n왜... 그런 영화 있지 않았어?\n그... 모든 게 다 거짓말인 여자 이야기\n화차!\n맞다, 그거...\nWhat else did she lie about?\nIs her name real?\nWasn't there a movie with a woman who lied about everything?\n-Helpless. -Right.","sourceUid":"merged-mrlp86f6-52","sourceNo":104,"viRanges":[{"start":440.838375,"end":465.651808}],"koRanges":[{"start":495.671104,"end":506.63963}]},{"id":211,"readerNo":212,"displayNo":107,"n":107,"kind":"sub","type":"merged","vi":"Chị đang nổi da gà đây.\nChị nói em mới để ý,\ntrông chị ấy khi rời khỏi nhà khác với lúc về nhà.","ko":"아, 나 완전 소름 돋았어\n그러고 보니까 강 언니...\n나갈 때랑 들어올 때랑 좀 달랐던 것 같기도 해요","en":"I got goosebumps.\nNow that I think of it,\nshe looked different than she did when she left the house.","text":"Chị đang nổi da gà đây.\nChị nói em mới để ý,\ntrông chị ấy khi rời khỏi nhà khác với lúc về nhà.\n아, 나 완전 소름 돋았어\n그러고 보니까 강 언니...\n나갈 때랑 들어올 때랑 좀 달랐던 것 같기도 해요\nI got goosebumps.\nNow that I think of it,\nshe looked different than she did when she left the house.","sourceUid":"merged-mrlp8z80-53","sourceNo":107,"viRanges":[{"start":465.651808,"end":476.757729}],"koRanges":[{"start":506.63963,"end":516.150348}]},{"id":212,"readerNo":213,"displayNo":"N163","n":"N163","kind":"narration","type":"narration","vi":"•Chèn 〉〉","ko":"•인서트 〉〉","en":"•Insert 〉〉","text":"•Chèn 〉〉\n•인서트 〉〉\n•Insert 〉〉","sourceUid":"nar-mrna6x6f-vz3h2y","sourceNo":"N163","viRanges":[],"koRanges":[]},{"id":213,"readerNo":214,"displayNo":"N164","n":"N164","kind":"narration","type":"dialogue","vi":"Kang Ina: (đi giày) Tôi đi rồi quay lại.","ko":"강이나: (신발 신으면 anges":[]},{"id":222,"readerNo":223,"displayNo":"N172","n":"N172","kind":"narration","type":"narration","vi":"Hình dạng đầu cũng được kiểm tra. Kiểm tra túi của bạn quá!","ko":"머리 모양도 체크된다. 가방에도 체크!","en":"Head shape is also checked. Check your bag too!","text":"Hình dạng đầu cũng được kiểm tra. Kiểm tra túi của bạn quá!\n머리 모양도 체크된다. 가방에도 체크!\nHead shape is also checked. Check your bag too!","sourceUid":"nar-mrna7zk8-z2muk5","sourceNo":"N172","viRanges":[],"koRanges":[]},{"id":223,"readerNo":224,"displayNo":166,"n":166,"kind":"sub","type":"merged","vi":"[tiếng giày]\n[Hiệu ứng âm thanh bíp]\n[Tiếng mở rèm]","ko":"[구두 소리]\n[효과음 삐용]\n[커튼 열리는 소리]","en":"[shoe sound]\n[Sound effect beeping]\n[Sound of curtain opening]","text":"[tiếng giày]\n[Hiệu ứng âm thanh bíp]\n[Tiếng mở rèm]\n[구두 소리]\n[효과음 삐용]\n[커튼 열리는 소리]\n[shoe sound]\n[Sound effect beeping]\n[Sound of curtain opening]","sourceUid":"merged-mrlpdleq-57","sourceNo":166,"viRanges":[],"koRanges":[{"start":524.030639,"end":548.600368}]},{"id":224,"readerNo":225,"displayNo":"115","n":"115","kind":"sub","type":"merged","vi":"Mị đi đây. Mị về rồi. - Em không biết nữa. - Gì vậy trời?\nCũng phải. Chị ấy học Quản trị Kinh doanh mà lại không biết Piketty. Piketty là gì?","ko":"나 갔다 올게\n(강이나) 나 왔어\n잘 모르겠어요\n뭐야?\n하긴 피케티도 몰랐잖아 경영학관데...\n피케티가 뭔데?","en":"I'm leaving. I'm back. -I'm not sure. -What was that?\nThen again, she didn't even know Piketty when she claims to be a business major. What's Piketty?","text":"Mị đi đây. Mị về rồi. - Em không biết nữa. - Gì vậy trời?\nCũng phải. Chị ấy học Quản trị Kinh doanh mà lại không biết Piketty. Piketty là gì?\n나 갔다 올게\n(강이나) 나 왔어\n잘 모르겠어요\n뭐야?\n하긴 피케티도 몰랐잖아 경영학관데...\n피케티가 뭔데?\nI'm leaving. I'm back. -I'm not sure. -What was that?\nThen again, she didn't even know Piketty when she claims to be a business major. What's Piketty?","sourceUid":"merged-mrlpd84b-56","sourceNo":115,"viRanges":[{"start":486.827794,"end":510.799509}],"koRanges":[]},{"id":225,"readerNo":226,"displayNo":"120","n":"120","kind":"sub","type":"merged","vi":"Thomas Piketty. Nhà kinh tế học. Tớ học Thực phẩm và Dinh dưỡng thì sao mà biết được?\nEm cũng không biết nhỉ? Tác giả cuốn Tư Bản Thế Kỷ 21 .","ko":"토마 피케티\n경제학자\n야! 식영과가 경제학자를 어떻게 아냐?\n너도 모르지?\n‘21세기 자본론’","en":"Thomas Piketty. The economist. I study nutrition. How would I know that?\nYou don't know that either, do you? Capital in the 21st Century.","text":"Thomas Piketty. Nhà kinh tế học. Tớ học Thực phẩm và Dinh dưỡng thì sao mà biết được?\nEm cũng không biết nhỉ? Tác giả cuốn Tư Bản Thế Kỷ 21 .\n토마 피케티\n경제학자\n야! 식영과가 경제학자를 어떻게 아냐?\n너도 모르지?\n‘21세기 자본론’\nThomas Piketty. The economist. I study nutrition. How would I know that?\nYou don't know that either, do you? Capital in the 21st Century.","sourceUid":"merged-mrlpene7-58","sourceNo":120,"viRanges":[{"start":510.799509,"end":520.519963}],"koRanges":[{"start":548.600368,"end":558.474852}]},{"id":226,"readerNo":227,"displayNo":123,"n":123,"kind":"sub","type":"merged","vi":"Đồ vô tri. Cậu cũng là hàng dỏm đúng không?\nNếu chị ấy không phải sinh viên thì không cần kiếm học phí.\nCũng có vẻ không phải là gửi tiền về nhà.","ko":"무식해, 무식해\n너도 가짜지?\n학생이 아니면 등록금 벌려고 그런 것도 아니고…\n집에 돈 보내는 거 같지도 않았지?","en":"So dumb. You're a phony too, aren't you?\nIt can't be about tuition, since she's not a student.\nIt didn't look like she was sending money home.","text":"Đồ vô tri. Cậu cũng là hàng dỏm đúng không?\nNếu chị ấy không phải sinh viên thì không cần kiếm học phí.\nCũng có vẻ không phải là gửi tiền về nhà.\n무식해, 무식해\n너도 가짜지?\n학생이 아니면 등록금 벌려고 그런 것도 아니고…\n집에 돈 보내는 거 같지도 않았지?\nSo dumb. You're a phony too, aren't you?\nIt can't be about tuition, since she's not a student.\nIt didn't look like she was sending money home.","sourceUid":"merged-mrlpjylq-59","sourceNo":123,"viRanges":[{"start":520.519963,"end":530.697299}],"koRanges":[{"start":558.474852,"end":567.814149}]},{"id":227,"readerNo":228,"displayNo":"186","n":"186","kind":"sub","type":"merged","vi":"Vậy thì lý do là gì? Để sống nhàn hạ hơn. Nhưng vẫn… Nhiều sinh viên ngày nay cũng vậy mà.\nHọ làm \"bạn gái\" để kiếm tiền. Trời đất ơi. Thế giới này vận hành thế nào vậy?","ko":"근데, 왜 그랬대?\n쉽게 살려고!\n그치만...\n요새 대학생 중에도 그런 애들 꽤 있다잖아\n용돈 받고 애인해주는 애들\n세상에...\n세상이 어떻게 되려고 이러나 몰라...","en":"Why did she do it? To have an easy life. But still... There are lots of college students like that,\nthey'd be \"girlfriends\" for money. Goodness. What's the world turning into?","text":"Vậy thì lý do là gì? Để sống nhàn hạ hơn. Nhưng vẫn… Nhiều sinh viên ngày nay cũng vậy mà.\nHọ làm \"bạn gái\" để kiếm tiền. Trời đất ơi. Thế giới này vận hành thế nào vậy?\n근데, 왜 그랬대?\n쉽게 살려고!\n그치만...\n요새 대학생 중에도 그런 애들 꽤 있다잖아\n용돈 받고 애인해주는 애들\n세상에...\n세상이 어떻게 되려고 이러나 몰라...\nWhy did she do it? To have an easy life. But still... There are lots of college students like that,\nthey'd be \"girlfriends\" for money. Goodness. What's the world turning into?","sourceUid":"merged-mrlpm19j-62","sourceNo":186,"viRanges":[{"start":530.697299,"end":543.555362}],"koRanges":[{"start":567.814149,"end":582.372743}]},{"id":228,"readerNo":229,"displayNo":"193","n":"193","kind":"sub","type":"merged","vi":"[Cười] [Tiếng đóng cửa] [Tiếng cửa kêu cót két]","ko":"[웃는다] [문 닫는 소리] [삑삑삑 문 소리]","en":"[Laughs] [Sound of door closing] [Sound of door squeaking]","text":"[Cười] [Tiếng đóng cửa] [Tiếng cửa kêu cót két]\n[웃는다] [문 닫는 소리] [삑삑삑 문 소리]\n[Laughs] [Sound of door closing] [Sound of door squeaking]","sourceUid":"merged-mrlpot7e-64","sourceNo":193,"viRanges":[],"koRanges":[]},{"id":229,"readerNo":230,"displayNo":"135","n":"135","kind":"sub","type":"merged","vi":"Tớ lại vừa càm ràm như bà già nhỉ? Chuyện xưa như trái đất rồi mà. Đánh nhau không? Tiền bối Yoon. Nghe nói chị Yi Na không phải sinh viên. Thật sao?","ko":"헉! 나 방금 완전 아줌마 같았지?\n어제 오늘 일도 아니면서 놀래기는...\n우씨, 싸울래...\n윤 선배!\n강 언니 있잖아, 대학생 아니래\n그래?","en":"I was totally an old lady just now, wasn't I? It isn't anything new. Are you going to fight me? Jin-Myung. Yi-Na isn't a college student. Really?","text":"Tớ lại vừa càm ràm như bà già nhỉ? Chuyện xưa như trái đất rồi mà. Đánh nhau không? Tiền bối Yoon. Nghe nói chị Yi Na không phải sinh viên. Thật sao?\n헉! 나 방금 완전 아줌마 같았지?\n어제 오늘 일도 아니면서 놀래기는...\n우씨, 싸울래...\n윤 선배!\n강 언니 있잖아, 대학생 아니래\n그래?\nI was totally an old lady just now, wasn't I? It isn't anything new. Are you going to fight me? Jin-Myung. Yi-Na isn't a college student. Really?","sourceUid":"merged-mrlpnk0f-63","sourceNo":135,"viRanges":[{"start":543.555362,"end":562.762234}],"koRanges":[{"start":582.372743,"end":599.883516}]},{"id":230,"readerNo":231,"displayNo":139,"n":139,"kind":"sub","type":"merged","vi":"Ji Won nhờ bạn tìm hiểu hộ.\nHọ nói không có sinh viên nào tên như vậy.\nNghe bàng hoàng nhỉ? Ai lại làm như vậy chứ?\nTại sao chị ấy không bất ngờ?","ko":"송이 친구한테 알아봤는데\n대학교에 뭐 그런 과에 그런 이름 없대\n완전 말도 안 되지...\n어떻게 그럴 수가 있어?\n뭐야? 왜 안 놀래?","en":"Ji-Won had her friend look into it. There's no one with a name like that. Isn't it ridiculous? Who does that? Why isn't she surprised?","text":"Ji Won nhờ bạn tìm hiểu hộ.\nHọ nói không có sinh viên nào tên như vậy.\nNghe bàng hoàng nhỉ? Ai lại làm như vậy chứ?\nTại sao chị ấy không bất ngờ?\n송이 친구한테 알아봤는데\n대학교에 뭐 그런 과에 그런 이름 없대\n완전 말도 안 되지...\n어떻게 그럴 수가 있어?\n뭐야? 왜 안 놀래?\nJi-Won had her friend look into it. There's no one with a name like that. Isn't it ridiculous? Who does that? Why isn't she surprised?","sourceUid":"merged-mrlpqklj-67","sourceNo":139,"viRanges":[{"start":562.762234,"end":579.611665},{"start":562.762234,"end":571.168021}],"koRanges":[{"start":599.883516,"end":615.809502},{"start":599.883516,"end":609.574945}]},{"id":231,"readerNo":232,"displayNo":201,"n":201,"kind":"sub","type":"merged","vi":"","ko":"[기괴한 음악 시작]","en":"","text":"[기괴한 음악 시작]","sourceUid":"ko-mrli6nms-936","sourceNo":201,"viRanges":[],"koRanges":[]},{"id":232,"readerNo":233,"displayNo":205,"n":205,"kind":"sub","type":"merged","vi":"[Âm thanh ăn bánh quy]","ko":"[과자 먹는 소리]","en":"[Sound of eating cookies]","text":"[Âm thanh ăn bánh quy]\n[과자 먹는 소리]\n[Sound of eating cookies]","sourceUid":"ko-mrli6nms-940","sourceNo":205,"viRanges":[],"koRanges":[]},{"id":233,"readerNo":234,"displayNo":143,"n":143,"kind":"sub","type":"merged","vi":"Người ta gọi là poker face . Chắc chị ấy cũng bất ngờ lắm.\nPoker face dành cho người chơi xì tố thôi.\nSao vậy? Có chuyện gì hả?","ko":"포커페이스라 그래 나름 놀랬을 거야 포커페이스는 포커 칠 때나 쓰지 아무 때나... 왜? 왜 그래?","en":"It's called poker face. She's probably surprised.\nPoker face is for poker game.\nWhy? What's wrong?","text":"Người ta gọi là poker face . Chắc chị ấy cũng bất ngờ lắm.\nPoker face dành cho người chơi xì tố thôi.\nSao vậy? Có chuyện gì hả?\n포커페이스라 그래 나름 놀랬을 거야 포커페이스는 포커 칠 때나 쓰지 아무 때나... 왜? 왜 그래?\nIt's called poker face. She's probably surprised.\nPoker face is for poker game.\nWhy? What's wrong?","sourceUid":"merged-mrlptyjc-69","sourceNo":143,"viRanges":[{"start":579.611665,"end":587.890797}],"koRanges":[{"start":615.809502,"end":626.708368}]},{"id":234,"readerNo":235,"displayNo":146,"n":146,"kind":"sub","type":"merged","vi":"Các linh hồn có màu không?\nChị nói biết chị Yi Na nói dối thông qua màu sắc mà.\nĐúng rồi. Ma quỷ có màu không?","ko":"영혼에게도 색깔이 있어요?\n강 언니가 거짓말하는 거\n오라의 색깔로 알았다고 했잖아요\n맞다, 맞다 귀신한테도 색깔이 있어?","en":"Do souls have colors?\nYou said you know Yi-Na was lying because of the color.\nRight. Do ghosts have colors?","text":"Các linh hồn có màu không?\nChị nói biết chị Yi Na nói dối thông qua màu sắc mà.\nĐúng rồi. Ma quỷ có màu không?\n영혼에게도 색깔이 있어요?\n강 언니가 거짓말하는 거\n오라의 색깔로 알았다고 했잖아요\n맞다, 맞다 귀신한테도 색깔이 있어?\nDo souls have colors?\nYou said you know Yi-Na was lying because of the color.\nRight. Do ghosts have colors?","sourceUid":"merged-mrlugn34-71","sourceNo":146,"viRanges":[{"start":587.890797,"end":601.782135}],"koRanges":[{"start":626.708368,"end":639.912805}]},{"id":235,"readerNo":236,"displayNo":"150","n":"150","kind":"sub","type":"merged","vi":"Màu gì vậy? Màu xám. Nó u uất. Và buồn. Cảm giác kiểu như vậy.\nTại sao? Lý do nó buồn rầu và u uất là gì?","ko":"무슨 색인데?잿빛\n어...우울하고...슬프고...뭐 그런 느낌?\n왜? 왜? 왜 슬프고, 왜 우울한데?","en":"What color is it? Grey. It's depressed. And sad. That sort of vibe.\nWhy? Why is it sad and depressed?","text":"Màu gì vậy? Màu xám. Nó u uất. Và buồn. Cảm giác kiểu như vậy.\nTại sao? Lý do nó buồn rầu và u uất là gì?\n무슨 색인데?잿빛\n어...우울하고...슬프고...뭐 그런 느낌?\n왜? 왜? 왜 슬프고, 왜 우울한데?\nWhat color is it? Grey. It's depressed. And sad. That sort of vibe.\nWhy? Why is it sad and depressed?","sourceUid":"merged-mrluleaq-73","sourceNo":150,"viRanges":[{"start":610,"end":632.80726},{"start":610,"end":626.450434}],"koRanges":[{"start":649,"end":670.836003},{"start":649,"end":668.390567}]},{"id":236,"readerNo":237,"displayNo":"156","n":"156","kind":"sub","type":"merged","vi":"Điều đó thì chịu. Tiền bối Yoon! Ma có nghe thấy những điều chúng ta đang nói không? Tớ không chắc.","ko":"그거야 나야 모르지\n윤 선배! 우리가 하는 얘기\n귀신도 들어? 글쎄...","en":"I wouldn't know. Jin-Myung! Do ghosts hear what we say? I'm not sure.","text":"Điều đó thì chịu. Tiền bối Yoon! Ma có nghe thấy những điều chúng ta đang nói không? Tớ không chắc.\n그거야 나야 모르지\n윤 선배! 우리가 하는 얘기\n귀신도 들어? 글쎄...\nI wouldn't know. Jin-Myung! Do ghosts hear what we say? I'm not sure.","sourceUid":"merged-mrlumr2i-75","sourceNo":156,"viRanges":[{"start":632.80726,"end":648.977073}],"koRanges":[{"start":670.836003,"end":686.782315}]},{"id":237,"readerNo":238,"displayNo":"224","n":"224","kind":"sub","type":"merged","vi":"[bản nhạc kỳ lạ kết thúc] [Tiếng đóng cửa]","ko":"[기괴한 음악 끝]\n[문 닫는 소리]","en":"[bizarre music ends] [Sound of door closing]","text":"[bản nhạc kỳ lạ kết thúc] [Tiếng đóng cửa]\n[기괴한 음악 끝]\n[문 닫는 소리]\n[bizarre music ends] [Sound of door closing]","sourceUid":"merged-mrlunvkm-76","sourceNo":224,"viRanges":[],"koRanges":[]},{"id":238,"readerNo":239,"displayNo":"161","n":"161","kind":"sub","type":"merged","vi":"Trước đây nhà này từng xảy ra sự cố gì chưa? Có người chết chẳng hạn? Hay bị giết? Không có. Vậy thì là gì nhỉ?","ko":"전에 이 집에 무슨 사건 사고 같은 거 없었어?\n뭐 누가 죽었다든가\n살해됐다든가...?\n아니\n그럼 뭐지?","en":"Did anything happen in this house before? Did anyone die? Or murdered? No. Then what is it?","text":"Trước đây nhà này từng xảy ra sự cố gì chưa? Có người chết chẳng hạn? Hay bị giết? Không có. Vậy thì là gì nhỉ?\n전에 이 집에 무슨 사건 사고 같은 거 없었어?\n뭐 누가 죽었다든가\n살해됐다든가...?\n아니\n그럼 뭐지?\nDid anything happen in this house before? Did anyone die? Or murdered? No. Then what is it?","sourceUid":"merged-mrluoyw9-78","sourceNo":161,"viRanges":[{"start":648.977073,"end":664.574979}],"koRanges":[{"start":686.782315,"end":702.775059}]},{"id":239,"readerNo":240,"displayNo":230,"n":230,"kind":"sub","type":"merged","vi":"[Tiếng nước đổ]","ko":"[물 붓는 소리]","en":"[Sound of pouring water]","text":"[Tiếng nước đổ]\n[물 붓는 소리]\n[Sound of pouring water]","sourceUid":"ko-mrli6nms-965","sourceNo":230,"viRanges":[],"koRanges":[]},{"id":240,"readerNo":241,"displayNo":"233","n":"233","kind":"sub","type":"merged","vi":"Có thể họ theo Eun Jae về đây. Nghĩ mà xem. Họ mới xuất hiện gần đây, sau khi em đến mà.","ko":"은재, 너 따라왔나 보다\n그렇잖아. 최근에 나타났다며? 너 오고 나서부터...\n아...","en":"Maybe it followed you here, Eun-Jae. Think about it. It appeared after you moved in.","text":"Có thể họ theo Eun Jae về đây. Nghĩ mà xem. Họ mới xuất hiện gần đây, sau khi em đến mà.\n은재, 너 따라왔나 보다\n그렇잖아. 최근에 나타났다며? 너 오고 나서부터...\n아...\nMaybe it followed you here, Eun-Jae. Think about it. It appeared after you moved in.","sourceUid":"merged-mrluqvby-79","sourceNo":233,"viRanges":[{"start":664.574979,"end":674.524747}],"koRanges":[{"start":702.775059,"end":712.981094}]},{"id":241,"readerNo":242,"displayNo":164,"n":164,"kind":"sub","type":"merged","vi":"Có người quen nào của em đã qua đời không?\nCũng có thể là người chưa chết.","ko":"혹시 죽은 사람 중에 아는 사람 있어?\n아직 안 죽은 사람일지도 몰라","en":"Did anyone you know die?\nIt could be someone who didn't die yet.","text":"Có người quen nào của em đã qua đời không?\nCũng có thể là người chưa chết.\n혹시 죽은 사람 중에 아는 사람 있어?\n아직 안 죽은 사람일지도 몰라\nDid anyone you know die?\nIt could be someone w  đến đây. Tôi biết. Tôi đâu hợp ở đây nhỉ?\nChúng ta giống nhau.","ko":"왜요? 미안합니다 아저씨는 여길 왜 와요? 이런 데랑 별로 안 친해 보이는데... 그렇죠?\n잘 안 어울리죠? 뭐...나랑 비슷하네","en":"What? I'm sorry. Why do you come here? You don't look like you come here often. I know.\nI don't, do I? We're similar in that way.","text":"Sao thế? Tôi xin lỗi. Chú đến đây làm gì? Chú có vẻ không hay đến đây. Tôi biết. Tôi đâu hợp ở đây nhỉ?\nChúng ta giống nhau.\n왜요? 미안합니다 아저씨는 여길 왜 와요? 이런 데랑 별로 안 친해 보이는데... 그렇죠?\n잘 안 어울리죠? 뭐...나랑 비슷하네\nWhat? I'm sorry. Why do you come here? You don't look like you come here often. I know.\nI don't, do I? We're similar in that way.","sourceUid":"merged-mrlven0c-93","sourceNo":182,"viRanges":[{"start":872,"end":884.572789}],"koRanges":[{"start":908,"end":932.792371}]},{"id":285,"readerNo":286,"displayNo":"N207","n":"N207","kind":"narration","type":"narration","vi":"•Nhảy 〉〉","ko":"•점프 〉〉","en":"•Jump 〉〉","text":"•Nhảy 〉〉\n•점프 〉〉\n•Jump 〉〉","sourceUid":"nar-mrnblu5h-mk0fae","sourceNo":"N207","viRanges":[],"koRanges":[]},{"id":286,"readerNo":287,"displayNo":"N208","n":"N208","kind":"narration","type":"narration","vi":"Băng gần như đã tan chảy.","ko":"얼음이 거의 녹았다.","en":"The ice has almost melted.","text":"Băng gần như đã tan chảy.\n얼음이 거의 녹았다.\nThe ice has almost melted.","sourceUid":"nar-mrnblxuc-4t2mld","sourceNo":"N208","viRanges":[],"koRanges":[]},{"id":287,"readerNo":288,"displayNo":"N209","n":"N209","kind":"narration","type":"narration","vi":"Kang Ina vẫn ngồi đối diện cô và kể lại tình hình từ trước đến nay.","ko":"강이나는 여전히 한 자리 건너 앉은 채로 지금까지의 상황을 이야기했다.","en":"Kang Ina was still sitting across from her and talked about the situation so far.","text":"Kang Ina vẫn ngồi đối diện cô và kể lại tình hình từ trước đến nay.\n강이나는 여전히 한 자리 건너 앉은 채로 지금까지의 상황을 이야기했다.\nKang Ina was still sitting across from her and talked about the situation so far.","sourceUid":"nar-mrnblylb-f6i5h5","sourceNo":"N209","viRanges":[],"koRanges":[]},{"id":288,"readerNo":289,"displayNo":"N210","n":"N210","kind":"narration","type":"narration","vi":"Có 1 bà cô đang liếc nhìn Kang Ina.","ko":"마담이 강이나를 슬쩍 본다.","en":"Madame glances at Kang Ina.","text":"Có 1 bà cô đang liếc nhìn Kang Ina.\n마담이 강이나를 슬쩍 본다.\nMadame glances at Kang Ina.","sourceUid":"nar-mrnbml8g-asg7yo","sourceNo":"N210","viRanges":[],"koRanges":[]},{"id":289,"readerNo":290,"displayNo":"N211","n":"N211","kind":"narration","type":"narration","vi":"Họ có thể lo lắng rằng họ đang làm việc cho một người có vẻ như không có tiền.","ko":"돈이 없어 보이는 사람에게 작업을 하는 것 같아 걱정하는 건지도 모른다.","en":"They may be worried that they are working for someone who appears to have no money.","text":"Họ có thể lo lắng rằng họ đang làm việc cho một người có vẻ như không có tiền.\n돈이 없어 보이는 사람에게 작업을 하는 것 같아 걱정하는 건지도 모른다.\nThey may be worried that they are working for someone who appears to have no money.","sourceUid":"nar-mrnbmn0m-2imcdm","sourceNo":"N211","viRanges":[],"koRanges":[]},{"id":290,"readerNo":291,"displayNo":"N212","n":"N212","kind":"narration","type":"narration","vi":"Trong khi Kang Ina và Oh Jong-gyu đang nói chuyện, họ cũng hướng dẫn người phục vụ quầy bar làm điều gì đó.","ko":"강이나와 오종규가 이야기를 나누는 동안 바텐더에게 뭔가 일을 지시하기도 한다.","en":"While Kang Ina and Oh Jong-gyu are talking, they also instruct the bartender to do something.","text":"Trong khi Kang Ina và Oh Jong-gyu đang nói chuyện, họ cũng hướng dẫn người phục vụ quầy bar làm điều gì đó.\n강이나와 오종규가 이야기를 나누는 동안 바텐더에게 뭔가 일을 지시하기도 한다.\nWhile Kang Ina and Oh Jong-gyu are talking, they also instruct the bartender to do something.","sourceUid":"nar-mrnbmpdg-9e5lkh","sourceNo":"N212","viRanges":[],"koRanges":[]},{"id":291,"readerNo":292,"displayNo":"N213","n":"N213","kind":"narration","type":"dialogue","vi":"Kang Ina: (Khi nói, cô ấy rất phấn khích và sau đó lại trầm xuống, cảm xúc của cô ấy trở nên điên cuồng)","ko":"강이나: (말하면서 흥분했다가 다운됐다가 감정이 널을 뛴다)","en":"Kang Ina: (As she talks, she gets excited and then down, her emotions are running wild)","text":"Kang Ina: (Khi nói, cô ấy rất phấn khích và sau đó lại trầm xuống, cảm xúc của cô ấy trở nên điên cuồng)\n강이나: (말하면서 흥분했다가 다운됐다가 감정이 널을 뛴다)\nKang Ina: (As she talks, she gets excited and then down, her emotions are running wild)","sourceUid":"nar-mrnbmrq0-x6qqhr","sourceNo":"N213","viRanges":[],"koRanges":[]},{"id":292,"readerNo":293,"displayNo":"188","n":"188","kind":"sub","type":"merged","vi":"Có một nơi cũng không còn hợp với tôi nữa. Họ coi tôi như người bị sida!\nTôi thấy vừa mắc cười vừa bực bội. Đôi khi muốn đấm họ một trận.","ko":"나도 지금 안 어울리는 데 있거든요\n무슨 에이즈 환자 취급하는데...\n웃기기도 하고, 짜증도 나고\n그냥 한바탕 해버릴까 싶다가도...","en":"I don't belong here either. They treat me like an AIDS patient!\nIt's funny and annoying. Sometimes I want to fight them.","text":"Có một nơi cũng không còn hợp với tôi nữa. Họ coi tôi như người bị sida!\nTôi thấy vừa mắc cười vừa bực bội. Đôi khi muốn đấm họ một trận.\n나도 지금 안 어울리는 데 있거든요\n무슨 에이즈 환자 취급하는데...\n웃기기도 하고, 짜증도 나고\n그냥 한바탕 해버릴까 싶다가도...\nI don't belong here either. They treat me like an AIDS patient!\nIt's funny and annoying. Sometimes I want to fight them.","sourceUid":"merged-mrlvkfsd-95","sourceNo":188,"viRanges":[{"start":895.075141,"end":912.473556}],"koRanges":[{"start":932.792371,"end":949.723356}]},{"id":293,"readerNo":294,"displayNo":191,"n":191,"kind":"sub","type":"merged","vi":"Nhưng tôi hiểu tại sao họ làm vậy.\nTôi bực lắm.","ko":"뭐 또 아주 이해가 안 가는 것도 아니고... 아, 기분 아주 거지 같아요","en":"But I do understand why they act the way they do.\nIt feels so crappy.","text":"Nhưng tôi hiểu tại sao họ làm vậy.\nTôi bực lắm.\n뭐 또 아주 이해가 안 가는 것도 아니고... 아, 기분 아주 거지 같아요\nBut I do understand why they act the way they do.\nIt feels so crappy.","sourceUid":"merged-mrlvld2k-96","sourceNo":191,"viRanges":[{"start":912.473556,"end":918.973219}],"koRanges":[{"start":949.723356,"end":956.022948}]},{"id":294,"readerNo":295,"displayNo":"194","n":"194","kind":"sub","type":"merged","vi":"Nhưng cô sẵn sàng kể với tôi những chuyện đó sao? Chuyện gì?\nChuyện tôi có bồ bao nuôi á? Sao lại không? Tôi cũng đâu có ý định quen chú.\nChú từng muốn hẹn hò với tôi à? Không đâu.","ko":"근데... 그런 얘기 나한테 해도 되나?\n뭐요? 나 스폰 애인 있다는 거요? 쳇, 뭐 어때요? 아저씨랑 연애할 것도 아닌데\n아, 혹시 나랑 연애하고 싶었어요? 아니... 아니...","en":"But is it okay to tell me this? Tell you what?\nThat I have boyfriends who pay me? Why can't I tell you? It's not like I'm going to date you.\nDid you want to date me? No, it's not that.","text":"Nhưng cô sẵn sàng kể với tôi những chuyện đó sao? Chuyện gì?\nChuyện tôi có bồ bao nuôi á? Sao lại không? Tôi cũng đâu có ý định quen chú.\nChú từng muốn hẹn hò với tôi à? Không đâu.\n근데... 그런 얘기 나한테 해도 되나?\n뭐요? 나 스폰 애인 있다는 거요? 쳇, 뭐 어때요? 아저씨랑 연애할 것도 아닌데\n아, 혹시 나랑 연애하고 싶었어요? 아니... 아니...\nBut is it okay to tell me this? Tell you what?\nThat I have boyfriends who pay me? Why can't I tell you? It's not like I'm going to date you.\nDid you want to date me? No, it's not that.","sourceUid":"merged-mrlvp0j8-100","sourceNo":194,"viRanges":[{"start":918.973219,"end":934.263575}],"koRanges":[{"start":956.022948,"end":982.772336},{"start":956.022948,"end":978.833651}]},{"id":295,"readerNo":296,"displayNo":"200","n":"200","kind":"sub","type":"merged","vi":"Sao thế? Chú không thèm đứa lăng loàn như tôi chứ gì? Sao cô nói vậy?\nVì người ta đối xử với tôi như vậy. Từ nay cô định làm gì? Dọn ra khỏi căn nhà đó à?","ko":"왜요? 나 같은 걸레는 싫어요?\n왜 그렇게 말해요? 그런 대접을 받으니까...\n이제 어떡할 건가? 그 집에서 나올 건가?","en":"Why? You don't want a slut like me? Why would you say that? Because people treat me like one.\nWhat are you going to do? Will you move out of that house?","text":"Sao thế? Chú không thèm đứa lăng loàn như tôi chứ gì? Sao cô nói vậy?\nVì người ta đối xử với tôi như vậy. Từ nay cô định làm gì? Dọn ra khỏi căn nhà đó à?\n왜요? 나 같은 걸레는 싫어요?\n왜 그렇게 말해요? 그런 대접을 받으니까...\n이제 어떡할 건가? 그 집에서 나올 건가?\nWhy? You don't want a slut like me? Why would you say that? Because people treat me like one.\nWhat are you going to do? Will you move out of that house?","sourceUid":"merged-mrlvpum4-101","sourceNo":200,"viRanges":[{"start":934.263575,"end":959.925345}],"koRanges":[{"start":982.772336,"end":997.319857}]},{"id":296,"readerNo":297,"displayNo":"297","n":"297","kind":"sub","type":"merged","vi":"Nếu họ đuổi thì tôi đi. Nhưng tại sao tôi phải dọn đi?\nTôi đã làm gì sai chứ? - Cô nói dối. - Đến mức đó chắc?","ko":"나가라면 나가야죠 아, 그치만 내가 왜 나가야 돼?\n내가 뭘 잘못했다고? 거짓말했잖아요 그까짓 거?","en":"I will, if they tell me to. But why do I have to? What did I do wrong? -You lied. -So?","text":"Nếu họ đuổi thì tôi đi. Nhưng tại sao tôi phải dọn đi?\nTôi đã làm gì sai chứ? - Cô nói dối. - Đến mức đó chắc?\n나가라면 나가야죠 아, 그치만 내가 왜 나가야 돼?\n내가 뭘 잘못했다고? 거짓말했잖아요 그까짓 거?\nI will, if they tell me to. But why do I have to? What did I do wrong? -You lied. -So?","sourceUid":"merged-mrlvrsnj-102","sourceNo":297,"viRanges":[{"start":959.925345,"end":968.55047}],"koRanges":[{"start":997.319857,"end":1006.259554}]},{"id":297,"readerNo":298,"displayNo":"210","n":"210","kind":"sub","type":"merged","vi":"Chú nghĩ họ không nói dối à? Họ nói dối nhiều hơn tôi.\nHọ xin bố mẹ tiền để học thêm. Họ bảo đi thực tế với giáo sư nhưng lại đi với bồ.\nQuần áo, giày dép và mỹ phẩm của tôi.","ko":"뭐 걔들은 거짓말 안 하고 사는 줄 알아요? 걔들이 더 해요\n학원 간다고 돈 뜯어내고\n교수님이랑 답사 간다고 애인이랑 놀러 가고\n내 옷, 내 신발, 내 화장품...","en":"Do you think they don't? They lie more than I do. They ask their parents for money to take classes.\nThey say they're on a field trip but they're with their boyfriends. My clothes, shoes, and makeup,","text":"Chú nghĩ họ không nói dối à? Họ nói dối nhiều hơn tôi.\nHọ xin bố mẹ tiền để học thêm. Họ bảo đi thực tế với giáo sư nhưng lại đi với bồ.\nQuần áo, giày dép và mỹ phẩm của tôi.\n뭐 걔들은 거짓말 안 하고 사는 줄 알아요? 걔들이 더 해요\n학원 간다고 돈 뜯어내고\n교수님이랑 답사 간다고 애인이랑 놀러 가고\n내 옷, 내 신발, 내 화장품...\nDo you think they don't? They lie more than I do. They ask their parents for money to take classes.\nThey say they're on a field trip but they're with their boyfriends. My clothes, shoes, and makeup,","sourceUid":"merged-mrlvu4ug-104","sourceNo":210,"viRanges":[{"start":968.55047,"end":980.590016}],"koRanges":[{"start":1006.259554,"end":1018.661912}]},{"id":298,"readerNo":299,"displayNo":"N214","n":"N214","kind":"narration","type":"dialogue","vi":"Kang Ina: (Tôi chưa nghĩ tới chuyện đó. Cô ấy lặng lẽ nhìn xuống ly của mình)...","ko":"강이나: (그 생각은 안 해봤다. 조용히 자기 잔을 내려다본다)···.","en":"Kang Ina: (I haven’t thought about that. She quietly looks down at her glass)...","text":"Kang Ina: (Tôi chưa nghĩ tới chuyện đó. Cô ấy lặng lẽ nhìn xuống ly của mình)...\n강이나: (그 생각은 안 해봤다. 조용히 자기 잔을 내려다본다)···.\nKang Ina: (I haven’t thought about that. She quietly looks down at her glass)...","sourceUid":"nar-mrnboo5z-z951va","sourceNo":"N214","viRanges":[],"koRanges":[]},{"id":299,"readerNo":300,"displayNo":"N216","n":"N216","kind":"narration","type":"dialogue","vi":"Kang Ina: (Nhìn ly rượu đã tan đá. Tôi cũng không biết tại sao)...","ko":"강이나: (얼음이 녹아버린 술잔을 물끄러미 바라본다. 자신도 이유를 모르겠다)···.","en":"Kang Ina: (Looks at the glass of alcohol where the ice has melted. I don’t even know why)...","text":"Kang Ina: (Nhìn ly rượu đã tan đá. Tôi cũng không biết tại sao)...\n강이나: (얼음이 녹아버린 술잔을 물끄러미 바라본다. 자신도 이유를 모르겠다)···.\nKang Ina: (Looks at the glass of alcohol where the ice has melted. I don’t even know why)...","sourceUid":"nar-mrnbp4h8-7ivpg7","sourceNo":"N216","viRanges":[],"koRanges":[]},{"id":300,"readerNo":301,"displayNo":"N215","n":"N215","kind":"narration","type":"dialogue","vi":"Oh Jong-gyu: (nhấm nháp đồ uống và nhìn Kang Ina)...","ko":"오종규: (술을 홀짝이며 강이나를 바라본다)···.","en":"Oh Jong-gyu: (sipping his drink and looking at Kang Ina)...","text":"Oh Jong-gyu: (nhấm nháp đồ uống và nhìn Kang Ina)...\n오종규: (술을 홀짝이며 강이나를 바라본다)···.\nOh Jong-gyu: (sipping his drink and looking at Kang Ina)...","sourceUid":"nar-mrnbp2ut-2mlff1","sourceNo":"N215","viRanges":[],"koRanges":[]},{"id":301,"readerNo":302,"displayNo":212,"n":212,"kind":"sub","type":"merged","vi":"Họ tự tiện dùng nhưng cứ chối đây đẩy.\nNếu tính kiểu đó thì tôi đâu nói dối nhiều bằng họ.\nTôi nói với khách rằng tôi không phải sinh viên.","ko":"제 맘대로 쓰고, 아니라 그러고...\n그렇게 따지면 난 진짜 거짓말 안 하는 편이에요\n내 손님들한테도 얘기했어요 나 대학생 아니라고...","en":"they use it whenever they want to and lie about it.\nI don't really lie compared to them.\nI tell my clients that I'm not a student.","text":"Họ tự tiện dùng nhưng cứ chối đây đẩy.\nNếu tính kiểu đó thì tôi đâu nói dối nhiều bằng họ.\nTôi nói với khách rằng tôi không phải sinh viên.\n제 맘대로 쓰고, 아니라 그러고...\n그렇게 따지면 난 진짜 거짓말 안 하는 편이에요\n내 손님들한테도 얘기했어요 나 대학생 아니라고...\nthey use it whenever they want to and lie about it.\nI don't really lie compared to them.\nI tell my clients that I'm not a student.","sourceUid":"merged-mrlvv52g-105","sourceNo":212,"viRanges":[{"start":980.590016,"end":993.642058}],"koRanges":[{"start":1018.661912,"end":1032.820279}]},{"id":302,"readerNo":303,"displayNo":"215","n":"215","kind":"sub","type":"merged","vi":"Và những người làm nghề giống tôi, họ nói dối mình là sinh viên.\nVì làm vậy dễ kiếm tiền hơn.","ko":"그리고 나랑 같은 일 하는 애들\n다 대학생이라고 거짓말해요\n그래야 돈 타기가 쉽거든","en":"And the people that do the same job, they lie that they're in college,\nbecause that makes it easier for them to get money.","text":"Và những người làm nghề giống tôi, họ nói dối mình là sinh viên.\nVì làm vậy dễ kiếm tiền hơn.\n그리고 나랑 같은 일 하는 애들\n다 대학생이라고 거짓말해요\n그래야 돈 타기가 쉽거든\nAnd the people that do the same job, they lie that they're in college,\nbecause that makes it easier for them to get money.","sourceUid":"merged-mrlydg6w-107","sourceNo":215,"viRanges":[],"koRanges":[{"start":1032.820279,"end":1042.552342}]},{"id":303,"readerNo":304,"displayNo":"219","n":"219","kind":"sub","type":"merged","vi":"So với họ thì tôi quá trung thực. Thật là bực bội. Chú cười nhạo tôi à?\nKhông. Tôi không cười cô.","ko":"그에 비하면 난 진짜 정직의 화신이죠\n기분 나빠\n지금 비웃었죠?\n아니... 안 비웃었어요","en":"I'm very honest compared to them. I'm annoyed.\nYou laughed at me, didn't you? No, I didn't.","text":"So với họ thì tôi quá trung thực. Thật là bực bội. Chú cười nhạo tôi à?\nKhông. Tôi không cười cô.\n그에 비하면 난 진짜 정직의 화신이죠\n기분 나빠\n지금 비웃었죠?\n아니... 안 비웃었어요\nI'm very honest compared to them. I'm annoyed.\nYou laughed at me, didn't you? No, I didn't.","sourceUid":"merged-mrlyelfk-108","sourceNo":219,"viRanges":[{"start":1004.576406,"end":1014.79711}],"koRanges":[{"start":1042.552342,"end":1054.070215}]},{"id":304,"readerNo":305,"displayNo":"224","n":"224","kind":"sub","type":"merged","vi":"Tôi ấy mà… Mệt mỏi đến mấy cũng không nói dối. Nói dối thật sự rất mệt.\nVậy tại sao cô nói dối họ? Lý do gì khiến cô muốn ở lại đó đến mức phải nói dối?","ko":"난요 ... 피곤해서라도 거짓말 안 해요\n거짓말하는 게 얼마나 피곤한데...\n그 친구들한테는 왜 했어요?\n거짓말하면서까지\n그 집에서 살고 싶은 그런 이유가 있었나?","en":"I find... lying tiring. Lying is really tiring.\nThen why did you lie to them? What made you want to lie, so you could stay there?","text":"Tôi ấy mà… Mệt mỏi đến mấy cũng không nói dối. Nói dối thật sự rất mệt.\nVậy tại sao cô nói dối họ? Lý do gì khiến cô muốn ở lại đó đến mức phải nói dối?\n난요 ... 피곤해서라도 거짓말 안 해요\n거짓말하는 게 얼마나 피곤한데...\n그 친구들한테는 왜 했어요?\n거짓말하면서까지\n그 집에서 살고 싶은 그런 이유가 있었나?\nI find... lying tiring. Lying is really tiring.\nThen why did you lie to them? What made you want to lie, so you could stay there?","sourceUid":"merged-mrlyj0et-110","sourceNo":224,"viRanges":[{"start":1014.79711,"end":1035.227768}],"koRanges":[{"start":1054.070215,"end":1073.084786},{"start":1054.070215,"end":1070.457698}]},{"id":305,"readerNo":306,"displayNo":319,"n":319,"kind":"sub","type":"merged","vi":"[Rung điện thoại di động]","ko":"[핸드폰 진동]","en":"[Cellphone vibration]","text":"[Rung điện thoại di động]\n[핸드폰 진동]\n[Cellphone vibration]","sourceUid":"ko-mrli6nmt-1054","sourceNo":319,"viRanges":[],"koRanges":[]},{"id":306,"readerNo":307,"displayNo":"230","n":"230","kind":"sub","type":"merged","vi":"Chú đợi một lát. Alô? Anh à. Anh đang ở đâu vậy?\nTrước ngân hàng á? Vâng. Em đi ngay đây. Vâng.","ko":"잠깐만요.. 여보세요\n어, 오빠... 지금 어디야? 아, 은행 앞...\n어... 어, 나 지금 나가, 나가...\n응...","en":"Excuse me. Hello? Hi, honey. Where are you now?\nIn front of the bank? Yeah. I'm on my way now. Okay.","text":"Chú đợi một lát. Alô? Anh à. Anh đang ở đâu vậy?\nTrước ngân hàng á? Vâng. Em đi ngay đây. Vâng.\n잠깐만요.. 여보세요\n어, 오빠... 지금 어디야? 아, 은행 앞...\n어... 어, 나 지금 나가, 나가...\n응...\nExcuse me. Hello? Hi, honey. Where are you now?\nIn front of the bank? Yeah. I'm on my way now. Okay.","sourceUid":"merged-mrlyl3rc-112","sourceNo":230,"viRanges":[{"start":1035.227768,"end":1055.821818}],"koRanges":[{"start":1073.084786,"end":1095.503666}]},{"id":307,"readerNo":308,"displayNo":"N217","n":"N217","kind":"narration","type":"narration","vi":"(Đứng dậy sau khi trả lời điện thoại.","ko":"(전화 받으며 일어선다.","en":"(Stands up after answering the phone.","text":"(Đứng dậy sau khi trả lời điện thoại.\n(전화 받으며 일어선다.\n(Stands up after answering the phone.","sourceUid":"nar-mrnbt4my-58xmsz","sourceNo":"N217","viRanges":[],"koRanges":[]},{"id":308,"readerNo":309,"displayNo":"N218","n":"N218","kind":"narration","type":"narration","vi":"Anh ấy chào bà, liếc nhìn Oh Jong-gyu và đi ra ngoài)","ko":"마담에게 눈인사하고 오종규를 슬쩍 보고 밖으로 나가며)","en":"He says hello to Madam, glances at Oh Jong-gyu, and heads out)","text":"Anh ấy chào bà, liếc nhìn Oh Jong-gyu và đi ra ngoài)\n마담에게 눈인사하고 오종규를 슬쩍 보고 밖으로 나가며)\nHe says hello to Madam, glances at Oh Jong-gyu, and heads out)","sourceUid":"nar-mrnbt54n-92zp34","sourceNo":"N218","viRanges":[],"koRanges":[]},{"id":309,"readerNo":310,"displayNo":"N219","n":"N219","kind":"narration","type":"dialogue","vi":"Oh Jong-gyu: (Uống ly rượu và lấy tiền từ ví cũ ra)...","ko":"오종규: (자기 잔의 술을 마시고 낡은 지갑에서 돈을 꺼낸다)···.","en":"Oh Jong-gyu: (Drinks from his glass and takes out money from his old wallet)...","text":"Oh Jong-gyu: (Uống ly rượu và lấy tiền từ ví cũ ra)...\n오종규: (자기 잔의 술을 마시고 낡은 지갑에서 돈을 꺼낸다)···.\nOh Jong-gyu: (Drinks from his glass and takes out money from his old wallet)...","sourceUid":"nar-mrnbtonf-uzilc8","sourceNo":"N219","viRanges":[],"koRanges":[]},{"id":310,"readerNo":311,"displayNo":"330","n":"330","kind":"sub","type":"merged","vi":"[R 고합니다","en":"Hey! Stop there! Stop right there! Stop there!\nWhere do you think you're going?\n-You! -You're young enough!\nDid you have to have someone's husband?\n-You bitch! -Did you enjoy it?\n-Let's see your face. -Stop it. I said stop! What do you care?\n-If you don't stop, I'll call the police. -Hey!","text":"Này! Đứng lại! Mày đứng lại ngay! Dừng lại! Mày định chạy đi đâu?\n- Con ranh! - Còn trẻ trung mơn mởn vậy mà!\nCứ phải đi giật chồng người ta mới được à? - Con điếm!\n- Mày sướng không? - Để bà xem bản mặt mày.\n- Dừng tay. Tôi yêu cầu các người dừng lại! Liên quan gì đến mày?\n- Còn vậy là tôi báo cảnh sát. - Này!\n(아줌마) 야! 너 거기 안 서... 야, 거기 안 서!\n야! 야, 너 거기 서! 야! 거기 서! 어딜 도망가! 이런 새파랗게 젊은 년이\n어디 할 짓이 없어서\n남의 남편을 그렇게... 너 정말 뒹구니까 좋았냐, 이년아!\n(윤진명) 그만하세요\n(아줌마 1) 얼굴 함 보자, 이년아!\n(윤진명) 그만하시라고요!\n(아줌마 2) 네가 뭔 상관이야?\n(윤진명) 계속하시면 신고합니다\nHey! Stop there! Stop right there! Stop there!\nWhere do you think you're going?\n-You! -You're young enough!\nDid you have to have someone's husband?\n-You bitch! -Did you enjoy it?\n-Let's see your face. -Stop it. I said stop! What do you care?\n-If you don't stop, I'll call the police. -Hey!","sourceUid":"merged-mrlz294a-126","sourceNo":258,"viRanges":[{"start":1177.231614,"end":1213.158703},{"start":1177.231614,"end":1201.232354}],"koRanges":[{"start":1215.871837,"end":1251.093606}]},{"id":361,"readerNo":362,"displayNo":"N261","n":"N261","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon: (Nhấn số 112 trong khi nhìn thẳng vào cô gái)...","ko":"윤진명: (아줌마를 똑바로 본 채 112를 누른다)···.","en":"Jinmyeong Yoon: (Pressing 112 while looking directly at the lady)...","text":"Jinmyeong Yoon: (Nhấn số 112 trong khi nhìn thẳng vào cô gái)...\n윤진명: (아줌마를 똑바로 본 채 112를 누른다)···.\nJinmyeong Yoon: (Pressing 112 while looking directly at the lady)...","sourceUid":"nar-mrnc5f7r-o6moy0","sourceNo":"N261","viRanges":[],"koRanges":[]},{"id":362,"readerNo":363,"displayNo":"271","n":"271","kind":"sub","type":"merged","vi":"Mày biết con khốn này làm on who will occupy this room.","sourceUid":"nar-mrnc8ysy-ualvg3","sourceNo":"N276","viRanges":[],"koRanges":[]},{"id":381,"readerNo":382,"displayNo":"N277","n":"N277","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon: (Nhìn Kang Ina)...","ko":"윤진명: (강이나를 본다)···.","en":"Jinmyeong Yoon: (Looks at Kang Ina)...","text":"Jinmyeong Yoon: (Nhìn Kang Ina)...\n윤진명: (강이나를 본다)···.\nJinmyeong Yoon: (Looks at Kang Ina)...","sourceUid":"nar-mrnc8zoh-y2e0jh","sourceNo":"N277","viRanges":[],"koRanges":[]},{"id":382,"readerNo":383,"displayNo":"N278","n":"N278","kind":"narration","type":"dialogue","vi":"Kang Ina: (Tôi lo lắng không biết Yoon Jin-myeong có nhận ra tôi hay không)...","ko":"강이나: (윤진명이 자기를 알아볼까 어쩔까 긴장된다)···.","en":"Kang Ina: (I am nervous as to whether Yoon Jin-myeong will recognize me or not)...","text":"Kang Ina: (Tôi lo lắng không biết Yoon Jin-myeong có nhận ra tôi hay không)...\n강이나: (윤진명이 자기를 알아볼까 어쩔까 긴장된다)···.\nKang Ina: (I am nervous as to whether Yoon Jin-myeong will recognize me or not)...","sourceUid":"nar-mrnc90b6-s1qnb4","sourceNo":"N278","viRanges":[],"koRanges":[]},{"id":383,"readerNo":384,"displayNo":"N279","n":"N279","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon: (Cô ấy không nhận ra Kang Ina. Anh ấy gật đầu)...","ko":"윤진명: (강이나를 못 알아본다. 꾸벅 인사한다)···.","en":"Jinmyeong Yoon: (She doesn't recognize Kang Ina. He nods)...","text":"Jinmyeong Yoon: (Cô ấy không nhận ra Kang Ina. Anh ấy gật đầu)...\n윤진명: (강이나를 못 알아본다. 꾸벅 인사한다)···.\nJinmyeong Yoon: (She doesn't recognize Kang Ina. He nods)...","sourceUid":"nar-mrnc91i5-u0qjdo","sourceNo":"N279","viRanges":[],"koRanges":[]},{"id":384,"readerNo":385,"displayNo":"N280","n":"N280","kind":"narration","type":"dialogue","vi":"Kang Ina: (chào mặt đối mặt)...","ko":"강이나: (마주 인사한다)···.","en":"Kang Ina: (greeting face to face)...","text":"Kang Ina: (chào mặt đối mặt)...\n강이나: (마주 인사한다)···.\nKang Ina: (greeting face to face)...","sourceUid":"nar-mrnc92ru-otxjl9","sourceNo":"N280","viRanges":[],"koRanges":[]},{"id":385,"readerNo":386,"displayNo":"400","n":"400","kind":"sub","type":"merged","vi":"Bà nói giá phòng và các khoản thu chưa? Rồi.\nChắc nhà bạn giàu lắm. Không hề.\nBạn là sinh viên à? Ừ.","ko":"방세랑 공과금이랑 얘기하셨어요?\n어\n집이 부잔가 봐요\n아니요...\n학생이에요?\n네...","en":"Did you tell her about the rent and utility? I did.\nYou must come from money. Not really.\nAre you a student? Yes.","text":"Bà nói giá phòng và các khoản thu chưa? Rồi.\nChắc nhà bạn giàu lắm. Không hề.\nBạn là sinh viên à? Ừ.\n방세랑 공과금이랑 얘기하셨어요?\n어\n집이 부잔가 봐요\n아니요...\n학생이에요?\n네...\nDid you tell her about the rent and utility? I did.\nYou must come from money. Not really.\nAre you a student? Yes.","sourceUid":"merged-mrlzbqs2-131","sourceNo":400,"viRanges":[{"start":1335.076745,"end":1348.608194}],"koRanges":[{"start":1372.753336,"end":1384.821922}]},{"id":386,"readerNo":387,"displayNo":"N281","n":"N281","kind":"narration","type":"dialogue","vi":"Kang Ina: Vâng? KHÔNG···. (Vô tình lấy tay che đi dấu hiệu Chanel trên túi xách)...","ko":"강이나: 예? 아뇨···. (자기도 모르게 핸드백의 샤넬 마크를 손으로 가린다)···.","en":"Kang Ina: Yes? no···. (Unknowingly covers the Chanel mark on the handbag with his hand)...","text":"Kang Ina: Vâng? KHÔNG···. (Vô tình lấy tay che đi dấu hiệu Chanel trên túi xách)...\n강이나: 예? 아뇨···. (자기도 모르게 핸드백의 샤넬 마크를 손으로 가린다)···.\nKang Ina: Yes? no···. (Unknowingly covers the Chanel mark on the handbag with his hand)...","sourceUid":"nar-mrnfpr5m-qg3lae","sourceNo":"N281","viRanges":[],"koRanges":[]},{"id":387,"readerNo":388,"displayNo":"N282","n":"N282","kind":"narration","type":"narration","vi":". Nhà hàng (đêm)","ko":". 레스토랑(밤)","en":". Restaurant (night)","text":". Nhà hàng (đêm)\n. 레스토랑(밤)\n. Restaurant (night)","sourceUid":"nar-mrnfpubq-qtweqz","sourceNo":"N282","viRanges":[],"koRanges":[]},{"id":388,"readerNo":389,"displayNo":"N283","n":"N283","kind":"narration","type":"narration","vi":"Kang Ina đang ngơ ngác nhìn Yoon Jinmyeong.","ko":"강이나가 멍하니 윤진명을 보고 있다.","en":"Kang Ina is looking at Yoon Jinmyeong blankly.","text":"Kang Ina đang ngơ ngác nhìn Yoon Jinmyeong.\n강이나가 멍하니 윤진명을 보고 있다.\nKang Ina is looking at Yoon Jinmyeong blankly.","sourceUid":"nar-mrnfpx0f-gx1bxe","sourceNo":"N283","viRanges":[],"koRanges":[]},{"id":389,"readerNo":390,"displayNo":"N284","n":"N284","kind":"narration","type":"narration","vi":"Jinmyeong Yoon dọn bàn sau khi khách rời đi.","ko":"윤진명이 손님이 떠난 테이 블을 치운다.","en":"Jinmyeong Yoon cleans the table after the guests have left.","text":"Jinmyeong Yoon dọn bàn sau khi khách rời đi.\n윤진명이 손님이 떠난 테이 블을 치운다.\nJinmyeong Yoon cleans the table after the guests have left.","sourceUid":"nar-mrnfpy1k-qjzs7w","sourceNo":"N284","viRanges":[],"koRanges":[]},{"id":390,"readerNo":391,"displayNo":"405","n":"405","kind":"sub","type":"merged","vi":"Em đang nghĩ gì vậy? Khởi đầu của lời nói dối. Anh ăn xong chưa? Đi thôi.\nĂn xong rồi thì phải vận động. Được.","ko":"무슨 생각해? 거짓말의 시작... 다 먹었어요? 가요\n먹었으니까 운동해야지\n오케이","en":"What are you thinking? The beginning of the lie. Are you done? Let's go.\nWe need to burn the calories. Okay.","text":"Em đang nghĩ gì vậy? Khởi đầu của lời nói dối. Anh ăn xong chưa? Đi thôi.\nĂn xong rồi thì phải vận động. Được.\n무슨 생각해? 거짓말의 시작... 다 먹었어요? 가요\n먹었으니까 운동해야지\n오케이\nWhat are you thinking? The beginning of the lie. Are you done? Let's go.\nWe need to burn the calories. Okay.","sourceUid":"merged-mrlzd0xv-132","sourceNo":405,"viRanges":[{"start":1348.608194,"end":1376.428602}],"koRanges":[{"start":1384.821922,"end":1411.2114}]},{"id":391,"readerNo":392,"displayNo":"N285","n":"N285","kind":"narration","type":"narration","vi":". Đường, bến xe (đêm)","ko":". 도로, 버스 정거장(밤)","en":". Road, bus stop (night)","text":". Đường, bến xe (đêm)\n. 도로, 버스 정거장(밤)\n. Road, bus stop (night)","sourceUid":"nar-mrnfqbhu-s6ydev","sourceNo":"N285","viRanges":[],"koRanges":[]},{"id":392,"readerNo":393,"displayNo":"N286","n":"N286","kind":"narration","type":"narration","vi":"Jinmyeong Yoon chạy tới. Jaewan Park chạy ngang qua cô ấy. Điểm dừng xe buýt.","ko":"윤진명이 뛰어온다 tion","type":"narration","vi":"Kang Ina tẩy trang.","ko":"강이나가 화장을 지운다.","en":"Kang Ina removes her makeup.","text":"Kang Ina tẩy trang.\n강이나가 화장을 지운다.\nKang Ina removes her makeup.","sourceUid":"nar-mrnfw975-7xzy3r","sourceNo":"N302","viRanges":[],"koRanges":[]},{"id":414,"readerNo":415,"displayNo":"N303","n":"N303","kind":"narration","type":"narration","vi":"Nó lại có mùi nữa. Tôi đi theo mùi.","ko":"또다시 냄새가 난다. 냄새를 따라가본다.","en":"It smells again. I follow the smell.","text":"Nó lại có mùi nữa. Tôi đi theo mùi.\n또다시 냄새가 난다. 냄새를 따라가본다.\nIt smells again. I follow the smell.","sourceUid":"nar-mrnfwazf-g885fn","sourceNo":"N303","viRanges":[],"koRanges":[]},{"id":415,"readerNo":416,"displayNo":"N305","n":"N305","kind":"narration","type":"narration","vi":"Kéo bóng đèn ra.","ko":"알뿌리를 뽑아본다.","en":"Pull out the bulb.","text":"Kéo bóng đèn ra.\n알뿌리를 뽑아본다.\nPull out the bulb.","sourceUid":"nar-mrnfwmao-bzg54q","sourceNo":"N305","viRanges":[],"koRanges":[]},{"id":416,"readerNo":417,"displayNo":"N306","n":"N306","kind":"narration","type":"narration","vi":"Những con giòi nhỏ xíu bò lổm ngổm từ những củ thối. Ờ!!","ko":"썩은 알뿌리에서 조그만 구더기 벌레가 꿈틀거린다. 으윽!!","en":"Tiny maggots wriggle from rotten bulbs. Ugh!!","text":"Những con giòi nhỏ xíu bò lổm ngổm từ những củ thối. Ờ!!\n썩은 알뿌리에서 조그만 구더기 벌레가 꿈틀거린다. 으윽!!\nTiny maggots wriggle from rotten bulbs. Ugh!!","sourceUid":"nar-mrnfwn70-25i0wy","sourceNo":"N306","viRanges":[],"koRanges":[]},{"id":417,"readerNo":418,"displayNo":"N307","n":"N307","kind":"narration","type":"narration","vi":". Phòng khách (ban đêm)","ko":". 거실(밤)","en":". Living room (night)","text":". Phòng khách (ban đêm)\n. 거실(밤)\n. Living room (night)","sourceUid":"nar-mrnfwp7u-cd3jyr","sourceNo":"N307","viRanges":[],"koRanges":[]},{"id":418,"readerNo":419,"displayNo":"N308","n":"N308","kind":"narration","type":"narration","vi":"Kang Ina đặt chậu hoa vào túi rác và buộc lối vào.","ko":"강이나가 화분째 쓰레기봉투에 넣고 입구를 묶는다.","en":"Kang Ina puts the flower pot in a garbage bag and ties the entrance.","text":"Kang Ina đặt chậu hoa vào túi rác và buộc lối vào.\n강이나가 화분째 쓰레기봉투에 넣고 입구를 묶는다.\nKang Ina puts the flower pot in a garbage bag and ties the entrance.","sourceUid":"nar-mrnfwq30-pxatcq","sourceNo":"N308","viRanges":[],"koRanges":[]},{"id":419,"readerNo":420,"displayNo":"N309","n":"N309","kind":"narration","type":"narration","vi":"Jinmyeong Yoon bước vào.","ko":"윤진명이 들어온다.","en":"Jinmyeong Yoon enters.","text":"Jinmyeong Yoon bước vào.\n윤진명이 들어온다.\nJinmyeong Yoon enters.","sourceUid":"nar-mrnfwrse-t2h44w","sourceNo":"N309","viRanges":[],"koRanges":[]},{"id":420,"readerNo":421,"displayNo":"N310","n":"N310","kind":"narration","type":"narration","vi":"Yoon Jin-myeong chào Kang E-na bằng cách nhìn nhanh cô ấy và cố gắng bước vào phòng.","ko":"윤진명은 강이나를 한 번 보는 것으로 인사를 대신하고 방으로 들어가려 한다.","en":"Yoon Jin-myeong greets Kang E-na by taking a quick look at her and tries to enter the room.","text":"Yoon Jin-myeong chào Kang E-na bằng cách nhìn nhanh cô ấy và cố gắng bước vào phòng.\n윤진명은 강이나를 한 번 보는 것으로 인사를 대신하고 방으로 들어가려 한다.\nYoon Jin-myeong greets Kang E-na by taking a quick look at her and tries to enter the room.","sourceUid":"nar-mrnfwtsq-l8l5bh","sourceNo":"N310","viRanges":[],"koRanges":[]},{"id":421,"readerNo":422,"displayNo":"430","n":"430","kind":"sub","type":"merged","vi":"Tiền bối Yoon! Không gọi là tiền bối được nữa sao? - Chuyện gì?\n- Chị làm thêm ở phường Sangam à? Ừ. Đúng là chị.\nBan nãy em đến ăn nhưng không chắc lắm.\n- Chị không thấy em à? - Có thấy. Sao lại vờ không quen?\nChị không được làm vậy với khách.","ko":"윤 선배! 아, 이제 선배라고 부르면 안 되나?\n뭔데? 알바 한다는 데가 상암동이야?\n어 어, 맞구나 아까 밥 먹으러 갔다가 긴가민가했는데... 나 못 봤어? 봤어\n근데 왜 아는 척 안 했어?\n손님을 아는 척하면 안 되거든","en":"Senior Jin-Myung! Should I not call you that any more? -What is it?\n-Do you work in Sangam? Yes. It was you. I wasn't sure at the restaurant.\n-Didn't you see me? -I did. Why didn't you say anything?\nI'm not supposed to do that to a customer.","text":"Tiền bối Yoon! Không gọi là tiền bối được nữa sao? - Chuyện gì?\n- Chị làm thêm ở phường Sangam à? Ừ. Đúng là chị.\nBan nãy em đến ăn nhưng không chắc lắm.\n- Chị không thấy em à? - Có thấy. Sao lại vờ không quen?\nChị không được làm vậy với khách.\n윤 선배! 아, 이제 선배라고 부르면 안 되나?\n뭔데? 알바 한다는 데가 상암동이야?\n어 어, 맞구나 아까 밥 먹으러 갔다가 긴가민가했는데... 나 못 봤어? 봤어\n근데 왜 아는 척 안 했어?\n손님을 아는 척하면 안 되거든\nSenior Jin-Myung! Should I not call you that any more? -What is it?\n-Do you work in Sangam? Yes. It was you. I wasn't sure at the restaurant.\n-Didn't you see me? -I did. Why didn't you say anything?\nI'm not supposed to do that to a customer.","sourceUid":"merged-mrlzmxcp-139","sourceNo":430,"viRanges":[{"start":1510,"end":1533.926252}],"koRanges":[{"start":1547,"end":1569.787901}]},{"id":422,"readerNo":423,"displayNo":"438","n":"438","kind":"sub","type":"merged","vi":"Ra vậy. Chị không mệt à? Nhìn chị uể oải lắm.\nChị mệt lắm chứ. Có cách để sống nhàn hạ mà.\nChị kiếm bồ đi. Em giới thiệu cho chị nhé? Thôi khỏi.","ko":"아... 안 힘들어?\n되게 힘들어 보이던데\n되게 힘들어\n쉽게 사는 방법도 있어\n애인 하나 만들어\n소개해 줄까? 됐어!","en":"Right. Aren't you tired? You looked tired.\nI am. There's an easy way too, you know. Get a boyfriend.\nWould you like me to get you one? I'm fine.","text":"Ra vậy. Chị không mệt à? Nhìn chị uể oải lắm.\nChị mệt lắm chứ. Có cách để sống nhàn hạ mà.\nChị kiếm bồ đi. Em giới thiệu cho chị nhé? Thôi khỏi.\n아... 안 힘들어?\n되게 힘들어 보이던데\n되게 힘들어\n쉽게 사는 방법도 있어\n애인 하나 만들어\n소개해 줄까? 됐어!\nRight. Aren't you tired? You looked tired.\nI am. There's an easy way too, you know. Get a boyfriend.\nWould you like me to get you one? I'm fine.","sourceUid":"merged-mrm0f0n5-141","sourceNo":438,"viRanges":[{"start":1533.926252,"end":1550.818517}],"koRanges":[{"start":1569.787901,"end":1586.534875}]},{"id":423,"readerNo":424,"displayNo":440,"n":440,"kind":"sub","type":"merged","vi":"[Chuông cửa hàng reo] [Nhạc Jazz bắt đầu]","ko":"[가게 문 종 울린다] [재즈 음악 시작]","en":"[Store door bell rings] [Jazz music starts]","text":"[Chuông cửa hàng reo] [Nhạc Jazz bắt đầu]\n[가게 문 종 울린다] [재즈 음악 시작]\n[Store door bell rings] [Jazz music starts]","sourceUid":"ko-mrli6nmt-1175","sourceNo":440,"viRanges":[],"koRanges":[]},{"id":424,"readerNo":425,"displayNo":"N311","n":"N311","kind":"narration","type":"dialogue","vi":"Kang Ina: Có khó không? Nó trông rất khó khăn.","ko":"강이나: 안 힘들어? 되게 힘들어 보이던데.","en":"Kang Ina: Isn’t it difficult? It looked very difficult.","text":"Kang Ina: Có khó không? Nó trông rất khó khăn.\n강이나: 안 힘들어? 되게 힘들어 보이던데.\nKang Ina: Isn’t it difficult? It looked very difficult.","sourceUid":"nar-mrnfxpl8-9y24ls","sourceNo":"N311","viRanges":[],"koRanges":[]},{"id":425,"readerNo":426,"displayNo":"444","n":"444","kind":"sub","type":"merged","vi":"Cũng đúng. Mặt mũi với người ngợm thế kia thì khó mà kiếm được bồ.\nKhi hỏi đường, người ta thường gọi \"Này em sinh viên!\"\nHọ coi những người tầm tuổi tôi là sinh viên.\nNhưng nếu nói mình không phải sinh viên,\nmọi thứ sẽ trở nên phức tạp.","ko":"하긴 그 얼굴에 그 몸매로...\n길 물어볼 때도 '학생!' 그러잖아요\n내 나이 또래는 다 학생이라고 생각하는 거죠\n근데 이게... 학생 아니라고 하면\n그때부터 좀 복잡해져요","en":"It wouldn't be that easy with that face and body.\nThey call you a student when they ask for directions.\nThey just assume that people my age are students.\nBut when you say you're not a student,\nthat's when it gets complicated.","text":"Cũng đúng. Mặt mũi với người ngợm thế kia thì khó mà kiếm được bồ.\nKhi hỏi đường, người ta thường gọi \"Này em sinh viên!\"\nHọ coi những người tầm tuổi tôi là sinh viên.\nNhưng nếu nói mình không phải sinh viên,\nmọi thứ sẽ trở nên phức tạp.\n하긴 그 얼굴에 그 몸매로...\n길 물어볼 때도 '학생!' 그러잖아요\n내 나이 또래는 다 학생이라고 생각하는 거죠\n근데 이게... 학생 아니라고 하면\n그때부터 좀 복잡해져요\nIt wouldn't be that easy with that face and body.\nThey call you a student when they ask for directions.\nThey just assume that people my age are students.\nBut when you say you're not a student,\nthat's when it gets complicated.","sourceUid":"merged-mrm0hsb6-143","sourceNo":444,"viRanges":[{"start":1550.818517,"end":1588.347769}],"koRanges":[{"start":1586.534875,"end":1625.647299}]},{"id":426,"readerNo":427,"displayNo":"N312","n":"N312","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon: Vậy đó! (Vào phòng)···.","ko":"윤진명: 됐어! (방으로 들어간다)···.","en":"Jinmyeong Yoon: That’s it! (Enter the room)···.","text":"Jinmyeong Yoon: Vậy đó! (Vào phòng)···.\n윤진명: 됐어! (방으로 들어간다)···.\nJinmyeong Yoon: That’s it! (Enter the room)···.","sourceUid":"nar-mrnfxzjl-7o3nr8","sourceNo":"N312","viRanges":[],"koRanges":[]},{"id":427,"readerNo":428,"displayNo":"N313","n":"N313","kind":"narration","type":"narration","vi":". Quán bar (đêm)","ko":". 바(밤)","en":". Bar (night)","text":". Quán bar (đêm)\n. 바(밤)\n. Bar (night)","sourceUid":"nar-mrnfy8fz-7svhaj","sourceNo":"N313","viRanges":[],"koRanges":[]},{"id":428,"readerNo":429,"displayNo":"N314","n":"N314","kind":"narration","type":"narration","vi":"Kang Ina đang ngồi ở quầy bar. Mỗi lần nghe thấy tiếng cửa, tôi lại quay lại.","ko":"강이나가 바에 앉아 있다. 문소리가 날 때마다 돌아본다.","en":"Kang Ina is sitting at the bar. Every time I hear the door, I turn around.","text":"Kang Ina đang ngồi ở quầy bar. Mỗi lần nghe thấy tiếng cửa, tôi lại quay lại.\n강이나가 바에 앉아 있다. 문소리가 날 때마다 돌아본다.\nKang Ina is sitting at the bar. Every time I hear the door, I turn around.","sourceUid":"nar-mrnfy9gn-zx5sb7","sourceNo":"N314","viRanges":[],"koRanges":[]},{"id":429,"readerNo":430,"displayNo":"N315","n":"N315","kind":"narration","type":"dialogue","vi":"Kang Ina: Đừng lo lắng. Bạn đang tức giận.","ko":"강이나: 고민 안 해. 화내는 거지.","en":"Kang Ina: Don’t worry. You're angry.","text":"Kang Ina: Đừng lo lắng. Bạn đang tức giận.\n강이나: 고민 안 해. 화내는 거지.\nKang Ina: Don’t worry. You're angry.","sourceUid":"nar-mrngdp3j-6ejxhc","sourceNo":"N315","viRanges":[],"koRanges":[]},{"id":430,"readerNo":431,"displayNo":"N316","n":"N316","kind":"narration","type":"dialogue","vi":"Khách hàng: (gọi) Quý cô!","ko":"손님: (부른다) 마담!!","en":"Customer: (calling) Madam!!","text":"Khách hàng: (gọi) Quý cô!\n손님: (부른다) 마담!!\nCustomer: (calling) Madam!!","sourceUid":"nar-mrnge744-k227ak","sourceNo":"N316","viRanges":[],"koRanges":[]},{"id":431,"readerNo":432,"displayNo":"N317","n":"N317","kind":"narration","type":"narration","vi":"Khuôn mặt của Kang Ina sáng bừng lên.","ko":"강이나의 얼굴이 환해진다.","en":"Kang Ina’s face brightens.","text":"Khuôn mặt của Kang Ina sáng bừng lên.\n강이나의 얼굴이 환해진다.\nKang Ina’s face brightens.","sourceUid":"nar-mrngesg4-v9fqt8","sourceNo":"N317","viRanges":[],"koRanges":[]},{"id":432,"readerNo":433,"displayNo":"N318","n":"N318","kind":"narration","type":"narration","vi":"•Nhảy 〉〉","ko":"•점프 〉〉","en":"•Jump 〉〉","text":"•Nhảy 〉〉\n•점프 〉〉\n•Jump 〉〉","sourceUid":"nar-mrnget2x-03jmgh","sourceNo":"N318","viRanges":[],"koRanges":[]},{"id":433,"readerNo":434,"displayNo":"N319","n":"N319","kind":"narration","type":"narration","vi":"Oh Jong-gyu và Kang Ina ngồi cách nhau một chiếc ghế ở giữa.","ko":"오종규와 강이나가 의자 하나를 사이에 두고 떨어져 앉았다.","en":"Oh Jong-gyu and Kang Ina sat apart with a chair between them.","text":"Oh Jong-gyu và Kang Ina ngồi cách nhau một chiếc ghế ở giữa.\n오종규와 강이나가 의자 하나를 사이에 두고 떨어져 앉았다.\nOh Jong-gyu and Kang Ina sat apart with a chair between them.","sourceUid":"nar-mrngeup7-d2ad9u","sourceNo":"N319","viRanges":[],"koRanges":[]},{"id":434,"readerNo":435,"displayNo":"N320","n":"N320","kind":"narration","type":"dialogue","vi":"Kang Ina: Kể cả khi hỏi đường, tôi vẫn là học sinh! Đúng vậy.","ko":"강이나: 길 물어볼 때도 학생! 그러잖아요.","en":"Kang Ina: Even when asking for directions, I’m a student! That's right.","text":"Kang Ina: Kể cả khi hỏi đường, tôi vẫn là học sinh! Đúng vậy.\n강이나: 길 물어볼 때도 학생! 그러잖아요.\nKang Ina: Even when asking for directions, I’m a student! That's right.","sourceUid":"nar-mrngexw7-xuorfq","sourceNo":"N320","viRanges":[],"koRanges":[]},{"id":435,"readerNo":436,"displayNo":"319","n":"319","kind":"sub","type":"merged","vi":"\"Cô làm nghề gì? Tại sao không đi học?\"\nTôi thấy phiền nên mới nhận mình là sinh viên.\nTôi không chủ định nói dối. Đơn giản đúng không?","ko":"뭐 하냐? 왜 학교 안 갔냐?\n그래서 그냥 학생이라고 하는 거예요. 귀찮아서...\n내가 거짓말 하려고 한 게 아니라\n간단하죠?","en":"\"What do you do? Why didn't you go to school?\"\nI say I'm a student to save all that trouble.\nI didn't try to lie. Isn't it simple?","text":"\"Cô làm nghề gì? Tại sao không đi học?\"\nTôi thấy phiền nên mới nhận mình là sinh viên.\nTôi không chủ định nói dối. Đơn giản đúng không?\n뭐 하냐? 왜 학교 안 갔냐?\n그래서 그냥 학생이라고 하는 거예요. 귀찮아서...\n내가 거짓말 하려고 한 게 아니라\n간단하죠?\n\"What do you do? Why didn't you go to school?\"\nI say I'm a student to save all that trouble.\nI didn't try to lie. Isn't it simple?","sourceUid":"merged-mrm0rhgd-146","sourceNo":319,"viRanges":[{"start":1588.347769,"end":1602.968764}],"koRanges":[{"start":1625.647299,"end":1638.238347}]},{"id":436,"readerNo":437,"displayNo":"324","n":"324","kind":"sub","type":"merged","vi":"Cô đợi tôi để nói điều này à? Tôi không đợi chú. Tôi chỉ nói vậy thôi.\nVới tôi thì quý cô đây giống như… Quý cô gì chứ? Nghe già quá đi.\nVậy thì tôi nên gọi thế nào đây? Với tôi thì đằng ấy giống như…","ko":"그 얘기 하려고 기다린 건가?\n기다린 것까진 아니고요\n그냥 그렇다고요\n내가 보기엔, 아가씨가... 아가씨가 뭐야? 늙은이처럼...\n그럼 뭐라고 그러는데...? 내가 보기엔 그쪽이...","en":"Did you wait to tell me that? I didn't wait. I'm just saying.\nTo me, miss, it seems like-- Why call someone miss? It makes you look old.\nThen what should I call you? To me, ma'am, it seems like--","text":"Cô đợi tôi để nói điều này à? Tôi không đợi chú. Tôi chỉ nói vậy thôi.\nVới tôi thì quý cô đây giống như… Quý cô gì chứ? Nghe già quá đi.\nVậy thì tôi nên gọi thế nào đây? Với tôi thì đằng ấy giống như…\n그 얘기 하려고 기다린 건가?\n기다린 것까진 아니고요\n그냥 그렇다고요\n내가 보기엔, 아가씨가... 아가씨가 뭐야? 늙은이처럼...\n그럼 뭐라고 그러는데...? 내가 보기엔 그쪽이...\nDid you wait to tell me that? I didn't wait. I'm just saying.\nTo me, miss, it seems like-- Why call someone miss? It makes you look old.\nThen what should I call you? To me, ma'am, it seems like--","sourceUid":"merged-mrm0ul38-150","sourceNo":324,"viRanges":[{"start":1602.968764,"end":1623.050595},{"start":1602.968764,"end":1620.766875}],"koRanges":[{"start":1638.238347,"end":1660.192462}]},{"id":437,"readerNo":438,"displayNo":"463","n":"463","kind":"sub","type":"merged","vi":"Nghe còn gớm hơn. Thôi cứ gọi quý cô đi. Tôi thấy cô có vẻ… rất quan tâm đến cô bạn đó.\n- Ai cơ? - Cô gái vất vả ấy. Cô gái làm ba công việc. Tiền bối Yoon á?\nTôi ư?  Tại sao chứ? - Tôi không rõ.","ko":"그쪽은 또 뭐야 그냥 아가씨라고 해요\n내가 보기엔, 아가씨가...\n그 학생을 되게 신경 쓰는 것 같은데...\n누구요? 그 어렵게 산다는 학생\n아르바이트를 서너 개씩 한다는... 윤 선배요? 내가요?","en":"That's even worse. Just call me, miss. To me, miss, it seems like... you care about that girl a lot.\n-Who? -The one with the hard life. The one with three jobs? Jin-Myung? I care about her?","text":"Nghe còn gớm hơn. Thôi cứ gọi quý cô đi. Tôi thấy cô có vẻ… rất quan tâm đến cô bạn đó.\n- Ai cơ? - Cô gái vất vả ấy. Cô gái làm ba công việc. Tiền bối Yoon á?\nTôi ư?  Tại sao chứ? - Tôi không rõ.\n그쪽은 또 뭐야 그냥 아가씨라고 해요\n내가 보기엔, 아가씨가...\n그 학생을 되게 신경 쓰는 것 같은데...\n누구요? 그 어렵게 산다는 학생\n아르바이트를 서너 개씩 한다는... 윤 선배요? 내가요?\nThat's even worse. Just call me, miss. To me, miss, it seems like... you care about that girl a lot.\n-Who? -The one with the hard life. The one with three jobs? Jin-Myung? I care about her?","sourceUid":"merged-mrm0yrys-151","sourceNo":463,"viRanges":[{"start":1623.050595,"end":1644.925293}],"koRanges":[{"start":1660.192462,"end":1677.364877}]},{"id":438,"readerNo":439,"displayNo":"N321","n":"N321","kind":"narration","type":"dialogue","vi":"Oh Jong-gyu: (Trong tấm kính treo trên giá đỡ, Kang Ina được nhìn thấy đang làm việc với một người đàn ông khác)...","ko":"오종규: (홀더에 걸린 유리잔 속에 다른 남자에게 작업 거는 강이나가 비친다)···.","en":"Oh Jong-gyu: (In the glass hanging on the holder, Kang Ina is seen working on another man)...","text":"Oh Jong-gyu: (Trong tấm kính treo trên giá đỡ, Kang Ina được nhìn thấy đang làm việc với một người đàn ông khác)...\n오종규: (홀더에 걸린 유리잔 속에 다른 남자에게 작업 거는 강이나가 비친다)···.\nOh Jong-gyu: (In the glass hanging on the holder, Kang Ina is seen working on another man)...","sourceUid":"nar-mrngg8i8-z89kq2","sourceNo":"N321","viRanges":[],"koRanges":[]},{"id":439,"readerNo":440,"displayNo":"469","n":"469","kind":"sub","type":"merged","vi":"Không có chuyện đó đâu. Mắc gì phải vậy?\nSao tôi phải để ý đến chị ấy? Tôi ngồi được chứ?","ko":"왜요? 글쎄... 에이, 아니에요\n내가 왜? 신경 쓸 일이 뭐가 있어...\n(강이나) 앉아도 돼요?","en":"-Why would I? -I don't know. That's not true at all.\nWhy would I? Why would I care about her? Can I sit?","text":"Không có chuyện đó đâu. Mắc gì phải vậy?\nSao tôi phải để ý đến chị ấy? Tôi ngồi được chứ?\n왜요? 글쎄... 에이, 아니에요\n내가 왜? 신경 쓸 일이 뭐가 있어...\n(강이나) 앉아도 돼요?\n-Why would I? -I don't know. That's not true at all.\nWhy would I? Why would I care about her? Can I sit?","sourceUid":"merged-mrm10mej-152","sourceNo":469,"viRanges":[{"start":1644.925293,"end":1657.696282}],"koRanges":[{"start":1677.364877,"end":1692.94202}]},{"id":440,"readerNo":441,"displayNo":472,"n":472,"kind":"sub","type":"merged","vi":"[Nhạc Jazz kết thúc]\n[Thở dài]\n[Âm thanh của đồng xu] [Âm thanh đóng ngăn kéo máy tính tiền]","ko":"[재즈 음악 끝]\n[한숨 쉰다]\n[동전 소리] [계산대 서랍 닫는 소리]","en":"[Jazz music ends]\n[Sighs]\n[Sound of coins] [Sound of cash register drawer closing]","text":"[Nhạc Jazz kết thúc]\n[Thở dài]\n[Âm thanh của đồng xu] [Âm thanh đóng ngăn kéo máy tính tiền]\n[재즈 음악 끝]\n[한숨 쉰다]\n[동전 소리] [계산대 서랍 닫는 소리]\n[Jazz music ends]\n[Sighs]\n[Sound of coins] [Sound of cash register drawer closing]","sourceUid":"merged-mrm12lg5-153","sourceNo":472,"viRanges":[],"koRanges":[]},{"id":441,"readerNo":442,"displayNo":"478","n":"478","kind":"sub","type":"merged","vi":"Vâng. Anh vất vả rồi. - Làm việc vui vẻ. - Vâng. Anh về cẩn thận.","ko":"네\n수고하셨습니다\n네, 수고하세요\n네...\n안녕히 가세요","en":"Okay. Thank you. -Have a good day. -Bye. Bye.","text":"Vâng. Anh vất vả rồi. - Làm việc vui vẻ. - Vâng. Anh về cẩn thận.\n네\n수고하셨습니다\n네, 수고하세요\n네...\n안녕히 가세요\nOkay. Thank you. -Have a good day. -Bye. Bye.","sourceUid":"merged-mrm172s9-154","sourceNo":478,"viRanges":[{"start":1672,"end":1683.019895}],"koRanges":[{"start":1715,"end":1722.355488}]},{"id":442,"readerNo":443,"di êm)\n. 거실(밤)\n. Living room (night)","sourceUid":"nar-mrnjtcb5-j9cv96","sourceNo":"N423","viRanges":[],"koRanges":[]},{"id":574,"readerNo":575,"displayNo":586,"n":586,"kind":"sub","type":"merged","vi":"[Nhạc hip hop Reggae bắt đầu]","ko":"[레게 힙합 음악 시작]","en":"[Reggae hip hop music starts]","text":"[Nhạc hip hop Reggae bắt đầu]\n[레게 힙합 음악 시작]\n[Reggae hip hop music starts]","sourceUid":"ko-mrli6nmu-1321","sourceNo":586,"viRanges":[],"koRanges":[]},{"id":575,"readerNo":576,"displayNo":"N424","n":"N424","kind":"narration","type":"narration","vi":"Yoo Eun-jae đang học bài học từ Song Ji-won.","ko":"유은재가 송지원에게 한 수 배우는 중이다.","en":"Yoo Eun-jae is learning a lesson from Song Ji-won.","text":"Yoo Eun-jae đang học bài học từ Song Ji-won.\n유은재가 송지원에게 한 수 배우는 중이다.\nYoo Eun-jae is learning a lesson from Song Ji-won.","sourceUid":"nar-mrnjtij1-z8t2io","sourceNo":"N424","viRanges":[],"koRanges":[]},{"id":576,"readerNo":577,"displayNo":419,"n":419,"kind":"sub","type":"merged","vi":"Nhìn chị này. Tiếp nhận năng lượng. Đừng cố tỏ ra ngầu. Dẹp xấu hổ sang một bên. Dù làm gì, mình cũng là số một! Hãy lắc lư cơ thể theo ý thích. Em thử đi.","ko":"잘 봐라\n기운을 받아\n멋있으려고도 하지 말고\n쪽 팔린다고도 생각 말고\n뭘 하든 나는 최고다!\n이런 마음으로 흔들어! 해봐","en":"Watch me.\nTake the energy.\nDon't try to be cool.\nDon't be embarrassed either.\nWhatever you do, you're cool!\nThat's how you shake it.\nTry it.","text":"Nhìn chị này. Tiếp nhận năng lượng. Đừng cố tỏ ra ngầu. Dẹp xấu hổ sang một bên. Dù làm gì, mình cũng là số một! Hãy lắc lư cơ thể theo ý thích. Em thử đi.\n잘 봐라\n기운을 받아\n멋있으려고도 하지 말고\n쪽 팔린다고도 생각 말고\n뭘 하든 나는 최고다!\n이런 마음으로 흔들어! 해봐\nWatch me.\nTake the energy.\nDon't try to be cool.\nDon't be embarrassed either.\nWhatever you do, you're cool!\nThat's how you shake it.\nTry it.","sourceUid":"merged-mrm6j0v9-189","sourceNo":419,"viRanges":[{"start":2232.665753,"end":2257.622967}],"koRanges":[{"start":2260.868542,"end":2286.475808}]},{"id":577,"readerNo":578,"displayNo":"N425","n":"N425","kind":"narration","type":"dia
