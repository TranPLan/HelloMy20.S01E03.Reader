isplayNo":7,"n":7,"type":"narration","vi":"Cảm ơn quý khách, tôi xin phép thanh toán. Khoan đã. Tôi sẽ dùng thẻ này.","ko":"사랑합니다, 고객님 결제 도와드리겠습니다\n아, 잠깐만 이걸로 해주세요","en":"I'll help you with the payment. Wait. I'll pay with this one.","text":"Cảm ơn quý khách, tôi xin phép thanh toán. Khoan đã. Tôi sẽ dùng thẻ này.\n사랑합니다, 고객님 결제 도와드리겠습니다\n아, 잠깐만 이걸로 해주세요\nI'll help you with the payment. Wait. I'll pay with this one.","sourceUid":"merged-mrlip8te-2491","sourceNo":7},{"id":4,"readerNo":5,"displayNo":8,"n":8,"type":"narration","vi":"","ko":"[블링]","en":"","text":"[블링]","sourceUid":"ko-mrli6nmr-743","sourceNo":8},{"id":5,"readerNo":6,"displayNo":3,"n":3,"type":"narration","vi":"Cuộc đời tôi thuận buồm xuôi gió.","ko":"(강이나) 나는 쉽게 살아간다","en":"My life is not hard.","text":"Cuộc đời tôi thuận buồm xuôi gió.\n(강이나) 나는 쉽게 살아간다\nMy life is not hard.","sourceUid":"merged-mrliptpt-2492","sourceNo":3},{"id":6,"readerNo":7,"displayNo":4,"n":4,"type":"narration","vi":"Nhờ tôi trẻ trung và xinh đẹp.","ko":"젊음과 외모 덕분이다","en":"Thanks to my youth and beauty.","text":"Nhờ tôi trẻ trung và xinh đẹp.\n젊음과 외모 덕분이다\nThanks to my youth and beauty.","sourceUid":"merged-mrlipywa-2493","sourceNo":4},{"id":7,"readerNo":8,"displayNo":7,"n":7,"type":"narration","vi":"Con người ghét những ai sống dễ dàng.\nKhông biết nữa.","ko":"사람들은 쉽게 사는 걸 경멸한다\n모르겠다","en":"People hate those who have an easy life.\nI don't know.","text":"Con người ghét những ai sống dễ dàng.\nKhông biết nữa.\n사람들은 쉽게 사는 걸 경멸한다\n모르겠다\nPeople hate those who have an easy life.\nI don't know.","sourceUid":"merged-mrljd42f-2","sourceNo":7},{"id":8,"readerNo":9,"displayNo":8,"n":8,"type":"narration","vi":"Sống thuận lợi là điều xấu à?","ko":"쉽게 사는 게 나쁜 걸까?","en":"Is having an easy life bad?","text":"Sống thuận lợi là điều xấu à?\n쉽게 사는 게 나쁜 걸까?\nIs having an easy life bad?","sourceUid":"merged-mrljd9w2-3","sourceNo":8},{"id":9,"readerNo":10,"displayNo":14,"n":14,"type":"narration","vi":"Phải chăng cuộc sống gian nan mới là chuẩn mực?\nCuộc đời.\nBạn chỉ tìm được lời giải đáp khi sống lần hai.\nĐó cũng là cuộc đời.\nVà đây cũng là cuộc đời.\nCuộc sống là vậy mà.","ko":"힘들게 산다고 제대로 사는 걸까?\n인생\n두 번 사는 사람이 아니라면 뭐가 옳은지는 모르는 거다\n그것도 인생\n이것도 인생\n그저 그럴 뿐이다","en":"Do you have to struggle to say you had a great life?\nLife.\nYou don't know the answer unless you live twice.\nThat's life.\nAnd this is life.\nThat's how it is.","text":"Phải chăng cuộc sống gian nan mới là chuẩn mực?\nCuộc đời.\nBạn chỉ tìm được lời giải đáp khi sống lần hai.\nĐó cũng là cuộc đời.\nVà đây cũng là cuộc đời.\nCuộc sống là vậy mà.\n힘들게 산다고 제대로 사는 걸까?\n인생\n두 번 사는 사람이 아니라면 뭐가 옳은지는 모르는 거다\n그것도 인생\n이것도 인생\n그저 그럴 뿐이다\nDo you have to struggle to say you had a great life?\nLife.\nYou don't know the answer unless you live twice.\nThat's life.\nAnd this is life.\nThat's how it is.","sourceUid":"merged-mrljesvk-5","sourceNo":14},{"id":10,"readerNo":11,"displayNo":14,"n":14,"type":"narration","vi":"TẬP 3 - THỜI KỲ ĐỐ KỴ","ko":"","en":"JEALOUSY","text":"TẬP 3 - THỜI KỲ ĐỐ KỴ\nJEALOUSY","sourceUid":"merged-mrljgg1o-7","sourceNo":14},{"id":11,"readerNo":12,"displayNo":27,"n":27,"type":"narration","vi":"[Nhạc nền bí ẩn kết thúc]\n[Mùa thứ 4 của Vivaldi bắt đầu]\n[Meo]\n[Tiếng gương vỡ]\n[Âm thanh cháy]\n[Kết thúc mùa thứ 4 của Vivaldi]\n[Nhạc nền êm dịu bắt đầu]\n[tiếng giày]","ko":"[신비한 배경 음악 끝]\n[비발디 4계 시작]\n[야옹]\n[거울 깨지는 소리]\n[불타는 소리]\n[비발디 4계 끝]\n[잔잔한 배경 음악 시작]\n[구두 소리]","en":"[Mysterious background music ends]\n[Vivaldi 4th Season begins]\n[Meow]\n[Sound of mirror breaking]\n[Burning sound]\n[End of Vivaldi’s 4th Season]\n[Soothing background music starts]\n[shoe sound]","text":"[Nhạc nền bí ẩn kết thúc]\n[Mùa thứ 4 của Vivaldi bắt đầu]\n[Meo]\n[Tiếng gương vỡ]\n[Âm thanh cháy]\n[Kết thúc mùa thứ 4 của Vivaldi]\n[Nhạc nền êm dịu bắt đầu]\n[tiếng giày]\n[신비한 배경 음악 끝]\n[비발디 4계 시작]\n[야옹]\n[거울 깨지는 소리]\n[불타는 소리]\n[비발디 4계 끝]\n[잔잔한 배경 음악 시작]\n[구두 소리]\n[Mysterious background music ends]\n[Vivaldi 4th Season begins]\n[Meow]\n[Sound of mirror breaking]\n[Burning sound]\n[End of Vivaldi’s 4th Season]\n[Soothing background music starts]\n[shoe sound]","sourceUid":"merged-mrljfxht-6","sourceNo":27},{"id":12,"readerNo":13,"displayNo":16,"n":16,"type":"narration","vi":"Tôi không muốn khoe nhưng đàn ông luôn tán tỉnh tôi.","ko":"(강이나) 아... 자랑은 아니지만 어딜 가나 남자가 꼬인다","en":"I don't mean to brag, but men always flirt with me.","text":"Tôi không muốn khoe nhưng đàn ông luôn tán tỉnh tôi.\n(강이나) 아... 자랑은 아니지만 어딜 가나 남자가 꼬인다\nI don't mean to brag, but men always flirt with me.","sourceUid":"merged-mrljgn3w-8","sourceNo":16},{"id":13,"readerNo":14,"displayNo":16,"n":16,"type":"narration","vi":"Chúc ngon miệng.","ko":"(알바생) 맛있게 드십시요","en":"Enjoy.","text":"Chúc ngon miệng.\n(알바생) 맛있게 드십시요\nEnjoy.","sourceUid":"merged-mrljjy9s-9","sourceNo":16},{"id":14,"readerNo":15,"displayNo":19,"n":19,"type":"narration","vi":"Một cách âm thầm hoặc thẳng thừng.\nCó khi còn dai như đỉa.","ko":"(강이나) 은근하게\n혹은 대범하게\n아 가끔은 끈질기게...","en":"Secretly or bluntly.\nSometimes, persistently.","text":"Một cách âm thầm hoặc thẳng thừng.\nCó khi còn dai như đỉa.\n(강이나) 은근하게\n혹은 대범하게\n아 가끔은 끈질기게...\nSecretly or bluntly.\nSometimes, persistently.","sourceUid":"merged-mrljlk23-11","sourceNo":19},{"id":15,"readerNo":16,"displayNo":21,"n":21,"type":"narration","vi":"- Cô này… - Em đến rồi à?\nEm nhớ anh quá.\nMột Americano.\nĐường kẹt cứng. Anh chạy như điên đến để gặp em đấy.","ko":"저기...\n(남자) 일찍 왔어?\n(강이나) 응. 자기 보고 싶어서...\n아메리카노\n에고...\n차 진짜 막혔거든...","en":"-Excuse me... -You're here.\nI missed you, honey.\nI'll have an Americano.\nThe traffic was so bad, I was rushing to get to you.","text":"- Cô này… - Em đến rồi à?\nEm nhớ anh quá.\nMột Americano.\nĐường kẹt cứng. Anh chạy như điên đến để gặp em đấy.\n저기...\n(남자) 일찍 왔어?\n(강이나) 응. 자기 보고 싶어서...\n아메리카노\n에고...\n차 진짜 막혔거든...\n-Excuse me... -You're here.\nI missed you, honey.\nI'll have an Americano.\nThe traffic was so bad, I was rushing to get to you.","sourceUid":"merged-mrljojid-15","sourceNo":21},{"id":16,"readerNo":17,"displayNo":36,"n":36,"type":"narration","vi":"[Nhạc nền sôi động bắt đầu]","ko":"[경쾌한 배경 음악 시작]","en":"[Upbeat background music starts]","text":"[Nhạc nền sôi động bắt đầu]\n[경쾌한 배경 음악 시작]\n[Upbeat background music starts]","sourceUid":"ko-mrli6nmr-771","sourceNo":36},{"id":17,"readerNo":18,"displayNo":26,"n":26,"type":"narration","vi":"Rồi một con Ferrari cắt ngang trước mặt anh.\nNgười này là bạn trai tôi.\nTôi gặp anh ấy từ sáu tháng trước.","ko":"나는 자기가 너무 보고 싶어서 막 미친 듯이 달리고 있는데\n페라리가... 페라리가 확 끼어들어서...\n(강이나) 이 남자가 내 애인이다\n이 남자를 만난 건 6개월 전","en":"Then a Ferrari cut right in front of me.\nThis is my boyfriend.\nI met him six months ago.","text":"Rồi một con Ferrari cắt ngang trước mặt anh.\nNgười này là bạn trai tôi.\nTôi gặp anh ấy từ sáu tháng trước.\n나는 자기가 너무 보고 싶어서 막 미친 듯이 달리고 있는데\n페라리가... 페라리가 확 끼어들어서...\n(강이나) 이 남자가 내 애인이다\n이 남자를 만난 건 6개월 전\nThen a Ferrari cut right in front of me.\nThis is my boyfriend.\nI met him six months ago.","sourceUid":"merged-mrljubge-18","sourceNo":26},{"id":18,"readerNo":19,"displayNo":47,"n":47,"type":"narration","vi":"Tôi mời cô một ly nhé?\nTại sao?","ko":"한잔 사도 될까요?\n왜요?\n아...","en":"Can I buy you a drink?\nWhy?","text":"Tôi mời cô một ly nhé?\nTại sao?\n한잔 사도 될까요?\n왜요?\n아...\nCan I buy you a drink?\nWhy?","sourceUid":"merged-mrljvef3-19","sourceNo":47},{"id":19,"readerNo":20,"displayNo":28,"n":28,"type":"narration","vi":"Vì tôi thích cô.","ko":"맘에 드니까","en":"Because I like what I see.","text":"Vì tôi thích cô.\n맘에 드니까\nBecause I like what I see.","sourceUid":"merged-mrljw1vg-20","sourceNo":28},{"id":20,"readerNo":21,"displayNo":30,"n":30,"type":"narration","vi":"Tôi thích sự tự tin của anh ấy.\nNgoài ra, tôi còn có hai anh bạn trai khác.","ko":"(강이나) 그 자신감이 마음에 들었다\n이 남자 말고도 두 명의 애인이 더 있다","en":"I liked that confidence.\nI have two more boyfriends.","text":"Tôi thích sự tự tin của anh ấy.\nNgoài ra, tôi còn có hai anh bạn trai khác.\n(강이나) 그 자신감이 마음에 들었다\n이 남자 말고도 두 명의 애인이 더 있다\nI liked that confidence.\nI have \n[경고 알람 소리]\n[Bell rings]\n[Counter beep]\n[Coin striking sound]\n[Warning alarm sound]","sourceUid":"merged-mrloiq2l-33","sourceNo":119},{"id":40,"readerNo":41,"displayNo":80,"n":80,"type":"narration","vi":"Yếu tố tiên quyết là khả năng tài chính.\nMỗi khi họ chật vật chu cấp tiền tiêu vặt cho tôi thì đều nảy sinh vấn đề.\nBằng chứng ở ngay kia.\nCậu biết nó đáng giá bao nhiêu không? Hơn 200.000 won đấy.","ko":"무엇보다 중요한 건 경제력이다\n아등바등 모아서 주는 '용돈은' 꼭 탈이 생긴다\n산 증거가 저기 있다\n그게 원가가 얼만지 알아?\n만 원이면 선물로 적은 돈 아니야","en":"Money is the most important thing.\nWhen the guy struggles to pay me, there's always a problem.\nThat's the proof, right there.\nDo you realize how much that is? It's over 200,000 won.","text":"Yếu tố tiên quyết là khả năng tài chính.\nMỗi khi họ chật vật chu cấp tiền tiêu vặt cho tôi thì đều nảy sinh vấn đề.\nBằng chứng ở ngay kia.\nCậu biết nó đáng giá bao nhiêu không? Hơn 200.000 won đấy.\n무엇보다 중요한 건 경제력이다\n아등바등 모아서 주는 '용돈은' 꼭 탈이 생긴다\n산 증거가 저기 있다\n그게 원가가 얼만지 알아?\n만 원이면 선물로 적은 돈 아니야\nMoney is the most important thing.\nWhen the guy struggles to pay me, there's always a problem.\nThat's the proof, right there.\nDo you realize how much that is? It's over 200,000 won.","sourceUid":"merged-mrlolyju-36","sourceNo":80},{"id":41,"readerNo":42,"displayNo":83,"n":83,"type":"narration","vi":"Bảy năm trước, má mì quen một chàng trai.\nMỗi lần gặp gỡ, người ấy đều tặng quà.\nDây chuyền, túi xách, mỹ phẩm.","ko":"(강이나) 7년 전\n마담은 한 남자를 만났다\n남자는 만날 때마다 선물을 안겼다\n목걸이, 가방, 화장품...","en":"Seven years ago, the madam met a guy.\nThe guy gave her a gift whenever he saw her.\nA necklace, purse, makeup.","text":"Bảy năm trước, má mì quen một chàng trai.\nMỗi lần gặp gỡ, người ấy đều tặng quà.\nDây chuyền, túi xách, mỹ phẩm.\n(강이나) 7년 전\n마담은 한 남자를 만났다\n남자는 만날 때마다 선물을 안겼다\n목걸이, 가방, 화장품...\nSeven years ago, the madam met a guy.\nThe guy gave her a gift whenever he saw her.\nA necklace, purse, makeup.","sourceUid":"merged-mrloprd0-38","sourceNo":83},{"id":42,"readerNo":43,"displayNo":86,"n":86,"type":"narration","vi":"Rồi cảnh sát ập đến.\nNgười đàn ông kia là nhân viên ngân hàng. Anh ta biển thủ tiền của khách.\nSau khi anh ta thụ án một năm hai tháng tù,","ko":"그리고 경찰이 찾아왔다\n남자는 은행원이었고 고객의 돈을 횡령했단다\n년 2개월의 실형을 살고 나왔을 때","en":"And then, the cops came.\nThe guy was a bank clerk and stole the clients' money.\nAfter he spent a year and two months in prison,","text":"Rồi cảnh sát ập đến.\nNgười đàn ông kia là nhân viên ngân hàng. Anh ta biển thủ tiền của khách.\nSau khi anh ta thụ án một năm hai tháng tù,\n그리고 경찰이 찾아왔다\n남자는 은행원이었고 고객의 돈을 횡령했단다\n년 2개월의 실형을 살고 나왔을 때\nAnd then, the cops came.\nThe guy was a bank clerk and stole the clients' money.\nAfter he spent a year and two months in prison,","sourceUid":"merged-mrlorg3c-40","sourceNo":86},{"id":43,"readerNo":44,"displayNo":90,"n":90,"type":"narration","vi":"công ty và gia đình đều chối bỏ anh ta.\nAnh muốn gọi món gì?\nÀ, tôi…\nWhiskey hay gì cũng được.","ko":"회사도 가정도 남자를 받아주지 않았다\n주문하시겠습니까?\n아, 예. 뭐...\n아무거나... 위스키 같은 걸로...","en":"his job and his family didn't take him back.\nWould you like to order?\nYes, well...\nany whiskey will do.","text":"công ty và gia đình đều chối bỏ anh ta.\nAnh muốn gọi món gì?\nÀ, tôi…\nWhiskey hay gì cũng được.\n회사도 가정도 남자를 받아주지 않았다\n주문하시겠습니까?\n아, 예. 뭐...\n아무거나... 위스키 같은 걸로...\nhis job and his family didn't take him back.\nWould you like to order?\nYes, well...\nany whiskey will do.","sourceUid":"merged-mrloy37y-42","sourceNo":90},{"id":44,"readerNo":45,"displayNo":93,"n":93,"type":"narration","vi":"Anh uống với đá hay nguyên chất?\nTùy cậu.\nVậy tôi sẽ không bỏ đá.","ko":"언더락으로 드릴까요? 아니면 스트레이트로 드릴까요?\n아무렇게나\n그럼 얼음 없이 드리겠습니다","en":"On the rocks or neat?\nEither way.\nI'll serve with no ice then.","text":"Anh uống với đá hay nguyên chất?\nTùy cậu.\nVậy tôi sẽ không bỏ đá.\n언더락으로 드릴까요? 아니면 스트레이트로 드릴까요?\n아무렇게나\n그럼 얼음 없이 드리겠습니다\nOn the rocks or neat?\nEither way.\nI'll serve with no ice then.","sourceUid":"merged-mrlp0aex-44","sourceNo":93},{"id":45,"readerNo":46,"displayNo":96,"n":96,"type":"narration","vi":"Bạn không thể vớ đại một anh bồ mỗi khi cần.\nTôi đoán là ai cũng vậy thôi.","ko":"(강이나) 필요하다고 해서 그날로 애인이 구해지는 건 아니다\n뭐 누구나 마찬가지겠지만...","en":"You can't find a boyfriend whenever you need one.\nThat goes for everybody, I guess.","text":"Bạn không thể vớ đại một anh bồ mỗi khi cần.\nTôi đoán là ai cũng vậy thôi.\n(강이나) 필요하다고 해서 그날로 애인이 구해지는 건 아니다\n뭐 누구나 마찬가지겠지만...\nYou can't find a boyfriend whenever you need one.\nThat goes for everybody, I guess.","sourceUid":"merged-mrlp0un6-45","sourceNo":96},{"id":46,"readerNo":47,"displayNo":141,"n":141,"type":"narration","vi":"[Nhạc nền phong cách Jazz kết thúc]","ko":"[재즈 풍 배경 음악 끝]","en":"[Jazz-style background music ends]","text":"[Nhạc nền phong cách Jazz kết thúc]\n[재즈 풍 배경 음악 끝]\n[Jazz-style background music ends]","sourceUid":"ko-mrli6nms-876","sourceNo":141},{"id":47,"readerNo":48,"displayNo":99,"n":99,"type":"narration","vi":"Thật á? Ghê vậy.\nChuyện chị Yi Na là sinh viên cũng là nói dối nốt.\nChị quen một người trong nhóm báo trường nên nhờ họ điều tra.\nHọ nói khoa đó không có ai tên như vậy.\nSao chị ấy dám làm vậy?","ko":"진짜? 완전 대박\n강 언니 있잖아 대학생이라는 것도 거짓말이래\n그쪽 학보사에 아는 애가 있어서 알아봐 달라고 했거든\n경영학과에 그런 이름 없대\n어떻게 그럴 수가 있지","en":"Really?\nYi-Na isn't even in college.\nI know someone at the office, and asked them to look into it.\nThere's no one with that name in business school.\nHow does anyone do that?","text":"Thật á? Ghê vậy.\nChuyện chị Yi Na là sinh viên cũng là nói dối nốt.\nChị quen một người trong nhóm báo trường nên nhờ họ điều tra.\nHọ nói khoa đó không có ai tên như vậy.\nSao chị ấy dám làm vậy?\n진짜? 완전 대박\n강 언니 있잖아 대학생이라는 것도 거짓말이래\n그쪽 학보사에 아는 애가 있어서 알아봐 달라고 했거든\n경영학과에 그런 이름 없대\n어떻게 그럴 수가 있지\nReally?\nYi-Na isn't even in college.\nI know someone at the office, and asked them to look into it.\nThere's no one with that name in business school.\nHow does anyone do that?","sourceUid":"merged-mrlp5si8-50","sourceNo":99},{"id":48,"readerNo":49,"displayNo":104,"n":104,"type":"narration","vi":"Chị ấy còn nói dối gì nữa?\nCái tên có phải thật không?\nBộ phim nào mà nhân vật nữ nói dối mọi thứ ấy nhỉ?\n- Vô Vọng. - Chính là nó.","ko":"도대체 진짜가 뭐야?\n이름은 진짠가?\n왜... 그런 영화 있지 않았어?\n그... 모든 게 다 거짓말인 여자 이야기\n화차!\n맞다, 그거...","en":"What else did she lie about?\nIs her name real?\nWasn't there a movie with a woman who lied about everything?\n-Helpless. -Right.","text":"Chị ấy còn nói dối gì nữa?\nCái tên có phải thật không?\nBộ phim nào mà nhân vật nữ nói dối mọi thứ ấy nhỉ?\n- Vô Vọng. - Chính là nó.\n도대체 진짜가 뭐야?\n이름은 진짠가?\n왜... 그런 영화 있지 않았어?\n그... 모든 게 다 거짓말인 여자 이야기\n화차!\n맞다, 그거...\nWhat else did she lie about?\nIs her name real?\nWasn't there a movie with a woman who lied about everything?\n-Helpless. -Right.","sourceUid":"merged-mrlp86f6-52","sourceNo":104},{"id":49,"readerNo":50,"displayNo":107,"n":107,"type":"narration","vi":"Chị đang nổi da gà đây.\nChị nói em mới để ý,\ntrông chị ấy khi rời khỏi nhà khác với lúc về nhà.","ko":"아, 나 완전 소름 돋았어\n그러고 보니까 강 언니...\n나갈 때랑 들어올 때랑 좀 달랐던 것 같기도 해요","en":"I got goosebumps.\nNow that I think of it,\nshe looked different than she did when she left the house.","text":"Chị đang nổi da gà đây.\nChị nói em mới để ý,\ntrông chị ấy khi rời khỏi nhà khác với lúc về nhà.\n아, 나 완전 소름 돋았어\n그러고 보니까 강 언니...\n나갈 때랑 들어올 때랑 좀 달랐던 것 같기도 해요\nI got goosebumps.\nNow that I think of it,\nshe looked different than she did when she left the house.","sourceUid":"merged-mrlp8z80-53","sourceNo":107},{"id":50,"readerNo":51,"displayNo":156,"n":156,"type":"narration","vi":"- Ý em là sao? - Thì…\nlớp trang điểm và mọi thứ về chị ấy.\nLớp trang điểm làm sao?\nỪ thì…","ko":"뭐가?\n어...\n화장이랑 전체적인 느낌이...\n화장이 어땠는데...","en":"-What do you mean? -Well...\nher makeup and everything about her.\nHow different was her makeup?\nWell...","text":"- Ý em là sao? - Thì…\nlớp trang điểm và mọi thứ về chị ấy.\nLớp trang điểm làm sao?\nỪ thì…\n뭐가?\n어...\n화장이랑 전체적인 느낌이...\n화장이 어땠는데...\n-What do you mean? -Well...\nher makeup and everything about her.\nHow different was her makeup?\nWell...","sourceUid":"merged-mrlpatpv-54","sourceNo":156},{"id":51,"readerNo":52,"displayNo":166,"n":166,"type":"narration","vi":"[tiếng giày]\n[Hiệu ứng âm thanh bíp]\n[Tiếng mở rèm]","ko":"[구두 소리]\n[효과음 삐용]\n[커튼 열리는 소리]","en":"[shoe sound]\n[Sound effect beeping]\n[Sound of curtain opening]","text":"[tiếng giày]\n[Hiệu ứng âm thanh bíp]\n[Tiếng mở rèm]\n[구두 소리]\n[효과음 삐용]\n[커튼 열리는 소리]\n[shoe sound]\n[Sound effect beeping]\n[Sound of curtain opening]","sourceUid":"merged-mrlpdleq-57","sourceNo":166},{"id":52,"readerNo":53,"displayNo":115,"n":115,"type":"narration","vi":"Mị đi đây.\nMị về rồi.\n- Em không biết nữa. - Gì vậy trời?\nCũng phải. Chị ấy học Quản trị Kinh doanh mà lại không biết Piketty.\nPiketty là gì?","ko":"나 갔다 올게\n(강이나) 나 왔어\n잘 모르겠어요\n뭐야?\n하긴 피케티도 몰랐잖아 경영학관데...\n피케티가 뭔데?","en":"I'm leaving.\nI'm back.\n-I'm not sure. -What was that?\nThen again, she didn't even know Piketty when she claims to be a business major.\nWhat's Piketty?","text":"Mị đi đây.\nMị về rồi.\n- Em không biết nữa. - Gì vậy trời?\nCũng phải. Chị ấy học Quản trị Kinh doanh mà lại không biết Piketty.\nPiketty là gì?\n나 갔다 올게\n(강이나) 나 왔어\n잘 모르겠어요\n뭐야?\n하긴 피케티도 몰랐잖아 경영학관데...\n피케티가 뭔데?\nI'm leaving.\nI'm back.\n-I'm not sure. -What was that?\nThen again, she didn't even know Piketty when she claims to be a business major.\nWhat's Piketty?","sourceUid":"merged-mrlpd84b-56","sourceNo":115},{"id":53,"readerNo":54,"displayNo":120,"n":120,"type":"narration","vi":"Thomas Piketty. Nhà kinh tế học.\nTớ học Thực phẩm và Dinh dưỡng thì sao mà biết được?\nEm cũng không biết nhỉ?\nTác giả cuốn Tư Bản Thế Kỷ 21 .","ko":"토마 피케티\n경제학자\n야! 식영과가 경제학자를 어떻게 아냐?\n너도 모르지?\n‘21세기 자본론’","en":"Thomas Piketty. The economist.\nI study nutrition. How would I know that?\nYou don't know that either, do you?\nCapital in the 21st Century.","text":"Thomas Piketty. Nhà kinh tế học.\nTớ học Thực phẩm và Dinh dưỡng thì sao mà biết được?\nEm cũng không biết nhỉ?\nTác giả cuốn Tư Bản Thế Kỷ 21 .\n토마 피케티\n경제학자\n야! 식영과가 경제학자를 어떻게 아냐?\n너도 모르지?\n‘21세기 자본론’\nThomas Piketty. The economist.\nI study nutrition. How would I know that?\nYou don't know that either, do you?\nCapital in the 21st Century.","sourceUid":"merged-mrlpene7-58","sourceNo":120},{"id":54,"readerNo":55,"displayNo":123,"n":123,"type":"narration","vi":"Đồ vô tri. Cậu cũng là hàng dỏm đúng không?\nNếu chị ấy không phải sinh viên thì không cần kiếm học phí.\nCũng có vẻ không phải là gửi tiền về nhà.","ko":"무식해, 무식해\n너도 가짜지?\n학생이 아니면 등록금 벌려고 그런 것도 아니고…\n집에 돈 보내는 거 같지도 않았지?","en":"So dumb. You're a phony too, aren't you?\nIt can't be about tuition, since she's not a student.\nIt didn't look like she was sending money home.","text":"Đồ vô tri. Cậu cũng là hàng dỏm đúng không?\nNếu chị ấy không phải sinh viên thì không cần kiếm học phí.\nCũng có vẻ không phải là gửi tiền về nhà.\n무식해, 무식해\n너도 가짜지?\n학생이 아니면 등록금 벌려고 그런 것도 아니고…\n집에 돈 보내는 거 같지도 않았지?\nSo dumb. You're a phony too, aren't you?\nIt can't be about tuition, since she's not a student.\nIt didn't look like she was sending money home.","sourceUid":"merged-mrlpjylq-59","sourceNo":123},{"id":55,"readerNo":56,"displayNo":186,"n":186,"type":"narration","vi":"Vậy thì lý do là gì?\nĐể sống nhàn hạ hơn.\nNhưng vẫn…\nNhiều sinh viên ngày nay cũng vậy mà.\nHọ làm \"bạn gái\" để kiếm tiền.\nTrời đất ơi. Thế giới này vận hành thế nào vậy?","ko":"근데, 왜 그랬대?\n쉽게 살려고!\n그치만...\n요새 대학생 중에도 그런 애들 꽤 있다잖아\n용돈 받고 애인해주는 애들\n세상에...\n세상이 어떻게 되려고 이러나 몰라...","en":"Why did she do it?\nTo have an easy life.\nBut still...\nThere are lots of college students like that,\nthey'd be \"girlfriends\" for money.\nGoodness. What's the world turning into?","text":"Vậy thì lý do là gì?\nĐể sống nhàn hạ hơn.\nNhưng vẫn…\nNhiều sinh viên ngày nay cũng vậy mà.\nHọ làm \"bạn gái\" để kiếm tiền.\nTrời đất ơi. Thế giới này vận hành thế nào vậy?\n근데, 왜 그랬대?\n쉽게 살려고!\n그치만...\n요새 대학생 중에도 그런 애들 꽤 있다잖아\n용돈 받고 애인해주는 애들\n세상에...\n세상이 어떻게 되려고 이러나 몰라...\nWhy did she do it?\nTo have an easy life.\nBut still...\nThere are lots of college students like that,\nthey'd be \"girlfriends\" for money.\nGoodness. What's the world turning into?","sourceUid":"merged-mrlpm19j-62","sourceNo":186},{"id":56,"readerNo":57,"displayNo":193,"n":193,"type":"narration","vi":"[Cười]\n[Tiếng đóng cửa]\n[Tiếng cửa kêu cót két]","ko":"[웃는다]\n[문 닫는 소리]\n[삑삑삑 문 소리]","en":"[Laughs]\n[Sound of door closing]\n[Sound of door squeaking]","text":"[Cười]\n[Tiếng đóng cửa]\n[Tiếng cửa kêu cót két]\n[웃는다]\n[문 닫는 소리]\n[삑삑삑 문 소리]\n[Laughs]\n[Sound of door closing]\n[Sound of door squeaking]","sourceUid":"merged-mrlpot7e-64","sourceNo":193},{"id":57,"readerNo":58,"displayNo":135,"n":135,"type":"narration","vi":"Tớ lại vừa càm ràm như bà già nhỉ?\nChuyện xưa như trái đất rồi mà.\nĐánh nhau không?\nTiền bối Yoon.\nNghe nói chị Yi Na không phải sinh viên.\nThật sao?","ko":"헉!\n나 방금 완전 아줌마 같았지?\n어제 오늘 일도 아니면서 놀래기는...\n우씨, 싸울래...\n윤 선배!\n강 언니 있잖아, 대학생 아니래\n그래?","en":"I was totally an old lady just now, wasn't I?\nIt isn't anything new.\nAre you going to fight me?\nJin-Myung.\nYi-Na isn't a college student.\nReally?","text":"Tớ lại vừa càm ràm như bà già nhỉ?\nChuyện xưa như trái đất rồi mà.\nĐánh nhau không?\nTiền bối Yoon.\nNghe nói chị Yi Na không phải sinh viên.\nThật sao?\n헉!\n나 방금 완전 아줌마 같았지?\n어제 오늘 일도 아니면서 놀래기는...\n우씨, 싸울래...\n윤 선배!\n강 언니 있잖아, 대학생 아니래\n그래?\nI was totally an old lady just now, wasn't I?\nIt isn't anything new.\nAre you going to fight me?\nJin-Myung.\nYi-Na isn't a college student.\nReally?","sourceUid":"merged-mrlpnk0f-63","sourceNo":135},{"id":58,"readerNo":59,"displayNo":139,"n":139,"type":"narration","vi":"Ji Won nhờ bạn tìm hiểu hộ.\nHọ nói không có sinh viên nào tên như vậy.\nNghe bàng hoàng nhỉ? Ai lại làm như vậy chứ?\nTại sao chị ấy không bất ngờ?","ko":"송이 친구한테 알아봤는데\n대학교에 뭐 그런 과에 그런 이름 없대\n완전 말도 안 되지...\n어떻게 그럴 수가 있어?\n뭐야? 왜 안 놀래?","en":"Ji-Won had her friend look into it. There's no one with a name like that. Isn't it ridiculous? Who does that? Why isn't she surprised?","text":"Ji Won nhờ bạn tìm hiểu hộ.\nHọ nói không có sinh viên nào tên như vậy.\nNghe bàng hoàng nhỉ? Ai lại làm như vậy chứ?\nTại sao chị ấy không bất ngờ?\n송이 친구한테 알아봤는데\n대학교에 뭐 그런 과에 그런 이름 없대\n완전 말도 안 되지...\n어떻게 그럴 수가 있어?\n뭐야? 왜 안 놀래?\nJi-Won had her friend look into it. There's no one with a name like that. Isn't it ridiculous? Who does that? Why isn't she surprised?","sourceUid":"merged-mrlpqklj-67","sourceNo":139},{"id":59,"readerNo":60,"displayNo":201,"n":201,"type":"narration","vi":"","ko":"[기괴한 음악 시작]","en":"","text":"[기괴한 음악 시작]","sourceUid":"ko-mrli6nms-936","sourceNo":201},{"id":60,"readerNo":61,"displayNo":205,"n":205,"type":"narration","vi":"[Âm thanh ăn bánh quy]","ko":"[과자 먹는 소리]","en":"[Sound of eating cookies]","text":"[Âm thanh ăn bánh quy]\n[과자 먹는 소리]\n[Sound of eating cookies]","sourceUid":"ko-mrli6nms-940","sourceNo":205},{"id":61,"readerNo":62,"displayNo":143,"n":143,"type":"narration","vi":"Người ta gọi là poker face . Chắc chị ấy cũng bất ngờ lắm.\nPoker face dành cho người chơi xì tố thôi.\nSao vậy? Có chuyện gì hả?","ko":"포커페이스라 그래 나름 놀랬을 거야 포커페이스는 포커 칠 때나 쓰지 아무 때나... 왜? 왜 그래?","en":"It's called poker face. She's probably surprised.\nPoker face is for poker game.\nWhy? What's wrong?","text":"Người ta gọi là poker face . Chắc chị ấy cũng bất ngờ lắm.\nPoker face dành cho người chơi xì tố thôi.\nSao vậy? Có chuyện gì hả?\n포커페이스라 그래 나름 놀랬을 거야 포커페이스는 포커 칠 때나 쓰지 아무 때나... 왜? 왜 그래?\nIt's called poker face. She's probably surprised.\nPoker face is for poker game.\nWhy? What's wrong?","sourceUid":"merged-mrlptyjc-69","sourceNo":143},{"id":62,"readerNo":63,"displayNo":146,"n":146,"type":"narration","vi":"Các linh hồn có màu không?\nChị nói biết chị Yi Na nói dối thông qua màu sắc mà.\nĐúng rồi. Ma quỷ có màu không?","ko":"영혼에게도 색깔이 있어요?\n강 언니가 거짓말하는 거\n오라의 색깔로 알았다고 했잖아요\n맞다, 맞다 귀신한테도 색깔이 있어?","en":"Do souls have colors?\nYou said you know Yi-Na was lying because of the color.\nRight. Do ghosts have colors?","text":"Các linh hồn có màu không?\nChị nói biết chị Yi Na nói dối thông qua màu sắc mà.\nĐúng rồi. Ma quỷ có màu không?\n영혼에게도 색깔이 있어요?\n강 언니가 거짓말하는 거\n오라의 색깔로 알았다고 했잖아요\n맞다, 맞다 귀신한테도 색깔이 있어?\nDo souls have colors?\nYou said you know Yi-Na was lying because of the color.\nRight. Do ghosts have colors?","sourceUid":"merged-mrlugn34-71","sourceNo":146},{"id":63,"readerNo":64,"displayNo":150,"n":150,"type":"narration","vi":"Màu gì vậy?\nMàu xám.\nNó u uất.\nVà buồn.\nCảm giác kiểu như vậy.\nTại sao? Lý do nó buồn rầu và u uất là gì?","ko":"무슨 색인데?\n잿빛\n어...\n우울하고...\n슬프고...\n뭐 그런 느낌?\n왜? 왜? 왜 슬프고, 왜 우울한데?","en":"What color is it?\nGrey.\nIt's depressed.\nAnd sad.\nThat sort of vibe.\nWhy? Why is it sad and depressed?","text":"Màu gì vậy?\nMàu xám.\nNó u uất.\nVà buồn.\nCảm giác kiểu như vậy.\nTại sao? Lý do nó buồn rầu và u uất là gì?\n무슨 색인데?\n잿빛\n어...\n우울하고...\n슬프고...\n뭐 그런 느낌?\n왜? 왜? 왜 슬프고, 왜 우울한데?\nWhat color is it?\nGrey.\nIt's depressed.\nAnd sad.\nThat sort of vibe.\nWhy? Why is it sad and depressed?","sourceUid":"merged-mrluleaq-73","sourceNo":150},{"id":64,"readerNo":65,"displayNo":156,"n":156,"type":"narration","vi":"Điều đó thì chịu.\nTiền bối Yoon!\nMa có nghe thấy những điều chúng ta đang nói không?\nTớ không chắc.","ko":"그거야 나야 모르지\n윤 선배!\n우리가 하는 얘기\n귀신도 들어?\n글쎄...","en":"I wouldn't know.\nJin-Myung!\nDo ghosts hear what we say?\nI'm not sure.","text":"Điều đó thì chịu.\nTiền bối Yoon!\nMa có nghe thấy những điều chúng ta đang nói không?\nTớ không chắc.\n그거야 나야 모르지\n윤 선배!\n우리가 하는 얘기\n귀신도 들어?\n글쎄...\nI wouldn't know.\nJin-Myung!\nDo ghosts hear what we say?\nI'm not sure.","sourceUid":"merged-mrlumr2i-75","sourceNo":156},{"id":65,"readerNo":66,"displayNo":224,"n":224,"type":"narration","vi":"[bản nhạc kỳ lạ kết thúc]\n[Tiếng đóng cửa]","ko":"[기괴한 음악 끝]\n[문 닫는 소리]","en":"[bizarre music ends]\n[Sound of door closing]","text":"[bản nhạc kỳ lạ kết thúc]\n[Tiếng đóng cửa]\n[기괴한 음악 끝]\n[문 닫는 소리]\n[bizarre music ends]\n[Sound of door closing]","sourceUid":"merged-mrlunvkm-76","sourceNo":224},{"id":66,"readerNo":67,"displayNo":161,"n":161,"type":"narration","vi":"Trước đây nhà này từng xảy ra sự cố gì chưa?\nCó người chết chẳng hạn?\nHay bị giết?\nKhông có.\nVậy thì là gì nhỉ?","ko":"전에 이 집에 무슨 사건 사고 같은 거 없었어?\n뭐 누가 죽었다든가\n살해됐다든가...?\n아니\n그럼 뭐지?","en":"Did anything happen in this house before?\nDid anyone die?\nOr murdered?\nNo.\nThen what is it?","text":"Trước đây nhà này từng xảy ra sự cố gì chưa?\nCó người chết chẳng hạn?\nHay bị giết?\nKhông có.\nVậy thì là gì nhỉ?\n전에 이 집에 무슨 사건 사고 같은 거 없었어?\n뭐 누가 죽었다든가\n살해됐다든가...?\n아니\n그럼 뭐지?\nDid anything happen in this house before?\nDid anyone die?\nOr murdered?\nNo.\nThen what is it?","sourceUid":"merged-mrluoyw9-78","sourceNo":161},{"id":67,"readerNo":68,"displayNo":230,"n":230,"type":"narration","vi":"[Tiếng nước đổ]","ko":"[물 붓는 소리]","en":"[Sound of pouring water]","text":"[Tiếng nước đổ]\n[물 붓는 소리]\n[Sound of pouring water]","sourceUid":"ko-mrli6nms-965","sourceNo":230},{"id":68,"readerNo":69,"displayNo":233,"n":233,"type":"narration","vi":"Có thể họ theo Eun Jae về đây.\nNghĩ mà xem. Họ mới xuất hiện gần đây, sau khi em đến mà.","ko":"은재, 너 따라왔나 보다\n그렇잖아. 최근에 나타났다며? 너 오고 나서부터...\n아...","en":"Maybe it followed you here, Eun-Jae.\nThink about it. It appeared after you moved in.","text":"Có thể họ theo Eun Jae về đây.\nNghĩ mà xem. Họ mới xuất hiện gần đây, sau khi em đến mà.\n은재, 너 따라왔나 보다\n그렇잖아. 최근에 나타났다며? 너 오고 나서부터...\n아...\nMaybe it followed you here, Eun-Jae.\nThink about it. It appeared after you moved in.","sourceUid":"merged-mrluqvby-79","sourceNo":233},{"id":69,"readerNo":70,"displayNo":164,"n":164,"type":"narration","vi":"Có người quen nào của em đã qua đời không?\nCũng có thể là người chưa chết.","ko":"혹시 죽은 사람 중에 아는 사람 있어?\n아직 안 죽은 사람일지도 몰라","en":"Did anyone you know die?\nIt could be someone who didn't die yet.","text":"Có người quen nào của em đã qua đời không?\nCũng có thể là người chưa chết.\n혹시 죽은 사람 중에 아는 사람 있어?\n아직 안 죽은 사람일지도 몰라\nDid anyone you know die?\nIt could be someone who didn't die yet.","sourceUid":"merged-mrlut046-80","sourceNo":164},{"id":70,"readerNo":71,"displayNo":166,"n":166,"type":"narration","vi":"Sao có thể? Phải chết thì mới hóa thành ma được.\nVậy người thực vật thì sao?","ko":"그게 뭐야? 죽었으니까 귀신이 되지\n그럼... 식물인간은?","en":"But how? You need to be dead to be a ghost.\nWhat about brain-dead people?","text":"Sao có thể? Phải chết thì mới hóa thành ma được.\nVậy người thực vật thì sao?\n그게 뭐야? 죽었으니까 귀신이 되지\n그럼... 식물인간은?\nBut how? You need to be dead to be a ghost.\nWhat about brain-dead people?","sourceUid":"merged-mrlutvuy-81","sourceNo":166},{"id":71,"readerNo":72,"displayNo":167,"n":167,"type":"narration","vi":"Linh hồn người thực vật ở đâu?","ko":"식물인간의 영혼은 어디 있는데?","en":"Where are their souls?","text":"Linh hồn người thực vật ở đâu?\n식물인간의 영혼은 어디 있는데?\nWhere are their souls?","sourceUid":"merged-mrluujmn-82","sourceNo":167},{"id":72,"readerNo":73,"displayNo":246,"n":246,"type":"narration","vi":"[Tiếng cửa kêu cót két]\n[tiếng giày]\n[Tiếng đóng cửa]\n[Thở dài]\n[đánh hơi]\n[Nhạc nền êm dịu bắt đầu]","ko":"[삑삑삑 문 소리]\n[구두 소리]\n[문 닫는 소리]\n[한숨 쉰다]\n[냄새 맡다]\n[잔잔한 배경 음악 시작]","en":"[Sound of door squeaking]\n[shoe sound]\n[Sound of door closing]\n[Sighs]\n[sniff]\n[Soothing background music starts]","text":"[Tiếng cửa kêu cót két]\n[tiếng giày]\n[Tiếng đóng cửa]\n[Thở dài]\n[đánh hơi]\n[Nhạc nền êm dịu bắt đầu]\n[삑삑삑 문 소리]\n[구두 소리]\n[문 닫는 소리]\n[한숨 쉰다]\n[냄새 맡다]\n[잔잔한 배경 음악 시작]\n[Sound of door squeaking]\n[shoe sound]\n[Sound of door closing]\n[Sighs]\n[sniff]\n[Soothing background music starts]","sourceUid":"merged-mrluvl9m-83","sourceNo":246},{"id":73,"readerNo":74,"displayNo":173,"n":173,"type":"narration","vi":"Song này, cậu ngủ chưa? Chưa. Cậu không thấy ghê à? Chuyện gì? Chị Kang ấy.\nChắc hẳn chị ấy ngủ dạo với đủ loại đàn ông.","ko":"송?\n자?\n아니...\n찝찝하지?\n응?\n강 언니 말이야\n이 남자 저 남자 아무하고나 하고 다닐 텐데...","en":"Song. Are you sleeping?\nNo.\nDoesn't it feel a little gross?\nWhat?\nI mean Yi-Na.\nShe must be sleeping around.","text":"Song này, cậu ngủ chưa? Chưa. Cậu không thấy ghê à? Chuyện gì? Chị Kang ấy.\nChắc hẳn chị ấy ngủ dạo với đủ loại đàn ông.\n송?\n자?\n아니...\n찝찝하지?\n응?\n강 언니 말이야\n이 남자 저 남자 아무하고나 하고 다닐 텐데...\nSong. Are you sleeping?\nNo.\nDoesn't it feel a little gross?\nWhat?\nI mean Yi-Na.\nShe must be sleeping around.","sourceUid":"merged-mrluxj76-85","sourceNo":173},{"id":74,"readerNo":75,"displayNo":176,"n":176,"type":"narration","vi":"Nếu nhiễm bệnh lây qua đường tình dục\nthì có thể lây lan mà.\nỪ. Cậu nói đúng.","ko":"무슨 병 같은 거 걸리면...\n막 옮기도 하잖아\n좀... 그렇긴 해","en":"When you have STD,\nyou can spread it, too.\nRight. That's true.","text":"Nếu nhiễm bệnh lây qua đường tình dục\nthì có thể lây lan mà.\nỪ. Cậu nói đúng.\n무슨 병 같은 거 걸리면...\n막 옮기도 하잖아\n좀... 그렇긴 해\nWhen you have STD,\nyou can spread it, too.\nRight. That's true.","sourceUid":"merged-mrlv0kjn-87","sourceNo":176},{"id":75,"readerNo":76,"displayNo":258,"n":258,"type":"narration","vi":"[tiếng ngáy]\n[Tiếng gõ cửa]","ko":"[코 고는 소리]\n[노크 소리]","en":"[snoring sound]\n[Knocking sound]","text":"[tiếng ngáy]\n[Tiếng gõ cửa]\n[코 고는 소리]\n[노크 소리]\n[snoring sound]\n[Knocking sound]","sourceUid":"merged-mrlv18c1-88","sourceNo":258},{"id":76,"readerNo":77,"displayNo":177,"n":177,"type":"narration","vi":"Có người.","ko":"어...","en":"I'm in here.","text":"Có người.\n어...\nI'm in here.","sourceUid":"merged-mrlv1o59-89","sourceNo":177},{"id":77,"readerNo":78,"displayNo":266,"n":266,"type":"narration","vi":"[Tiếng nước rơi]\n[Tiếng đóng cửa]\n[âm thanh nhấp chuột]\n[Nhạc nền êm dịu kết thúc]\n[Âm thanh gõ nhẹ]\n[nhạc jazz bắt đầu]","ko":"[물 내리는 소리]\n[문 닫는 소리]\n[딸깍거리는 소리]\n[잔잔한 배경 음악 끝]\n[톡톡 소리낸다]\n[재즈 음악 시작]","en":"[Sound of water falling]\n[Sound of door closing]\n[clicking sound]\n[Calm background music ends]\n[Tap-tap sound]\n[jazz music starts]","text":"[Tiếng nước rơi]\n[Tiếng đóng cửa]\n[âm thanh nhấp chuột]\n[Nhạc nền êm dịu kết thúc]\n[Âm thanh gõ nhẹ]\n[nhạc jazz bắt đầu]\n[물 내리는 소리]\n[문 닫는 소리]\n[딸깍거리는 소리]\n[잔잔한 배경 음악 끝]\n[톡톡 소리낸다]\n[재즈 음악 시작]\n[Sound of water falling]\n[Sound of door closing]\n[clicking sound]\n[Calm background music ends]\n[Tap-tap sound]\n[jazz music starts]","sourceUid":"merged-mrlv29yn-90","sourceNo":266},{"id":78,"readerNo":79,"displayNo":182,"n":182,"type":"narration","vi":"Sao thế?\nTôi xin lỗi.\nChú đến đây làm gì?\nChú có vẻ không hay đến đây.\nTôi biết.\nTôi đâu hợp ở đây nhỉ?\nChúng ta giống nhau.","ko":"왜요?\n미안합니다\n아저씨는 여길 왜 와요?\n이런 데랑 별로 안 친해 보이는데...\n그렇죠?\n잘 안 어울리죠?\n뭐...나랑 비슷하네","en":"What?\nI'm sorry.\nWhy do you come here?\nYou don't look like you come here often.\nI know.\nI don't, do I?\nWe're similar in that way.","text":"Sao thế?\nTôi xin lỗi.\nChú đến đây làm gì?\nChú có vẻ không hay đến đây.\nTôi biết.\nTôi đâu hợp ở đây nhỉ?\nChúng ta giống nhau.\n왜요?\n미안합니다\n아저씨는 여길 왜 와요?\n이런 데랑 별로 안 친해 보이는데...\n그렇죠?\n잘 안 어울리죠?\n뭐...나랑 비슷하네\nWhat?\nI'm sorry.\nWhy do you come here?\nYou don't look like you come here often.\nI know.\nI don't, do I?\nWe're similar in that way.","sourceUid":"merged-mrlven0c-93","sourceNo":182},{"id":79,"readerNo":80,"displayNo":188,"n":188,"type":"narration","vi":"Có một nơi cũng không còn hợp với tôi nữa. Họ coi tôi như người bị sida! Tôi thấy vừa mắc cười vừa bực bội. Đôi khi muốn đấm họ một trận.","ko":"나도 지금 안 어울리는 데 있거든요\n무슨 에이즈 환자 취급하는데...\n웃기기도 하고, 짜증도 나고\n그냥 한바탕 해버릴까 싶다가도...","en":"I don't belong here either.\nThey treat me like an AIDS patient!\nIt's funny and annoying.\nSometimes I want to fight them.","text":"Có một nơi cũng không còn hợp với tôi nữa. Họ coi tôi như người bị sida! Tôi thấy vừa mắc cười vừa bực bội. Đôi khi muốn đấm họ một trận.\n나도 지금 안 어울리는 데 있거든요\n무슨 에이즈 환자 취급하는데...\n웃기기도 하고, 짜증도 나고\n그냥 한바탕 해버릴까 싶다가도...\nI don't belong here either.\nThey treat me like an AIDS patient!\nIt's funny and annoying.\nSometimes I want to fight them.","sourceUid":"merged-mrlvkfsd-95","sourceNo":188},{"id":80,"readerNo":81,"displayNo":191,"n":191,"type":"narration","vi":"Nhưng tôi hiểu tại sao họ làm vậy.\nTôi bực lắm.","ko":"뭐 또 아주 이해가 안 가는 것도 아니고... 아, 기분 아주 거지 같아요","en":"But I do understand why they act the way they do.\nIt feels so crappy.","text":"Nhưng tôi hiểu tại sao họ làm vậy.\nTôi bực lắm.\n뭐 또 아주 이해가 안 가는 것도 아니고... 아, 기분 아주 거지 같아요\nBut I do understand why they act the way they do.\nIt feels so crappy.","sourceUid":"merged-mrlvld2k-96","sourceNo":191},{"id":81,"readerNo":82,"displayNo":194,"n":194,"type":"narration","vi":"Nhưng cô sẵn sàng kể với tôi những chuyện đó sao?\nChuyện gì?\nChuyện tôi có bồ bao nuôi á?\nSao lại không? Tôi cũng đâu có ý định quen chú.\nChú từng muốn hẹn hò với tôi à?\nKhông đâu.","ko":"근데...\n그런 얘기 나한테 해도 되나?\n뭐요?\n나 스폰 애인 있다는 거요?\n쳇, 뭐 어때요? 아저씨랑 연애할 것도 아닌데\n아, 혹시 나랑 연애하고 싶었어요?\n아니... 아니...","en":"But is it okay to tell me this?\nTell you what?\nThat I have boyfriends who pay me?\nWhy can't I tell you? It's not like I'm going to date you.\nDid you want to date me?\nNo, it's not that.","text":"Nhưng cô sẵn sàng kể với tôi những chuyện đó sao?\nChuyện gì?\nChuyện tôi có bồ bao nuôi á?\nSao lại không? Tôi cũng đâu có ý định quen chú.\nChú từng muốn hẹn hò với tôi à?\nKhông đâu.\n근데...\n그런 얘기 나한테 해도 되나?\n뭐요?\n나 스폰 애인 있다는 거요?\n쳇, 뭐 어때요? 아저씨랑 연애할 것도 아닌데\n아, 혹시 나랑 연애하고 싶었어요?\n아니... 아니...\nBut is it okay to tell me this?\nTell you what?\nThat I have boyfriends who pay me?\nWhy can't I tell you? It's not like I'm going to date you.\nDid you want to date me?\nNo, it's not that.","sourceUid":"merged-mrlvp0j8-100","sourceNo":194},{"id":82,"readerNo":83,"displayNo":200,"n":200,"type":"narration","vi":"Sao thế? Chú không thèm đứa lăng loàn như tôi chứ gì?\nSao cô nói vậy?\nVì người ta đối xử với tôi như vậy.\nTừ nay cô định làm gì? Dọn ra khỏi căn nhà đó à?","ko":"왜요?\n나 같은 걸레는 싫어요?\n왜 그렇게 말해요?\n그런 대접을 받으니까...\n이제 어떡할 건가? 그 집에서 나올 건가?","en":"Why? You don't want a slut like me?\nWhy would you say that?\nBecause people treat me like one.\nWhat are you going to do? Will you move out of that house?","text":"Sao thế? Chú không thèm đứa lăng loàn như tôi chứ gì?\nSao cô nói vậy?\nVì người ta đối xử với tôi như vậy.\nTừ nay cô định làm gì? Dọn ra khỏi căn nhà đó à?\n왜요?\n나 같은 걸레는 싫어요?\n왜 그렇게 말해요?\n그런 대접을 받으니까...\n이제 어떡할 건가? 그 집에서 나올 건가?\nWhy? You don't want a slut like me?\nWhy would you say that?\nBecause people treat me like one.\nWhat are you going to do? Will you move out of that house?","sourceUid":"merged-mrlvpum4-101","sourceNo":200},{"id":83,"readerNo":84,"displayNo":297,"n":297,"type":"narration","vi":"Nếu họ đuổi thì tôi đi.\nNhưng tại sao tôi phải dọn đi?\nTôi đã làm gì sai chứ?\n- Cô nói dối. - Đến mức đó chắc?","ko":"나가라면 나가야죠\n아, 그치만 내가 왜 나가야 돼?\n내가 뭘 잘못했다고?\n거짓말했잖아요\n그까짓 거?","en":"I will, if they tell me to.\nBut why do I have to?\nWhat did I do wrong?\n-You lied. -So?","text":"Nếu họ đuổi thì tôi đi.\nNhưng tại sao tôi phải dọn đi?\nTôi đã làm gì sai chứ?\n- Cô nói dối. - Đến mức đó chắc?\n나가라면 나가야죠\n아, 그치만 내가 왜 나가야 돼?\n내가 뭘 잘못했다고?\n거짓말했잖아요\n그까짓 거?\nI will, if they tell me to.\nBut why do I have to?\nWhat did I do wrong?\n-You lied. -So?","sourceUid":"merged-mrlvrsnj-102","sourceNo":297},{"id":84,"readerNo":85,"displayNo":210,"n":210,"type":"narration","vi":"Chú nghĩ họ không nói dối à?\nHọ nói dối nhiều hơn tôi.\nHọ xin bố mẹ tiền để học thêm.\nHọ bảo đi thực tế với giáo sư nhưng lại đi với bồ.\nQuần áo, giày dép và mỹ phẩm của tôi.","ko":"뭐 걔들은 거짓말 안 하고 사는 줄 알아요?\n걔들이 더 해요\n학원 간다고 돈 뜯어내고\n교수님이랑 답사 간다고 애인이랑 놀러 가고\n내 옷, 내 신발, 내 화장품...","en":"Do you think they don't?\nThey lie more than I do.\nThey ask their parents for money to take classes.\nThey say they're on a field trip but they're with their boyfriends.\nMy clothes, shoes, and makeup,","text":"Chú nghĩ họ không nói dối à?\nHọ nói dối nhiều hơn tôi.\nHọ xin bố mẹ tiền để học thêm.\nHọ bảo đi thực tế với giáo sư nhưng lại đi với bồ.\nQuần áo, giày dép và mỹ phẩm của tôi.\n뭐 걔들은 거짓말 안 하고 사는 줄 알아요?\n걔들이 더 해요\n학원 간다고 돈 뜯어내고\n교수님이랑 답사 간다고 애인이랑 놀러 가고\n내 옷, 내 신발, 내 화장품...\nDo you think they don't?\nThey lie more than I do.\nThey ask their parents for money to take classes.\nThey say they're on a field trip but they're with their boyfriends.\nMy clothes, shoes, and makeup,","sourceUid":"merged-mrlvu4ug-104","sourceNo":210},{"id":85,"readerNo":86,"displayNo":212,"n":212,"type":"narration","vi":"Họ tự tiện dùng nhưng cứ chối đây đẩy.\nNếu tính kiểu đó thì tôi đâu nói dối nhiều bằng họ.\nTôi nói với khách rằng tôi không phải sinh viên.","ko":"제 맘대로 쓰고, 아니라 그러고...\n그렇게 따지면 난 진짜 거짓말 안 하는 편이에요\n내 손님들한테도 얘기했어요 나 대학생 아니라고...","en":"they use it whenever they want to and lie about it.\nI don't really lie compared to them.\nI tell my clients that I'm not a student.","text":"Họ tự tiện dùng nhưng cứ chối đây đẩy.\nNếu tính kiểu đó thì tôi đâu nói dối nhiều bằng họ.\nTôi nói với khách rằng tôi không phải sinh viên.\n제 맘대로 쓰고, 아니라 그러고...\n그렇게 따지면 난 진짜 거짓말 안 하는 편이에요\n내 손님들한테도 얘기했어요 나 대학생 아니라고...\nthey use it whenever they want to and lie about it.\nI don't really lie compared to them.\nI tell my clients that I'm not a student.","sourceUid":"merged-mrlvv52g-105","sourceNo":212},{"id":86,"readerNo":87,"displayNo":215,"n":215,"type":"narration","vi":"Và những người làm nghề giống tôi,\nhọ nói dối mình là sinh viên.\nVì làm vậy dễ kiếm tiền hơn.","ko":"그리고 나랑 같은 일 하는 애들\n다 대학생이라고 거짓말해요\n그래야 돈 타기가 쉽거든","en":"And the people that do the same job,\nthey lie that they're in college,\nbecause that makes it easier for them to get money.","text":"Và những người làm nghề giống tôi,\nhọ nói dối mình là sinh viên.\nVì làm vậy dễ kiếm tiền hơn.\n그리고 나랑 같은 일 하는 애들\n다 대학생이라고 거짓말해요\n그래야 돈 타기가 쉽거든\nAnd the people that do the same job,\nthey lie that they're in college,\nbecause that makes it easier for them to get money.","sourceUid":"merged-mrlydg6w-107","sourceNo":215},{"id":87,"readerNo":88,"displayNo":219,"n":219,"type":"narration","vi":"So với họ thì tôi quá trung thực.\nThật là bực bội.\nChú cười nhạo tôi à?\nKhông. Tôi không cười cô.","ko":"그에 비하면 난 진짜 정직의 화신이죠\n기분 나빠\n지금 비웃었죠?\n아니... 안 비웃었어요","en":"I'm very honest compared to them.\nI'm annoyed.\nYou laughed at me, didn't you?\nNo, I didn't.","text":"So với họ thì tôi quá trung thực.\nThật là bực bội.\nChú cười nhạo tôi à?\nKhông. Tôi không cười cô.\n그에 비하면 난 진짜 정직의 화신이죠\n기분 나빠\n지금 비웃었죠?\n아니... 안 비웃었어요\nI'm very honest compared to them.\nI'm annoyed.\nYou laughed at me, didn't you?\nNo, I didn't.","sourceUid":"merged-mrlyelfk-108","sourceNo":219},{"id":88,"readerNo":89,"displayNo":224,"n":224,"type":"narration","vi":"Tôi ấy mà… Mệt mỏi đến mấy cũng không nói dối.\nNói dối thật sự rất mệt.\nVậy tại sao cô nói dối họ?\nLý do gì khiến cô muốn ở lại đó đến mức phải nói dối?","ko":"난요\n피곤해서라도 거짓말 안 해요\n거짓말하는 게 얼마나 피곤한데...\n그 친구들한테는 왜 했어요?\n거짓말하면서까지\n그 집에서 살고 싶은 그런 이유가 있었나?","en":"I find... lying tiring.\nLying is really tiring.\nThen why did you lie to them?\nWhat made you want to lie, so you could stay there?","text":"Tôi ấy mà… Mệt mỏi đến mấy cũng không nói dối.\nNói dối thật sự rất mệt.\nVậy tại sao cô nói dối họ?\nLý do gì khiến cô muốn ở lại đó đến mức phải nói dối?\n난요\n피곤해서라도 거짓말 안 해요\n거짓말하는 게 얼마나 피곤한데...\n그 친구들한테는 왜 했어요?\n거짓말하면서까지\n그 집에서 살고 싶은 그런 이유가 있었나?\nI find... lying tiring.\nLying is really tiring.\nThen why did you lie to them?\nWhat made you want to lie, so you could stay there?","sourceUid":"merged-mrlyj0et-110","sourceNo":224},{"id":89,"readerNo":90,"displayNo":319,"n":319,"type":"narration","vi":"[Rung điện thoại di động]","ko":"[핸드폰 진동]","en":"[Cellphone vibration]","text":"[Rung điện thoại di động]\n[핸드폰 진동]\n[Cellphone vibration]","sourceUid":"ko-mrli6nmt-1054","sourceNo":319},{"id":90,"readerNo":91,"displayNo":230,"n":230,"type":"narration","vi":"Chú đợi một lát. Alô? Anh à. Anh đang ở đâu vậy? Trước ngân hàng á?\nVâng. Em đi ngay đây.\nVâng.","ko":"잠깐만요\n여보세요\n어, 오빠...\n지금 어디야?\n아, 은행 앞...\n어... 어, 나 지금 나가, 나가...\n응...","en":"Excuse me.\nHello?\nHi, honey.\nWhere are you now?\nIn front of the bank?\nYeah. I'm on my way now.\nOkay.","text":"Chú đợi một lát. Alô? Anh à. Anh đang ở đâu vậy? Trước ngân hàng á?\nVâng. Em đi ngay đây.\nVâng.\n잠깐만요\n여보세요\n어, 오빠...\n지금 어디야?\n아, 은행 앞...\n어... 어, 나 지금 나가, 나가...\n응...\nExcuse me.\nHello?\nHi, honey.\nWhere are you now?\nIn front of the bank?\nYeah. I'm on my way now.\nOkay.","sourceUid":"merged-mrlyl3rc-112","sourceNo":230},{"id":91,"readerNo":92,"displayNo":330,"n":330,"type":"narration","vi":"[Rung điện thoại di động]\n[Tiếng chuông cửa cửa hàng]\n[Nhạc Jazz kết thúc]\n[âm thanh xe hơi]","ko":"[핸드폰 진동]\n[가게 문 벨 소리]\n[재즈 음악 끝]\n[차 소리]","en":"[Cellphone vibration]\n[Shop door bell sound]\n[Jazz music ends]\n[car sound]","text":"[Rung điện thoại di động]\n[Tiếng chuông cửa cửa hàng]\n[Nhạc Jazz kết thúc]\n[âm thanh xe hơi]\n[핸드폰 진동]\n[가게 문 벨 소리]\n[재즈 음악 끝]\n[차 소리]\n[Cellphone vibration]\n[Shop door bell sound]\n[Jazz music ends]\n[car sound]","sourceUid":"merged-mrlymaj3-113","sourceNo":330},{"id":92,"readerNo":93,"displayNo":235,"n":235,"type":"narration","vi":"Chúng ta đi ăn trước nhé?\nEm đói à?\nEm nên nói sớm hơn chứ.\nBụng đói, không có sức thì em không muốn làm gì cả.\nCó thực mới vực được đạo mà.","ko":"우리 밥부터 먹으면 안 돼요?\n배고파?\n진작 얘길 하든가...\n배고파서 아무것도 하기도 싫어\n밥 먹으면 진짜 잘할 것 같은데...","en":"Can we eat first?\nAre you hungry?\nYou should have told me earlier.\nI don't want to be tired because I'm hungry.\nI think I'll be really good if I eat.","text":"Chúng ta đi ăn trước nhé?\nEm đói à?\nEm nên nói sớm hơn chứ.\nBụng đói, không có sức thì em không muốn làm gì cả.\nCó thực mới vực được đạo mà.\n우리 밥부터 먹으면 안 돼요?\n배고파?\n진작 얘길 하든가...\n배고파서 아무것도 하기도 싫어\n밥 먹으면 진짜 잘할 것 같은데...\nCan we eat first?\nAre you hungry?\nYou should have told me earlier.\nI don't want to be tired because I'm hungry.\nI think I'll be really good if I eat.","sourceUid":"merged-mrlynrle-115","sourceNo":235},{"id":93,"readerNo":94,"displayNo":341,"n":341,"type":"narration","vi":"- Trời ạ. - Nhé?\nTôi sẽ quay lại.\n- Em muốn ăn gì? - Bít tết.","ko":"아이...\n응?\n조금 있다가 다시 올게\n뭐가 먹고 싶은데?\n스테이크","en":"-Gosh. -Please?\nI'll be back soon.\n-What do you want to eat? -Steak.","text":"- Trời ạ. - Nhé?\nTôi sẽ quay lại.\n- Em muốn ăn gì? - Bít tết.\n아이...\n응?\n조금 있다가 다시 올게\n뭐가 먹고 싶은데?\n스테이크\n-Gosh. -Please?\nI'll be back soon.\n-What do you want to eat? -Steak.","sourceUid":"merged-mrlypj6n-116","sourceNo":341},{"id":94,"readerNo":95,"displayNo":343,"n":343,"type":"narration","vi":"[Thở dài]\n[âm thanh xe hơi]\n[Tiếng giày] [Nhạc cổ điển bắt đầu]","ko":"[한숨 쉰다]\n[차 소리]\n[신발 소리] [클래식 음악 시작]","en":"[Sighs]\n[car sound]\n[Shoes sound] [Classical music starts]","text":"[Thở dài]\n[âm thanh xe hơi]\n[Tiếng giày] [Nhạc cổ điển bắt đầu]\n[한숨 쉰다]\n[차 소리]\n[신발 소리] [클래식 음악 시작]\n[Sighs]\n[car sound]\n[Shoes sound] [Classical music starts]","sourceUid":"merged-mrlyq7vu-117","sourceNo":343},{"id":95,"readerNo":96,"displayNo":242,"n":242,"type":"narration","vi":"Cảm ơn.\nCảm ơn cô.\nCảm ơn quý khách.\nChúc ngon miệng.","ko":"감사합니다 맛있게 드십시요","en":"Thank you.\nThanks.\nEnjoy.","text":"Cảm ơn.\nCảm ơn cô.\nCảm ơn quý khách.\nChúc ngon miệng.\n감사합니다 맛있게 드십시요\nThank you.\nThanks.\nEnjoy.","sourceUid":"merged-mrlyqwna-118","sourceNo":242},{"id":96,"readerNo":97,"displayNo":246,"n":246,"type":"narration","vi":"Đây là thực đơn và danh sách rượu.\nBàn số bảy.\nThấy chiếc túi xách không?\nGiá của nó ít nhất cũng năm triệu won.\nBằng 500 giờ làm việc của bọn mình.","ko":"와인리스트와 식사메뉴 준비해 드리겠습니다\n번 테이블\n여자애 가방 봤어?\n보테가야. 최소 5백\n우리 시급으로 500시간짜리다!","en":"Here's the menu and the wine list. Table seven.\nDid you see the girl's bag?\nIt's at least 5 million won.\nThat's 500 hours of work for us.","text":"Đây là thực đơn và danh sách rượu.\nBàn số bảy.\nThấy chiếc túi xách không?\nGiá của nó ít nhất cũng năm triệu won.\nBằng 500 giờ làm việc của bọn mình.\n와인리스트와 식사메뉴 준비해 드리겠습니다\n번 테이블\n여자애 가방 봤어?\n보테가야. 최소 5백\n우리 시급으로 500시간짜리다!\nHere's the menu and the wine list. Table seven.\nDid you see the girl's bag?\nIt's at least 5 million won.\nThat's 500 hours of work for us.","sourceUid":"merged-mrlyvk63-122","sourceNo":246},{"id":97,"readerNo":98,"displayNo":352,"n":352,"type":"narration","vi":"[Thở dài]","ko":"[한숨 쉰다]","en":"[Sighs]","text":"[Thở dài]\n[한숨 쉰다]\n[Sighs]","sourceUid":"ko-mrli6nmt-1087","sourceNo":352},{"id":98,"readerNo":99,"displayNo":252,"n":252,"type":"narration","vi":"Thật là bực mình.\nSao em không ăn? Em đòi đến đây mà.\nEm xin lỗi. Dở lắm đúng không?\nNgon mà.","ko":"완전 짜증 나\n왜 안 먹어?\n네가 오자고 했잖아\n미안, 별맛 없지?\n맛있는데...","en":"That's so depressing.\nWhy aren't you eating? You wanted to come here.\nI'm sorry. It's not good, is it?\nI like it.","text":"Thật là bực mình.\nSao em không ăn? Em đòi đến đây mà.\nEm xin lỗi. Dở lắm đúng không?\nNgon mà.\n완전 짜증 나\n왜 안 먹어?\n네가 오자고 했잖아\n미안, 별맛 없지?\n맛있는데...\nThat's so depressing.\nWhy aren't you eating? You wanted to come here.\nI'm sorry. It's not good, is it?\nI like it.","sourceUid":"merged-mrlywlww-123","sourceNo":252},{"id":99,"readerNo":100,"displayNo":359,"n":359,"type":"narration","vi":"[Nhạc cổ điển kết thúc]","ko":"[클래식 음악 끝]","en":"[Classical music ends]","text":"[Nhạc cổ điển kết thúc]\n[클래식 음악 끝]\n[Classical music ends]","sourceUid":"ko-mrli6nmt-1094","sourceNo":359},{"id":100,"readerNo":101,"displayNo":258,"n":258,"type":"narration","vi":"Này! Đứng lại!\nMày đứng lại ngay!\nDừng lại!\nMày định chạy đi đâu?\n- Con ranh! - Còn trẻ trung mơn mởn vậy mà!\nCứ phải đi giật chồng người ta mới được à?\n- Con điếm! - Mày sướng không?\n- Để bà xem bản mặt mày. - Dừng tay.\nTôi yêu cầu các người dừng lại!\nLiên quan gì đến mày?\n- Còn vậy là tôi báo cảnh sát. - Này!","ko":"(아줌마) 야! 너 거기 안 서...\n야, 거기 안 서!\n야! 야, 너 거기 서! 야!\n거기 서!\n어딜 도망가!\n이런 새파랗게 젊은 년이\n어디 할 짓이 없어서\n남의 남편을 그렇게...\n너 정말 뒹구니까 좋았냐, 이년아!\n(윤진명) 그만하세요\n(아줌마 1) 얼굴 함 보자, 이년아!\n(윤진명) 그만하시라고요!\n(아줌마 2) 네가 뭔 상관이야?\n(윤진명) 계속하시면 신고합니다","en":"Hey! Stop there!\nStop right there!\nStop there!\nWhere do you think you're going?\n-You! -You're young enough!\nDid you have to have someone's husband?\n-You bitch! -Did you enjoy it?\n-Let's see your face. -Stop it.\nI said stop!\nWhat do you care?\n-If you don't stop, I'll call the police. -Hey!","text":"Này! Đứng lại!\nMày đứng lại ngay!\nDừng lại!\nMày định chạy đi đâu?\n- Con ranh! - Còn trẻ trung mơn mởn vậy mà!\nCứ phải đi giật chồng người ta mới được à?\n- Con điếm! - Mày sướng không?\n- Để bà xem bản mặt mày. - Dừng tay.\nTôi yêu cầu các người dừng lại!\nLiên quan gì đến mày?\n- Còn vậy là tôi báo cảnh sát. - Này!\n(아줌마) 야! 너 거기 안 서...\n야, 거기 안 서!\n야! 야, 너 거기 서! 야!\n거기 서!\n어딜 도망가!\n이런 새파랗게 젊은 년이\n어디 할 짓이 없어서\n남의 남편을 그렇게...\n너 정말 뒹구니까 좋았냐, 이년아!\n(윤진명) 그만하세요\n(아줌마 1) 얼굴 함 보자, 이년아!\n(윤진명) 그만하시라고요!\n(아줌마 2) 네가 뭔 상관이야?\n(윤진명) 계속하시면 신고합니다\nHey! Stop there!\nStop right there!\nStop there!\nWhere do you think you're going?\n-You! -You're young enough!\nDid you have to have someone's husband?\n-You bitch! -Did you enjoy it?\n-Let's see your face. -Stop it.\nI said stop!\nWhat do you care?\n-If you don't stop, I'll call the police. -Hey!","sourceUid":"merged-mrlz294a-126","sourceNo":258},{"id":101,"readerNo":102,"displayNo":271,"n":271,"type":"narration","vi":"Mày biết con khốn này làm gì không?\nTôi mặc kệ cô ta giật chồng hay không.\nChị không thể làm trò này trước cửa hàng.\n- Và đừng nói trống không với tôi. - Con ranh…\nMẹ kiếp.\n- Trời ạ. - Đủ rồi.\nLần sau bà không tha cho mày đâu.\nCon khốn, coi như số mày còn đỏ!","ko":"(아줌마 2) 야, 너 이년이 어떤 년인지 알고나 그래?\n(윤진명) 아주머니의 남편을 빼앗았든 어쨌든\n편의점 앞에서 이러시면 곤란합니다\n그리고 반말하지 마세요\n(아줌마 2) 아니, 뭐 이런 게 다 있어...\n아야... 아유!\n- 야! - 어으... 진짜!\n(아줌마 1) 오늘은 그냥 가\n(아줌마 2) 너 다음엔 가만히 안 놔줄 줄 알아...\n(아줌마 1) 너 이년아! 너!\n너 운 좋은 줄 알아, 이년아...","en":"Do you know what she is? I don't care if she stole your husband. You can't do this in front of our store. -And you don't talk to me that way. -You little... Gosh. -Gosh. -Let's just go today. I won't let you go next time. Consider yourself lucky, bitch!","text":"Mày biết con khốn này làm gì không?\nTôi mặc kệ cô ta giật chồng hay không.\nChị không thể làm trò này trước cửa hàng.\n- Và đừng nói trống không với tôi. - Con ranh…\nMẹ kiếp.\n- Trời ạ. - Đủ rồi.\nLần sau bà không tha cho mày đâu.\nCon khốn, coi như số mày còn đỏ!\n(아줌마 2) 야, 너 이년이 어떤 년인지 알고나 그래?\n(윤진명) 아주머니의 남편을 빼앗았든 어쨌든\n편의점 앞에서 이러시면 곤란합니다\n그리고 반말하지 마세요\n(아줌마 2) 아니, 뭐 이런 게 다 있어...\n아야... 아유!\n- 야! - 어으... 진짜!\n(아줌마 1) 오늘은 그냥 가\n(아줌마 2) 너 다음엔 가만히 안 놔줄 줄 알아...\n(아줌마 1) 너 이년아! 너!\n너 운 좋은 줄 알아, 이년아...\nDo you know what she is? I don't care if she stole your husband. You can't do this in front of our store. -And you don't talk to me that way. -You little... Gosh. -Gosh. -Let's just go today. I won't let you go next time. Consider yourself lucky, bitch!","sourceUid":"merged-mrlz50vm-128","sourceNo":271},{"id":102,"readerNo":103,"displayNo":272,"n":272,"type":"narration","vi":"Cô đứng lên được chứ? Vậy thì né ra đi. Cô chặn cửa ra vào rồi.","ko":"움직일 수 있겠어요?\n그럼 좀 비켜줄래요 출입문 앞이라...","en":"Can you get up?\nCan you move? You're blocking the entrance.","text":"Cô đứng lên được chứ? Vậy thì né ra đi. Cô chặn cửa ra vào rồi.\n움직일 수 있겠어요?\n그럼 좀 비켜줄래요 출입문 앞이라...\nCan you get up?\nCan you move? You're blocking the entrance.","sourceUid":"merged-mrlz5ghs-129","sourceNo":272},{"id":103,"readerNo":104,"displayNo":387,"n":387,"type":"narration","vi":"[Nhạc chủ đề bắt đầu]","ko":"[테마 음악 시작]","en":"[Theme music starts]","text":"[Nhạc chủ đề bắt đầu]\n[테마 음악 시작]\n[Theme music starts]","sourceUid":"ko-mrli6nmt-1122","sourceNo":387},{"id":104,"readerNo":105,"displayNo":277,"n":277,"type":"narration","vi":"Sao nào? Cháu ưng không? Có ạ. Jin Myung à! Người thuê phòng này đây. Nhưng cô ấy muốn ở một mình.","ko":"우와! 어때? 마음에 들어요? 네 진명 학생... 이 방 쓸 사람 근데 방 혼자 쓰겠대","en":"So? Do you like it?\nYes.\nJin-Myung!\nShe's going to take this room.\nBut she wants to take the room alone.","text":"Sao nào? Cháu ưng không? Có ạ. Jin Myung à! Người thuê phòng này đây. Nhưng cô ấy muốn ở một mình.\n우와! 어때? 마음에 들어요? 네 진명 학생... 이 방 쓸 사람 근데 방 혼자 쓰겠대\nSo? Do you like it?\nYes.\nJin-Myung!\nShe's going to take this room.\nBut she wants to take the room alone.","sourceUid":"merged-mrlz7p1r-130","sourceNo":277},{"id":105,"readerNo":106,"displayNo":400,"n":400,"type":"narration","vi":"Bà nói giá phòng và các khoản thu chưa?\nRồi.\nChắc nhà bạn giàu lắm.\nKhông hề.\nBạn là sinh viên à?\nỪ.","ko":"방세랑 공과금이랑 얘기하셨어요?\n어\n집이 부잔가 봐요\n아니요...\n학생이에요?\n네...","en":"Did you tell her about the rent and utility?\nI did.\nYou must come from money.\nNot really.\nAre you a student?\nYes.","text":"Bà nói giá phòng và các khoản thu chưa?\nRồi.\nChắc nhà bạn giàu lắm.\nKhông hề.\nBạn là sinh viên à?\nỪ.\n방세랑 공과금이랑 얘기하셨어요?\n어\n집이 부잔가 봐요\n아니요...\n학생이에요?\n네...\nDid you tell her about the rent and utility?\nI did.\nYou must come from money.\nNot really.\nAre you a student?\nYes.","sourceUid":"merged-mrlzbqs2-131","sourceNo":400},{"id":106,"readerNo":107,"displayNo":405,"n":405,"type":"narration","vi":"Em đang nghĩ gì vậy?\nKhởi đầu của lời nói dối.\nAnh ăn xong chưa? Đi thôi.\nĂn xong rồi thì phải vận động.\nĐược.","ko":"무슨 생각해?\n거짓말의 시작...\n다 먹었어요? 가요\n먹었으니까 운동해야지\n오케이","en":"What are you thinking?\nThe beginning of the lie.\nAre you done? Let's go.\nWe need to burn the calories.\nOkay.","text":"Em đang nghĩ gì vậy?\nKhởi đầu của lời nói dối.\nAnh ăn xong chưa? Đi thôi.\nĂn xong rồi thì phải vận động.\nĐược.\n무슨 생각해?\n거짓말의 시작...\n다 먹었어요? 가요\n먹었으니까 운동해야지\n오케이\nWhat are you thinking?\nThe beginning of the lie.\nAre you done? Let's go.\nWe need to burn the calories.\nOkay.","sourceUid":"merged-mrlzd0xv-132","sourceNo":405},{"id":107,"readerNo":108,"displayNo":407,"n":407,"type":"narration","vi":"(Park Jaewan) Ôi!\n[gõ cửa]","ko":"(박재완) 어!\n[문을 두드리다]","en":"(Jaewan Park) Oh!\n[knock on the door]","text":"(Park Jaewan) Ôi!\n[gõ cửa]\n(박재완) 어!\n[문을 두드리다]\n(Jaewan Park) Oh!\n[knock on the door]","sourceUid":"merged-mrlzej12-133","sourceNo":407},{"id":108,"readerNo":109,"displayNo":411,"n":411,"type":"narration","vi":"Cảm ơn chú. Xe này có qua phường Yeonnam không ạ?\nVâng, có đấy.\nVậy có đi qua Trung tâm Dịch vụ Cộng đồng Yeonnam không ạ?\nCó. Cậu lên xe đi.","ko":"감사합니다. 저 혹시 연남동 가요?\n(버스 기사) 예, 갑니다\n저 그러면, 연남동 주민센터는요?\n(버스 기사) 예, 타세요","en":"Thank you. Does this bus go to Yeonam?\nYes, it does.\nWhat about Yeonam community service center?\nYes, get in.","text":"Cảm ơn chú. Xe này có qua phường Yeonnam không ạ?\nVâng, có đấy.\nVậy có đi qua Trung tâm Dịch vụ Cộng đồng Yeonnam không ạ?\nCó. Cậu lên xe đi.\n감사합니다. 저 혹시 연남동 가요?\n(버스 기사) 예, 갑니다\n저 그러면, 연남동 주민센터는요?\n(버스 기사) 예, 타세요\nThank you. Does this bus go to Yeonam?\nYes, it does.\nWhat about Yeonam community service center?\nYes, get in.","sourceUid":"merged-mrlzg535-135","sourceNo":411},{"id":109,"readerNo":110,"displayNo":413,"n":413,"type":"narration","vi":"Em chậm chạp ghê. Được bao nhiêu điểm môn chạy 100m vậy?","ko":"보기보다 느리네\nｍ 몇 초에 뛰었어요?","en":"You're quite slow. What's your 100-meter record?","text":"Em chậm chạp ghê. Được bao nhiêu điểm môn chạy 100m vậy?\n보기보다 느리네\nｍ 몇 초에 뛰었어요?\nYou're quite slow. What's your 100-meter record?","sourceUid":"merged-mrlzhfga-136","sourceNo":413},{"id":110,"readerNo":111,"displayNo":419,"n":419,"type":"narration","vi":"[tiếng bíp của thẻ xe buýt]\n[Tiếng gõ cửa]\n[Nhạc chủ đề kết thúc]\n[đánh hơi]\n[ngạc nhiên]\n[Tiếng cửa kêu cót két]","ko":"[버스 카드 삑 소리]\n[노크 소리]\n[테마 음악 끝]\n[냄새 맡다]\n[놀란다]\n[삑삑삑 문 소리]","en":"[bus card beeping] [Knocking sound] [Theme music ends] [sniff] [surprised] [Sound of door squeaking]","text":"[tiếng bíp của thẻ xe buýt]\n[Tiếng gõ cửa]\n[Nhạc chủ đề kết thúc]\n[đánh hơi]\n[ngạc nhiên]\n[Tiếng cửa kêu cót két]\n[버스 카드 삑 소리]\n[노크 소리]\n[테마 음악 끝]\n[냄새 맡다]\n[놀란다]\n[삑삑삑 문 소리]\n[bus card beeping] [Knocking sound] [Theme music ends] [sniff] [surprised] [Sound of door squeaking]","sourceUid":"merged-mrlzi7r4-137","sourceNo":419},{"id":111,"readerNo":112,"displayNo":430,"n":430,"type":"narration","vi":"Tiền bối Yoon! Không gọi là tiền bối được nữa sao? - Chuyện gì? - Chị làm thêm ở phường Sangam à? Ừ. Đúng là chị. Ban nãy em đến ăn nhưng không chắc lắm.\n- Chị không thấy em à? - Có thấy.\nSao lại vờ không quen?\nChị không được làm vậy với khách.","ko":"윤 선배! 아, 이제 선배라고 부르면 안 되나? 뭔데? 알바 한다는 데가 상암동이야? 어 어, 맞구나 아까 밥 먹으러 갔다가 긴가민가했는데...\n나 못 봤어?\n봤어\n근데 왜 아는 척 안 했어?\n손님을 아는 척하면 안 되거든","en":"Senior Jin-Myung! Should I not call you that any more? -What is it? -Do you work in Sangam? Yes. It was you. I wasn't sure at the restaurant. -Didn't you see me? -I did. Why didn't you say anything? I'm not supposed to do that to a customer.","text":"Tiền bối Yoon! Không gọi là tiền bối được nữa sao? - Chuyện gì? - Chị làm thêm ở phường Sangam à? Ừ. Đúng là chị. Ban nãy em đến ăn nhưng không chắc lắm.\n- Chị không thấy em à? - Có thấy.\nSao lại vờ không quen?\nChị không được làm vậy với khách.\n윤 선배! 아, 이제 선배라고 부르면 안 되나? 뭔데? 알바 한다는 데가 상암동이야? 어 어, 맞구나 아까 밥 먹으러 갔다가 긴가민가했는데...\n나 못 봤어?\n봤어\n근데 왜 아는 척 안 했어?\n손님을 아는 척하면 안 되거든\nSenior Jin-Myung! Should I not call you that any more? -What is it? -Do you work in Sangam? Yes. It was you. I wasn't sure at the restaurant. -Didn't you see me? -I did. Why didn't you say anything? I'm not supposed to do that to a customer.","sourceUid":"merged-mrlzmxcp-139","sourceNo":430},{"id":112,"readerNo":113,"displayNo":438,"n":438,"type":"narration","vi":"Ra vậy.\nChị không mệt à?\nNhìn chị uể oải lắm.\nChị mệt lắm chứ.\nCó cách để sống nhàn hạ mà.\nChị kiếm bồ đi.\nEm giới thiệu cho chị nhé?\nThôi khỏi.","ko":"아...\n안 힘들어?\n되게 힘들어 보이던데\n되게 힘들어\n쉽게 사는 방법도 있어\n애인 하나 만들어\n소개해 줄까?\n됐어!","en":"Right.\nAren't you tired?\nYou looked tired.\nI am.\nThere's an easy way too, you know.\nGet a boyfriend.\nWould you like me to get you one?\nI'm fine.","text":"Ra vậy.\nChị không mệt à?\nNhìn chị uể oải lắm.\nChị mệt lắm chứ.\nCó cách để sống nhàn hạ mà.\nChị kiếm bồ đi.\nEm giới thiệu cho chị nhé?\nThôi khỏi.\n아...\n안 힘들어?\n되게 힘들어 보이던데\n되게 힘들어\n쉽게 사는 방법도 있어\n애인 하나 만들어\n소개해 줄까?\n됐어!\nRight.\nAren't you tired?\nYou looked tired.\nI am.\nThere's an easy way too, you know.\nGet a boyfriend.\nWould you like me to get you one?\nI'm fine.","sourceUid":"merged-mrm0f0n5-141","sourceNo":438},{"id":113,"readerNo":114,"displayNo":440,"n":440,"type":"narration","vi":"[Chuông cửa hàng reo] [Nhạc Jazz bắt đầu]","ko":"[가게 문 종 울린다] [재즈 음악 시작]","en":"[Store door bell rings] [Jazz music starts]","text":"[Chuông cửa hàng reo] [Nhạc Jazz bắt đầu]\n[가게 문 종 울린다] [재즈 음악 시작]\n[Store door bell rings] [Jazz music starts]","sourceUid":"ko-mrli6nmt-1175","sourceNo":440},{"id":114,"readerNo":115,"displayNo":444,"n":444,"type":"narration","vi":"Cũng đúng. Mặt mũi với người ngợm thế kia thì khó mà kiếm được bồ.\nKhi hỏi đường, người ta thường gọi \"Này em sinh viên!\"\nHọ coi những người tầm tuổi tôi là sinh viên.\nNhưng nếu nói mình không phải sinh viên,\nmọi thứ sẽ trở nên phức tạp.","ko":"하긴 그 얼굴에 그 몸매로...\n길 물어볼 때도 '학생!' 그러잖아요\n내 나이 또래는 다 학생이라고 생각하는 거죠\n근데 이게... 학생 아니라고 하면\n그때부터 좀 복잡해져요","en":"It wouldn't be that easy with that face and body. They call you a student when they ask for directions. They just assume that people my age are students.\nBut when you say you're not a student,\nthat's when it gets complicated.","text":"Cũng đúng. Mặt mũi với người ngợm thế kia thì khó mà kiếm được bồ.\nKhi hỏi đường, người ta thường gọi \"Này em sinh viên!\"\nHọ coi những người tầm tuổi tôi là sinh viên.\nNhưng nếu nói mình không phải sinh viên,\nmọi thứ sẽ trở nên phức tạp.\n하긴 그 얼굴에 그 몸매로...\n길 물어볼 때도 '학생!' 그러잖아요\n내 나이 또래는 다 학생이라고 생각하는 거죠\n근데 이게... 학생 아니라고 하면\n그때부터 좀 복잡해져요\nIt wouldn't be that easy with that face and body. They call you a student when they ask for directions. They just assume that people my age are students.\nBut when you say you're not a student,\nthat's when it gets complicated.","sourceUid":"merged-mrm0hsb6-143","sourceNo":444},{"id":115,"readerNo":116,"displayNo":319,"n":319,"type":"narration","vi":"\"Cô làm nghề gì? Tại sao không đi học?\"\nTôi thấy phiền nên mới nhận mình là sinh viên.\nTôi không chủ định nói dối.\nĐơn giản đúng không?","ko":"뭐 하냐? 왜 학교 안 갔냐?\n그래서 그냥 학생이라고 하는 거예요. 귀찮아서...\n내가 거짓말 하려고 한 게 아니라\n간단하죠?","en":"\"What do you do? Why didn't you go to school?\"\nI say I'm a student to save all that trouble.\nI didn't try to lie.\nIsn't it simple?","text":"\"Cô làm nghề gì? Tại sao không đi học?\"\nTôi thấy phiền nên mới nhận mình là sinh viên.\nTôi không chủ định nói dối.\nĐơn giản đúng không?\n뭐 하냐? 왜 학교 안 갔냐?\n그래서 그냥 학생이라고 하는 거예요. 귀찮아서...\n내가 거짓말 하려고 한 게 아니라\n간단하죠?\n\"What do you do? Why didn't you go to school?\"\nI say I'm a student to save all that trouble.\nI didn't try to lie.\nIsn't it simple?","sourceUid":"merged-mrm0rhgd-146","sourceNo":319},{"id":116,"readerNo":117,"displayNo":324,"n":324,"type":"narration","vi":"Cô đợi tôi để nói điều này à?\nTôi không đợi chú. Tôi chỉ nói vậy thôi.\nVới tôi thì quý cô đây giống như…\nQuý cô gì chứ? Nghe già quá đi.\nVậy thì tôi nên gọi thế nào đây?\nVới tôi thì đằng ấy giống như…","ko":"그 얘기 하려고 기다린 건가?\n기다린 것까진 아니고요\n그냥 그렇다고요\n내가 보기엔, 아가씨가...\n아가씨가 뭐야? 늙은이처럼...\n그럼 뭐라고 그러는데...?\n내가 보기엔 그쪽이...","en":"Did you wait to tell me that?\nI didn't wait. I'm just saying.\nTo me, miss, it seems like--\nWhy call someone miss? It makes you look old.\nThen what should I call you?\nTo me, ma'am, it seems like--","text":"Cô đợi tôi để nói điều này à?\nTôi không đợi chú. Tôi chỉ nói vậy thôi.\nVới tôi thì quý cô đây giống như…\nQuý cô gì chứ? Nghe già quá đi.\nVậy thì tôi nên gọi thế nào đây?\nVới tôi thì đằng ấy giống như…\n그 얘기 하려고 기다린 건가?\n기다린 것까진 아니고요\n그냥 그렇다고요\n내가 보기엔, 아가씨가...\n아가씨가 뭐야? 늙은이처럼...\n그럼 뭐라고 그러는데...?\n내가 보기엔 그쪽이...\nDid you wait to tell me that?\nI didn't wait. I'm just saying.\nTo me, miss, it seems like--\nWhy call someone miss? It makes you look old.\nThen what should I call you?\nTo me, ma'am, it seems like--","sourceUid":"merged-mrm0ul38-150","sourceNo":324},{"id":117,"readerNo":118,"displayNo":463,"n":463,"type":"narration","vi":"Nghe còn gớm hơn. Thôi cứ gọi quý cô đi.\nTôi thấy cô có vẻ…\nrất quan tâm đến cô bạn đó.\n- Ai cơ? - Cô gái vất vả ấy.\nCô gái làm ba công việc.\nTiền bối Yoon á?\nTôi ư?\n- Tại sao chứ? - Tôi không rõ.","ko":"그쪽은 또 뭐야 그냥 아가씨라고 해요\n내가 보기엔, 아가씨가...\n그 학생을 되게 신경 쓰는 것 같은데...\n누구요?\n그 어렵게 산다는 학생\n아르바이트를 서너 개씩 한다는...\n윤 선배요?\n내가요?","en":"That's even worse. Just call me, miss.\nTo me, miss, it seems like...\nyou care about that girl a lot.\n-Who? -The one with the hard life.\nThe one with three jobs?\nJin-Myung?\nI care about her?","text":"Nghe còn gớm hơn. Thôi cứ gọi quý cô đi.\nTôi thấy cô có vẻ…\nrất quan tâm đến cô bạn đó.\n- Ai cơ? - Cô gái vất vả ấy.\nCô gái làm ba công việc.\nTiền bối Yoon á?\nTôi ư?\n- Tại sao chứ? - Tôi không rõ.\n그쪽은 또 뭐야 그냥 아가씨라고 해요\n내가 보기엔, 아가씨가...\n그 학생을 되게 신경 쓰는 것 같은데...\n누구요?\n그 어렵게 산다는 학생\n아르바이트를 서너 개씩 한다는...\n윤 선배요?\n내가요?\nThat's even worse. Just call me, miss.\nTo me, miss, it seems like...\nyou care about that girl a lot.\n-Who? -The one with the hard life.\nThe one with three jobs?\nJin-Myung?\nI care about her?","sourceUid":"merged-mrm0yrys-151","sourceNo":463},{"id":118,"readerNo":119,"displayNo":469,"n":469,"type":"narration","vi":"Không có chuyện đó đâu.\nMắc gì phải vậy?\nSao tôi phải để ý đến chị ấy?\nTôi ngồi được chứ?","ko":"왜요?\n글쎄...\n에이, 아니에요\n내가 왜?\n신경 쓸 일이 뭐가 있어...\n(강이나) 앉아도 돼요?","en":"-Why would I? -I don't know.\nThat's not true at all.\nWhy would I?\nWhy would I care about her?\nCan I sit?","text":"Không có chuyện đó đâu.\nMắc gì phải vậy?\nSao tôi phải để ý đến chị ấy?\nTôi ngồi được chứ?\n왜요?\n글쎄...\n에이, 아니에요\n내가 왜?\n신경 쓸 일이 뭐가 있어...\n(강이나) 앉아도 돼요?\n-Why would I? -I don't know.\nThat's not true at all.\nWhy would I?\nWhy would I care about her?\nCan I sit?","sourceUid":"merged-mrm10mej-152","sourceNo":469},{"id":119,"readerNo":120,"displayNo":472,"n":472,"type":"narration","vi":"[Nhạc Jazz kết thúc]\n[Thở dài]\n[Âm thanh của đồng xu] [Âm thanh đóng ngăn kéo máy tính tiền]","ko":"[재즈 음악 끝]\n[한숨 쉰다]\n[동전 소리] [계산대 서랍 닫는 소리]","en":"[Jazz music ends]\n[Sighs]\n[Sound of coins] [Sound of cash register drawer closing]","text":"[Nhạc Jazz kết thúc]\n[Thở dài]\n[Âm thanh của đồng xu] [Âm thanh đóng ngăn kéo máy tính tiền]\n[재즈 음악 끝]\n[한숨 쉰다]\n[동전 소리] [계산대 서랍 닫는 소리]\n[Jazz music ends]\n[Sighs]\n[Sound of coins] [Sound of cash register drawer closing]","sourceUid":"merged-mrm12lg , 키 안 큰다\nI checked your assignments that you've uploaded, and I will give you feedback. Don't be picky. You'll stop growing.","sourceUid":"merged-mrm1j38x-157","sourceNo":351},{"id":125,"readerNo":126,"displayNo":489,"n":489,"type":"narration","vi":"","ko":"[배경 음악 끝]","en":"","text":"[배경 음악 끝]","sourceUid":"ko-mrli6nmt-1224","sourceNo":489},{"id":126,"readerNo":127,"displayNo":356,"n":356,"type":"narration","vi":"Vâng.\nEm có bạn trai chưa?\n- Chưa ạ. - Tại sao?\nChưa có bộ ngực nào ưng ý sao?\nEm thích ngực kiểu gì?\nCuối tuần em định làm gì? Chúng ta cùng đi ăn salad ức gà nhé?\nĐược không?","ko":"예\n남자친구 있냐?\n아니요\n왜?\n마음에 드는 가슴이 없어?\n어떤 가슴 좋아해?\n아, 너 주말에 뭐 하냐?\n우리 닭가슴살 샐러드 먹으러 가자, 응?","en":"Do you have a boyfriend?\n-No. -Why not?\nDidn't you see any breasts you like?\nWhat sort of breasts do you like?\nWhat are you doing this weekend? Let's go have chicken breast salad.\nOkay?","text":"Vâng.\nEm có bạn trai chưa?\n- Chưa ạ. - Tại sao?\nChưa có bộ ngực nào ưng ý sao?\nEm thích ngực kiểu gì?\nCuối tuần em định làm gì? Chúng ta cùng đi ăn salad ức gà nhé?\nĐược không?\n예\n남자친구 있냐?\n아니요\n왜?\n마음에 드는 가슴이 없어?\n어떤 가슴 좋아해?\n아, 너 주말에 뭐 하냐?\n우리 닭가슴살 샐러드 먹으러 가자, 응?\nDo you have a boyfriend?\n-No. -Why not?\nDidn't you see any breasts you like?\nWhat sort of breasts do you like?\nWhat are you doing this weekend? Let's go have chicken breast salad.\nOkay?","sourceUid":"merged-mrm1kg48-159","sourceNo":356},{"id":127,"readerNo":128,"displayNo":506,"n":506,"type":"narration","vi":"Em phải đi chào người quen.\nChào tiền bối.\nEm ngồi cùng chị nhé?\nEm chỉ ăn thôi.\nSao thế? Em gặp chuyện gì à?\nAnh ta là tiền bối khoa em, nhưng dạo này cứ quấy rầy em mãi.","ko":"응?\n저는 아는 선배가 있어서...\n선배님!\n저 여기 앉아도 돼요?\n조용히 밥만 먹을게요\n왜? 무슨 일 있어?\n우리 과 선밴데...\n요새 자꾸 날 괴롭혀요","en":"I need to say hello to someone.\nHi.\nCan I sit with you?\nI'll just eat.\nWhy? Did something happen?\nHe's a senior in my class, he's been bothering me lately.","text":"Em phải đi chào người quen.\nChào tiền bối.\nEm ngồi cùng chị nhé?\nEm chỉ ăn thôi.\nSao thế? Em gặp chuyện gì à?\nAnh ta là tiền bối khoa em, nhưng dạo này cứ quấy rầy em mãi.\n응?\n저는 아는 선배가 있어서...\n선배님!\n저 여기 앉아도 돼요?\n조용히 밥만 먹을게요\n왜? 무슨 일 있어?\n우리 과 선밴데...\n요새 자꾸 날 괴롭혀요\nI need to say hello to someone.\nHi.\nCan I sit with you?\nI'll just eat.\nWhy? Did something happen?\nHe's a senior in my class, he's been bothering me lately.","sourceUid":"merged-mrm4s9o8-161","sourceNo":506},{"id":128,"readerNo":129,"displayNo":508,"n":508,"type":"narration","vi":"Anh ta liên tục liếc nhìn và cười với em trong giờ học,\nvà nói những điều dâm đãng.","ko":"수업 중에 실실 웃으면서 자꾸 노려보고\n자꾸 야한 얘기하고...","en":"He stares at me and smiles in class,\nand talks about dirty stuff.","text":"Anh ta liên tục liếc nhìn và cười với em trong giờ học,\nvà nói những điều dâm đãng.\n수업 중에 실실 웃으면서 자꾸 노려보고\n자꾸 야한 얘기하고...\nHe stares at me and smiles in class,\nand talks about dirty stuff.","sourceUid":"merged-mrm4ufch-162","sourceNo":508},{"id":129,"readerNo":130,"displayNo":369,"n":369,"type":"narration","vi":"Tiền bối.\nỞ trường đại học, người ta có bắt nạt nhau không?\nChị không chắc.\nEm nên làm gì?\nThật ra, em từng bị cô lập hồi cấp ba.","ko":"선배님\n대학교에도 왕따 있어요?\n글쎄...\n어떡하죠?\n나 사실은\n고등학교 때 살짝 왕따여서...","en":"Jin-Myung. Do they bully you in college? I'm not sure. What should I do? I was bullied in high school.","text":"Tiền bối.\nỞ trường đại học, người ta có bắt nạt nhau không?\nChị không chắc.\nEm nên làm gì?\nThật ra, em từng bị cô lập hồi cấp ba.\n선배님\n대학교에도 왕따 있어요?\n글쎄...\n어떡하죠?\n나 사실은\n고등학교 때 살짝 왕따여서...\nJin-Myung. Do they bully you in college? I'm not sure. What should I do? I was bullied in high school.","sourceUid":"merged-mrm4wbci-164","sourceNo":369},{"id":130,"readerNo":131,"displayNo":520,"n":520,"type":"narration","vi":"Không hẳn là bị cô lập, nhưng em không có nhiều bạn.\nEm muốn kết bạn ở trường đại học\nvà cùng họ đi chơi.\nEm xin lỗi. Chị đọc đi ạ.","ko":"아니, 왕따라기보다는\n친구가 좀 없어서\n대학교 오면 어떡해서든\n친구도 만들고\n놀러도 다니고...\n죄송해요. 책 보세요","en":"Not exactly bullied, but I didn't have many friends.\nI wanted to make new friends in college,\nand hang out with them.\nI'm sorry. You can read now.","text":"Không hẳn là bị cô lập, nhưng em không có nhiều bạn.\nEm muốn kết bạn ở trường đại học\nvà cùng họ đi chơi.\nEm xin lỗi. Chị đọc đi ạ.\n아니, 왕따라기보다는\n친구가 좀 없어서\n대학교 오면 어떡해서든\n친구도 만들고\n놀러도 다니고...\n죄송해요. 책 보세요\nNot exactly bullied, but I didn't have many friends.\nI wanted to make new friends in college,\nand hang out with them.\nI'm sorry. You can read now.","sourceUid":"merged-mrm4yula-166","sourceNo":520},{"id":131,"readerNo":132,"displayNo":376,"n":376,"type":"narration","vi":"ĐÃ CHUYỂN 109.900 WON TIỀN THẺ GIAO THÔNG","ko":"교통카드값 109,900원이 이체되었습니다","en":"TRANSPORTATION BILL 109,900 PAID","text":"ĐÃ CHUYỂN 109.900 WON TIỀN THẺ GIAO THÔNG\n교통카드값 109,900원이 이체되었습니다\nTRANSPORTATION BILL 109,900 PAID","sourceUid":"merged-mrm52e34-168","sourceNo":376},{"id":132,"readerNo":133,"displayNo":524,"n":524,"type":"narration","vi":"Em lo lắng chuyện đó à?\nHay mà. Rất đúng độ tuổi 20.","ko":"그게 네 고민이야? 예... 좋잖아 스무 살 같고...","en":"That's your problem?\nThat's nice. You sound like a freshman.","text":"Em lo lắng chuyện đó à?\nHay mà. Rất đúng độ tuổi 20.\n그게 네 고민이야? 예... 좋잖아 스무 살 같고...\nThat's your problem?\nThat's nice. You sound like a freshman.","sourceUid":"merged-mrm526wf-167","sourceNo":524},{"id":133,"readerNo":134,"displayNo":528,"n":528,"type":"narration","vi":"Chị ước mình có những lo lắng như vậy.\nThay vì đau đầu về lương làm thêm, tiền thuê nhà, các loại hóa đơn…","ko":"나도 그런 고민 해봤으면 좋겠다 시급, 방세, 공과금, 그런 거 말고...","en":"I wish I had problems like that. Instead of worrying about rent and utility bills.","text":"Chị ước mình có những lo lắng như vậy.\nThay vì đau đầu về lương làm thêm, tiền thuê nhà, các loại hóa đơn…\n나도 그런 고민 해봤으면 좋겠다 시급, 방세, 공과금, 그런 거 말고...\nI wish I had problems like that. Instead of worrying about rent and utility bills.","sourceUid":"merged-mrm53xl2-169","sourceNo":528},{"id":134,"readerNo":135," 쁘게 나왔다, 그쵸?","en":"It turned out so nice, didn't it?","text":"Thành quả đẹp quá. Đúng không?\n(미용사) 음... 파마 차암 이쁘게 나왔다, 그쵸?\nIt turned out so nice, didn't it?","sourceUid":"merged-mrm5w92q-173","sourceNo":542},{"id":140,"readerNo":141,"displayNo":543,"n":543,"type":"narration","vi":"[âm nhạc sôi nổi bắt đầu]","ko":"[펑키 음악 시작]","en":"[funky music starts]","text":"[âm nhạc sôi nổi bắt đầu]\n[펑키 음악 시작]\n[funky music starts]","sourceUid":"ko-mrli6nmu-1278","sourceNo":543},{"id":141,"readerNo":142,"displayNo":551,"n":551,"type":"narration","vi":"Vâng… cũng đẹp.\n- Ôi trời. - Làm sao đây?\nĐừng cởi giày vội. Em làm tóc ở đâu?\nĐây là lần đầu tiên trong đời em ấy làm xoăn.\nNếu chị không phục hồi nguyên trạng,\n.000 sinh viên sẽ tẩy chay cửa hàng này.","ko":"예... 그러게요\n아, 뭐야?\n(송지원) 아이고...\n어떡해...\n야 신발 벗지 마 어느 미용실이야?\n태어나서 처음으로 한 파마랍니다\n당장 원상복구 시켜주지 않으면\n만이천 학생의 이름으로 불매운동하겠습니다","en":"-Gosh. -My goodness!\nDon't bother taking your shoes off. Where is this salon?\nShe permed her hair for the first time.\nIf you don't fix it,\n,000 students are going to boycott this place.","text":"Vâng… cũng đẹp.\n- Ôi trời. - Làm sao đây?\nĐừng cởi giày vội. Em làm tóc ở đâu?\nĐây là lần đầu tiên trong đời em ấy làm xoăn.\nNếu chị không phục hồi nguyên trạng,\n.000 sinh viên sẽ tẩy chay cửa hàng này.\n예... 그러게요\n아, 뭐야?\n(송지원) 아이고...\n어떡해...\n야 신발 벗지 마 어느 미용실이야?\n태어나서 처음으로 한 파마랍니다\n당장 원상복구 시켜주지 않으면\n만이천 학생의 이름으로 불매운동하겠습니다\n-Gosh. -My goodness!\nDon't bother taking your shoes off. Where is this salon?\nShe permed her hair for the first time.\nIf you don't fix it,\n,000 students are going to boycott this place.","sourceUid":"merged-mrm629ec-175","sourceNo":551},{"id":142,"readerNo":143,"displayNo":554,"n":554,"type":"narration","vi":"Sinh viên chúng tôi không bỏ qua dễ dàng như em này đâu.\nMời chị sửa lại.","ko":"이런 학생 기만행위를 가만히 두고 볼 만큼\n무력한 사람 아닙니다\n시정하십시오","en":"The students are not going to let this go.\nFix it.","text":"Sinh viên chúng tôi không bỏ qua dễ dàng như em này đâu.\nMời chị sửa lại.\n이런 학생 기만행위를 가만히 두고 볼 만큼\n무력한 사람 아닙니다\n시정하십시오\nThe students are not going to let this go.\nFix it.","sourceUid":"merged-mrm64zt0-176","sourceNo":554},{"id":143,"readerNo":144,"displayNo":556,"n":556,"type":"narration","vi":"[Nhạc sôi động kết thúc]\n[nhạc pop bắt đầu]","ko":"[펑키 음악 끝] [팝 음악 시작]","en":"[Funky music ends]\n[pop music starts]","text":"[Nhạc sôi động kết thúc]\n[nhạc pop bắt đầu]\n[펑키 음악 끝] [팝 음악 시작]\n[Funky music ends]\n[pop music starts]","sourceUid":"merged-mrm65nv9-177","sourceNo":556},{"id":144,"readerNo":145,"displayNo":560,"n":560,"type":"narration","vi":"Lén bán áo lỗi cho khách hàng là hành vi lừa đảo. Cô dán mác áo lên lỗ thủng. Cô nhạo báng thẳng mặt những người tiêu dùng thiện lương.\nĐây là hành vi không thể chấp nhận.","ko":"하자가 있는 옷을 손님이 모른다고 판 행위는\n일종의 사기행위입니다\n거기다 이 구멍 난 곳에 택을 붙여논 것은\n노골적으로 선량한 소비자를 우롱하는 태도가 아니고서는\n도저히 납득할 수가 없습니다","en":"Selling a damaged product is fraud. You put the tag on the hole, you practically mocked your customer, and it is unacceptable.","text":"Lén bán áo lỗi cho khách hàng là hành vi lừa đảo. Cô dán mác áo lên lỗ thủng. Cô nhạo báng thẳng mặt những người tiêu dùng thiện lương.\nĐây là hành vi không thể chấp nhận.\n하자가 있는 옷을 손님이 모른다고 판 행위는\n일종의 사기행위입니다\n거기다 이 구멍 난 곳에 택을 붙여논 것은\n노골적으로 선량한 소비자를 우롱하는 태도가 아니고서는\n도저히 납득할 수가 없습니다\nSelling a damaged product is fraud. You put the tag on the hole, you practically mocked your customer, and it is unacceptable.","sourceUid":"merged-mrm6a1wz-181","sourceNo":560},{"id":145,"readerNo":146,"displayNo":562,"n":562,"type":"narration","vi":"Tôi sẽ tố giác cô nếu cô không hoàn tiền.","ko":"환불해 주지 않으면 고발하겠습니다","en":"I will report this if you don't give her a full refund.","text":"Tôi sẽ tố giác cô nếu cô không hoàn tiền.\n환불해 주지 않으면 고발하겠습니다\nI will report this if you don't give her a full refund.","sourceUid":"merged-mrm6alkd-183","sourceNo":562},{"id":146,"readerNo":147,"displayNo":563,"n":563,"type":"narration","vi":"[nháy mắt]","ko":"[윙크]","en":"[wink]","text":"[nháy mắt]\n[윙크]\n[wink]","sourceUid":"ko-mrli6nmu-1298","sourceNo":563},{"id":147,"readerNo":148,"displayNo":566,"n":566,"type":"narration","vi":"Chúng tôi đến để ăn mì chứ không phải ăn thứ này.\nVới một quán danh tiếng thế này thì quá mất vệ sinh rồi!\nTôi xin lỗi. Tôi sẽ mang món mới lên.","ko":"우리는 면을 먹으러 온 거지 이걸 먹으러 온 게 아닙니다\n명성과 다르게 무슨 비위생입니까\n죄송합니다. 다시 올려드리겠습니다","en":"We're here to eat noodles, not this.\nThis isn't anything like your reputation!\nI'm sorry. I'll get you a new dish.","text":"Chúng tôi đến để ăn mì chứ không phải ăn thứ này.\nVới một quán danh tiếng thế này thì quá mất vệ sinh rồi!\nTôi xin lỗi. Tôi sẽ mang món mới lên.\n우리는 면을 먹으러 온 거지 이걸 먹으러 온 게 아닙니다\n명성과 다르게 무슨 비위생입니까\n죄송합니다. 다시 올려드리겠습니다\nWe're here to eat noodles, not this.\nThis isn't anything like your reputation!\nI'm sorry. I'll get you a new dish.","sourceUid":"merged-mrm6bc5s-184","sourceNo":566},{"id":148,"readerNo":149,"displayNo":571,"n":571,"type":"narration","vi":"Cái gì đây?\nCảm ơn lời phê bình của quý khách.\nChúng tôi xin gửi tặng quý khách.\nVậy chúng tôi xin nhận.\nNào,\nem có thể ăn rồi.","ko":"이건 뭡니까?\n좋은 지적에 감사드립니다\n서비스로 수육 좀 드시라고요\n아~ 그럼 받겠습니다\n자... 먹으렴...","en":"you can eat.\nWhat is this?\nI appreciate your criticism.\nIt's on the house.\nThen, we'll take it.\nNow,","text":"Cái gì đây?\nCảm ơn lời phê bình của quý khách.\nChúng tôi xin gửi tặng quý khách.\nVậy chúng tôi xin nhận.\nNào,\nem có thể ăn rồi.\n이건 뭡니까?\n좋은 지적에 감사드립니다\n서비스로 수육 좀 드시라고요\n아~ 그럼 받겠습니다\n자... 먹으렴...\nyou can eat.\nWhat is this?\nI appreciate your criticism.\nIt's on the house.\nThen, we'll take it.\nNow,","sourceUid":"merged-mrm6e2xl-186","sourceNo":571},{"id":149,"readerNo":150,"displayNo":577,"n":577,"type":"narration","vi":"[nhạc pop kết thúc]\n[chúc mừng] [âm nhạc câu lạc bộ bắt đầu]\n[âm nhạc câu lạc bộ kết thúc]\n[vỗ tay]","ko":"[팝 음악 끝]\n[함성 소리] [클럽 음악 시작]\n[클럽 음악 끝]\n[손뼉을 친다]","en":"[pop music ends]\n[cheers] [club music starts]\n[club music ends]\n[claps hands]","text":"[nhạc pop kết thúc]\n[chúc mừng] [âm nhạc câu lạc bộ bắt đầu]\n[âm nhạc câu lạc bộ kết thúc]\n[vỗ tay]\n[팝 음악 끝]\n[함성 소리] [클럽 음악 시작]\n[클럽 음악 끝]\n[손뼉을 친다]\n[pop music ends]\n[cheers] [club music starts]\n[club music ends]\n[claps hands]","sourceUid":"merged-mrm6gzlh-188","sourceNo":577},{"id":150,"readerNo":151,"displayNo":583,"n":583,"type":"narration","vi":"Tiền bối.\nChị ngầu bá cháy.\nEm thích những thứ này à?\nHãy thả trôi cơ thể em.\nDi chuyển tay chân tự do theo mạch cảm xúc.","ko":"선배...\n멋있어요\n너 이런 거 좋아하냐?\n우아!\n그냥 자신을 놓으면 돼\n팔다리를 움직여\n자유롭게\n감정이 가는 대로","en":"Ji-Won.\nYou're so cool.\nYou like these sort of things?\nJust let go of yourself.\nMove your arms and legs, however you want to.","text":"Tiền bối.\nChị ngầu bá cháy.\nEm thích những thứ này à?\nHãy thả trôi cơ thể em.\nDi chuyển tay chân tự do theo mạch cảm xúc.\n선배...\n멋있어요\n너 이런 거 좋아하냐?\n우아!\n그냥 자신을 놓으면 돼\n팔다리를 움직여\n자유롭게\n감정이 가는 대로\nJi-Won.\nYou're so cool.\nYou like these sort of things?\nJust let go of yourself.\nMove your arms and legs, however you want to.","sourceUid":"merged-mrm6fq0f-187","sourceNo":583},{"id":151,"readerNo":152,"displayNo":586,"n":586,"type":"narration","vi":"[Nhạc hip hop Reggae bắt đầu]","ko":"[레게 힙합 음악 시작]","en":"[Reggae hip hop music starts]","text":"[Nhạc hip hop Reggae bắt đầu]\n[레게 힙합 음악 시작]\n[Reggae hip hop music starts]","sourceUid":"ko-mrli6nmu-1321","sourceNo":586},{"id":152,"readerNo":153,"displayNo":419,"n":419,"type":"narration","vi":"Nhìn chị này. Tiếp nhận năng lượng. Đừng cố tỏ ra ngầu. Dẹp xấu hổ sang một bên. Dù làm gì, mình cũng là số một! Hãy lắc lư cơ thể theo ý thích. Em thử đi.","ko":"잘 봐라\n기운을 받아\n멋있으려고도 하지 말고\n쪽 팔린다고도 생각 말고\n뭘 하든 나는 최고다!\n이런 마음으로 흔들어! 해봐","en":"Watch me.\nTake the energy.\nDon't try to be cool.\nDon't be embarrassed either.\nWhatever you do, you're cool!\nThat's how you shake it.\nTry it.","text":"Nhìn chị này. Tiếp nhận năng lượng. Đừng cố tỏ ra ngầu. Dẹp xấu hổ sang một bên. Dù làm gì, mình cũng là số một! Hãy lắc lư cơ thể theo ý thích. Em thử đi.\n잘 봐라\n기운을 받아\n멋있으려고도 하지 말고\n쪽 팔린다고도 생각 말고\n뭘 하든 나는 최고다!\n이런 마음으로 흔들어! 해봐\nWatch me.\nTake the energy.\nDon't try to be cool.\nDon't be embarrassed either.\nWhatever you do, you're cool!\nThat's how you shake it.\nTry it.","sourceUid":"merged-mrm6j0v9-189","sourceNo":419},{"id":153,"readerNo":154,"displayNo":425,"n":425,"type":"narration","vi":"Uốn éo đại đi. Tự tin lên.\nVới tất cả linh hồn!\nNào, hãy cảm nhận làn sóng.\nCơ thể dẻo dai hơn nữa.\nTrời ơi.\nEm e thẹn quá rồi đấy.","ko":"그냥 움직이라니까 더 확실하게... 영혼을 넣어... 너의 소올... 아... 자, 느껴봐... 이 웨이브를... 몸을 더 유연하게... 아이, 참... 너 참... 자의식 과잉이다 문 닫는 소리","en":"Just move, be more confident. With all your soul! Now feel the wave. Be more flexible. Gosh. You're too self-conscious.","text":"Uốn éo đại đi. Tự tin lên.\nVới tất cả linh hồn!\nNào, hãy cảm nhận làn sóng.\nCơ thể dẻo dai hơn nữa.\nTrời ơi.\nEm e thẹn quá rồi đấy.\n그냥 움직이라니까 더 확실하게... 영혼을 넣어... 너의 소올... 아... 자, 느껴봐... 이 웨이브를... 몸을 더 유연하게... 아이, 참... 너 참... 자의식 과잉이다 문 닫는 소리\nJust move, be more confident. With all your soul! Now feel the wave. Be more flexible. Gosh. You're too self-conscious.","sourceUid":"merged-mrm6m9z2-191","sourceNo":425},{"id":154,"readerNo":155,"displayNo":604,"n":604,"type":"narration","vi":"[Thở dài]\n[thở ra]","ko":"[한숨 쉰다] [숨을 내쉰다]","en":"[Sighs]\n[exhales]","text":"[Thở dài]\n[thở ra]\n[한숨 쉰다] [숨을 내쉰다]\n[Sighs]\n[exhales]","sourceUid":"merged-mrm6mfun-192","sourceNo":604},{"id":155,"readerNo":156,"displayNo":608,"n":608,"type":"narration","vi":"Đi xem mắt á? ĐI. ĐI. ĐI MỊ ĐI CHỨ! CẢM ƠN BẠN HIỀN TRÔNG ANH TA THẾ NÀO? ĐẸP TRAI KHÔNG? BẠN MÌNH ƠI? BẠN ĐÂU RỒI?\nQUAY LẠI ĐÂY. XẤU CŨNG ĐƯỢC…","ko":"(송지원) 소개팅? 해. 해. 해\n죽어도 해\n고마워, 친구야\n어떻게 생겼어?\n잘생겼어?\n친구야?\n어디 있니?\n돌아와\n못생겨도 괜...\n오올...","en":"A blind date? YES, YES, YES. OF COURSE I WOULD! THANK YOU, YOU'RE A TRUE FRIEND. WHAT DOES HE LOOK LIKE? IS HE HOT? HELLO? WHERE DID YOU GO?\nCOME BACK. I WOULDN'T MIND UGLY...","text":"Đi xem mắt á? ĐI. ĐI. ĐI MỊ ĐI CHỨ! CẢM ƠN BẠN HIỀN TRÔNG ANH TA THẾ NÀO? ĐẸP T
