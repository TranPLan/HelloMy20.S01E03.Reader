he say?\nMerci!He liked my jokes.","text":"Đố cậu tại sao đuôi bò bán mau hết hàng? Vì nó ở phần \"đít cow\" đó!\nCậu ấy thích mấy miếng hài của tớ.\n프랑스 사람이 빨래를 했어 빨래를 널었어 그럼 뭐라고 얘기했을까? 마르세유... 유머코드도 잘 맞고\nA French person did laundry and hung it to dry. What did he say?\nMerci!He liked my jokes.","sourceUid":"merged-mrm775jg-204","sourceNo":641},{"id":163,"readerNo":164,"displayNo":642,"n":642,"type":"narration","vi":"[ợ]\n[Nhạc nền sôi động kết thúc]","ko":"[트림하다]\n[경쾌한 배경 음악 끝]","en":"[burp]\n[Upbeat background music ends]","text":"[ợ]\n[Nhạc nền sôi động kết thúc]\n[트림하다]\n[경쾌한 배경 음악 끝]\n[burp]\n[Upbeat background music ends]","sourceUid":"ko-mrli6nmu-1377","sourceNo":642},{"id":164,"readerNo":165,"displayNo":649,"n":649,"type":"narration","vi":"[Nhạc nền sôi động bắt đầu]","ko":"[경쾌한 배경 음악 시작]","en":"[Upbeat background music starts]","text":"[Nhạc nền sôi động bắt đầu]\n[경쾌한 배경 음악 시작]\n[Upbeat background music starts]","sourceUid":"ko-mrli6nmu-1384","sourceNo":649},{"id":165,"readerNo":166,"displayNo":651,"n":651,"type":"narration","vi":"Cậu uống rượu à?\nCậu uống rượu ngay buổi hẹn đầu tiên à?\nTớ không định về nhà đâu nhưng vẫn về đấy.\nRồi sao? Được hẹn lại không?Did you drink?\nTôi đi xe đó. - Xe đó hả?\nXe đến nhanh thật đấy.","ko":"술 먹었어 웁스! 오구오구... 첫날 술까지 잡솼어? 오늘 기냥 아주... 안 들어오려다가 들어온 거야 그래서 애프터는? 아, 저거... 아, 저거요? 빨리 왔네...","en":"You had drinks on the first date?\nI almost didn't come home.\nAnd? Did he ask you out on another date?\n-That one. -That one?\nIt came early.","text":"Cậu uống rượu à?\nCậu uống rượu ngay buổi hẹn đầu tiên à?\nTớ không định về nhà đâu nhưng vẫn về đấy.\nRồi sao? Được hẹn lại không?Did you drink?\nTôi đi xe đó. - Xe đó hả?\nXe đến nhanh thật đấy.\n술 먹었어 웁스! 오구오구... 첫날 술까지 잡솼어? 오늘 기냥 아주... 안 들어오려다가 들어온 거야 그래서 애프터는? 아, 저거... 아, 저거요? 빨리 왔네...\nYou had drinks on the first date?\nI almost didn't come home.\nAnd? Did he ask you out on another date?\n-That one. -That one?\nIt came early.","sourceUid":"merged-mrm7cf5t-208","sourceNo":651},{"id":166,"readerNo":167,"displayNo":660,"n":660,"type":"narration","vi":"Hôm nay vui lắm. Tôi sẽ gọi lại cho cậu.\n- Tạm biệt. - Cậu về cẩn thận nhé.\nNhớ gọi tôi nhé.\nVề cẩn thận nhé. Tạm biệt.\nTạm biệt.\nKhoái ra mặt luôn kìa.","ko":"오늘 너무 재미있었어. 연락할게\n잘 가\n조심히 가구...\n연락... 연락해\n잘 가, 안녕\n조심히 가\n안녕!\n난리 났구먼","en":"I had so much fun today. I'll call you later.\n-Bye. -Get home safely.\nCall me.\nGood night. Bye.\nBye.\nYou're so excited.","text":"Hôm nay vui lắm. Tôi sẽ gọi lại cho cậu.\n- Tạm biệt. - Cậu về cẩn thận nhé.\nNhớ gọi tôi nhé.\nVề cẩn thận nhé. Tạm biệt.\nTạm biệt.\nKhoái ra mặt luôn kìa.\n오늘 너무 재미있었어. 연락할게\n잘 가\n조심히 가구...\n연락... 연락해\n잘 가, 안녕\n조심히 가\n안녕!\n난리 났구먼\nI had so much fun today. I'll call you later.\n-Bye. -Get home safely.\nCall me.\nGood night. Bye.\nBye.\nYou're so excited.","sourceUid":"merged-mrm7fore-209","sourceNo":660},{"id":167,"readerNo":168,"displayNo":662,"n":662,"type":"narration","vi":"♪ Nó tung bay trong gió xuân ♪ ♪ ♪ (Jeong Ye-eun) Cô ấy thật điên rồ... ♪ Chiếc váy màu hồng nhạt ♪","ko":"♪ 봄바람에 ♪ ♪ 휘날리더라 ♪ (정예은) 쟤 미쳤어... ♪ 연분홍 치마가 ♪","en":"♪ It fluttered in the spring breeze ♪ ♪ ♪ (Jeong Ye-eun) She was crazy... ♪ The light pink skirt ♪","text":"♪ Nó tung bay trong gió xuân ♪ ♪ ♪ (Jeong Ye-eun) Cô ấy thật điên rồ... ♪ Chiếc váy màu hồng nhạt ♪\n♪ 봄바람에 ♪ ♪ 휘날리더라 ♪ (정예은) 쟤 미쳤어... ♪ 연분홍 치마가 ♪\n♪ It fluttered in the spring breeze ♪ ♪ ♪ (Jeong Ye-eun) She was crazy... ♪ The light pink skirt ♪","sourceUid":"merged-mrm7k8fe-213","sourceNo":662},{"id":168,"readerNo":169,"displayNo":666,"n":666,"type":"narration","vi":"[Nhạc nền sôi động kết thúc]","ko":"[경쾌한 배경 음악 끝]","en":"[Upbeat background music ends]","text":"[Nhạc nền sôi động kết thúc]\n[경쾌한 배경 음악 끝]\n[Upbeat background music ends]","sourceUid":"ko-mrli6nmu-1401","sourceNo":666},{"id":169,"readerNo":170,"displayNo":668,"n":668,"type":"narration","vi":"[Tiếng đóng cửa]","ko":"[문 닫는 소리]","en":"[Sound of door closing]","text":"[Tiếng đóng cửa]\n[문 닫는 소리]\n[Sound of door closing]","sourceUid":"ko-mrli6nmu-1403","sourceNo":668},{"id":170,"readerNo":171,"displayNo":670,"n":670,"type":"narration","vi":"Cậu sao vậy?ANH ĐANG LÀM GÌ?\nAnh ấy đang làm gì nhỉ?","ko":"우와!\n오빠, 뭐 해?\n진짜 뭐 하느라고...","en":"What's wrong? WHAT ARE YOU UP TO?\nWhat is he really doing?","text":"Cậu sao vậy?ANH ĐANG LÀM GÌ?\nAnh ấy đang làm gì nhỉ?\n우와!\n오빠, 뭐 해?\n진짜 뭐 하느라고...\nWhat's wrong? WHAT ARE YOU UP TO?\nWhat is he really doing?","sourceUid":"merged-mrm8bkfy-215","sourceNo":670},{"id":171,"readerNo":172,"displayNo":672,"n":672,"type":"narration","vi":"[Tiếng mở cửa]\n[Tiếng đóng cửa]","ko":"[문 여는 소리]\n[문 닫는 소리]","en":"[Sound of door opening]\n[Sound of door closing]","text":"[Tiếng mở cửa]\n[Tiếng đóng cửa]\n[문 여는 소리]\n[문 닫는 소리]\n[Sound of door opening]\n[Sound of door closing]","sourceUid":"merged-mrm8don0-217","sourceNo":672},{"id":172,"readerNo":173,"displayNo":679,"n":679,"type":"narration","vi":"Nhỏ bạn giới thiệu người ấy cho tớ nhắn tin đến. Bạn ấy nói gì? CẬU ẤY THẤY CẬU RẤT TỐT VÀ THÚ VỊ… NHƯNG CHỈ MUỐN LÀM BẠN THÔI. Cậu ấy không coi tớ là con gái. Vì sao? Tớ chưa đủ nữ tính à? Hay tớ tiêm thêm estrogen nhỉ?","ko":"왜 그래? 방금 중매쟁이한테 문자 왔어 뭐라고? 재미있고 좋은 사람인 건 알겠는데... 그냥 친구로 지내고 싶단다 내가 여자로 느껴지지 않는대 왜? 나 여성호르몬이 부족한가? 호르몬 주사 맞을까?","en":"I got a text from my friend who set me up with him.\nWhat did it say?\nHe thinks you're a fun and nice person... but just wants to be friends.\nHe doesn't like me as a girl.\nWhy? Am I not girly enough?\nShould I take estrogen or something?","text":"Nhỏ bạn giới thiệu người ấy cho tớ nhắn tin đến. Bạn ấy nói gì? CẬU ẤY THẤY CẬU RẤT TỐT VÀ THÚ VỊ… NHƯNG CHỈ MUỐN LÀM BẠN THÔI. Cậu ấy không coi tớ là con gái. Vì sao? Tớ chưa đủ nữ tính à? Hay tớ tiêm thêm estrogen nhỉ?\n왜 그래? 방금 중매쟁이한테 문자 왔어 뭐라고? 재미있고 좋은 사람인 건 알겠는데... 그냥 친구로 지내고 싶단다 내가 여자로 느껴지지 않는대 왜? 나 여성호르몬이 부족한가? 호르몬 주사 맞을까?\nI got a text from my friend who set me up with him.\nWhat did it say?\nHe thinks you're a fun and nice person... but just wants to be friends.\nHe doesn't like me as a girl.\nWhy? Am I not girly enough?\nShould I take estrogen or something?","sourceUid":"merged-mrm8fkl8-220","sourceNo":679},{"id":173,"readerNo":174,"displayNo":683,"n":683,"type":"narration","vi":"Hay tớ bị rối loạn nhiễm sắc thể?\nBảo sao dạo này lông rậm hơn.\nCậu nhìn đi. Tớ có trái cổ nè.\nCậu đã giả giọng lúc xem mắt đúng không?\nLẽ nào…\ncậu làm cả thế này?\nCậu làm vậy chứ gì.\nNhưng cậu ấy thích mà.","ko":"허... 혹시 나 XXY인 거 아냐? 어쩐지 요새 솜털이 굵어지는 게... 봐 봐 나 목젖 나왔어? 어? 너 소개팅 할 때 성대모사 했지? 혹시... 이것도 했어?\n하셨네요 그렇지만 좋아했단 말이야","en":"Am I a genetic freak?\nI knew my peach fuzz was getting thicker.\nLook, I have an Adam's apple.\nYou did an impersonation, didn't you?\nDid you...\ndo this too?\nYou did.\nBut he liked it.","text":"Hay tớ bị rối loạn nhiễm sắc thể?\nBảo sao dạo này lông rậm hơn.\nCậu nhìn đi. Tớ có trái cổ nè.\nCậu đã giả giọng lúc xem mắt đúng không?\nLẽ nào…\ncậu làm cả thế này?\nCậu làm vậy chứ gì.\nNhưng cậu ấy thích mà.\n허... 혹시 나 XXY인 거 아냐? 어쩐지 요새 솜털이 굵어지는 게... 봐 봐 나 목젖 나왔어? 어? 너 소개팅 할 때 성대모사 했지? 혹시... 이것도 했어?\n하셨네요 그렇지만 좋아했단 말이야\nAm I a genetic freak?\nI knew my peach fuzz was getting thicker.\nLook, I have an Adam's apple.\nYou did an impersonation, didn't you?\nDid you...\ndo this too?\nYou did.\nBut he liked it.","sourceUid":"merged-mrm8g7vl-224","sourceNo":683},{"id":174,"readerNo":175,"displayNo":691,"n":691,"type":"narration","vi":"- Bọn tớ nói chuyện rất hợp rơ. - Trời.\nCậu nói mấy phần và cậu ấy nói mấy phần?\n/50?\n/40?\n/30?\nChính xác là 75/25.\nĐấy là trò chuyện hả? Rõ ràng là giảng đạo.\nVậy tớ phải làm sao? Tớ chỉ cố phá vỡ khoảng lặng thôi.","ko":"얘기도 잘 통하고 아휴... 그 남자랑 너랑 토크 비율이 몇 대 몇이었어? 대 5? 대 4? 대 3? 정확하게는 7.5 대 2.5? 그게 대화야? 강의지 아, 몰라... 그럼 중간에 침묵이 흐르는데 어쩌라고","en":"-He was easy to talk to. -Gosh. How much did you talk and how much did he talk? /50? /40? /30? /25, to be exact. That's not a conversation. It's a lecture.\nWhat was I supposed to do? I had to fill the silence.","text":"- Bọn tớ nói chuyện rất hợp rơ. - Trời.\nCậu nói mấy phần và cậu ấy nói mấy phần?\n/50?\n/40?\n/30?\nChính xác là 75/25.\nĐấy là trò chuyện hả? Rõ ràng là giảng đạo.\nVậy tớ phải làm sao? Tớ chỉ cố phá vỡ khoảng lặng thôi.\n얘기도 잘 통하고 아휴... 그 남자랑 너랑 토크 비율이 몇 대 몇이었어? 대 5? 대 4? 대 3? 정확하게는 7.5 대 2.5? 그게 대화야? 강의지 아, 몰라... 그럼 중간에 침묵이 흐르는데 어쩌라고\n-He was easy to talk to. -Gosh. How much did you talk and how much did he talk? /50? /40? /30? /25, to be exact. That's not a conversation. It's a lecture.\nWhat was I supposed to do? I had to fill the silence.","sourceUid":"merged-mrm8vd56-230","sourceNo":691},{"id":175,"readerNo":176,"displayNo":702,"n":702,"type":"narration","vi":"Nếu ngừng nói còn sượng hơn.\nTớ không hiểu tại sao mọi người chịu được sự im lặng đó.\nTrời ạ.\nTại sao anh ấy không gọi lại?","ko":"말 끊기면 얼마나 어색한데\n아휴... 남들은 그 침묵을 어떻게 견디나 몰라\n에이씨...\n아유!\n아니 왜 연락을 안 해?","en":"Once there's a silence, it gets so awkward.\nI don't know how people put up with that silence.\nJeez.\nWhy doesn't he get back to me?","text":"Nếu ngừng nói còn sượng hơn.\nTớ không hiểu tại sao mọi người chịu được sự im lặng đó.\nTrời ạ.\nTại sao anh ấy không gọi lại?\n말 끊기면 얼마나 어색한데\n아휴... 남들은 그 침묵을 어떻게 견디나 몰라\n에이씨...\n아유!\n아니 왜 연락을 안 해?\nOnce there's a silence, it gets so awkward.\nI don't know how people put up with that silence.\nJeez.\nWhy doesn't he get back to me?","sourceUid":"merged-mrm8y57n-238","sourceNo":702},{"id":176,"readerNo":177,"displayNo":707,"n":707,"type":"narration","vi":"Sinh viên gì bận dữ vậy? Anh ấy còn chẳng học.\nAnh ấy có thời gian với bạn bè nhưng không rảnh trò chuyện với tớ.\nCậu biết điều tớ ghét nhất là gì không?\nLà ký hiệu \"chưa đọc\" đáng ghét ấy.","ko":"학생이 뭐가 그렇게 바빠? 공부도 안 하면서 친구들이랑 놀 시간은 있고 나한테 연락할 시간은 없다 이거지... 치! 내가 제일 싫어하는 숫자가 뭔지 알아?\n이야. 1... 지긋지긋한 1","en":"Why would a student be so busy? He doesn't even study.\nHe has time to be with his friends, but he has no time to talk to me.\nDo you know what I hate the most?\nThe \"unread\" sign.","text":"Sinh viên gì bận dữ vậy? Anh ấy còn chẳng học.\nAnh ấy có thời gian với bạn bè nhưng không rảnh trò chuyện với tớ.\nCậu biết điều tớ ghét nhất là gì không?\nLà ký hiệu \"chưa đọc\" đáng ghét ấy.\n학생이 뭐가 그렇게 바빠? 공부도 안 하면서 친구들이랑 놀 시간은 있고 나한테 연락할 시간은 없다 이거지... 치! 내가 제일 싫어하는 숫자가 뭔지 알아?\n이야. 1... 지긋지긋한 1\nWhy would a student be so busy? He doesn't even study.\nHe has time to be with his friends, but he has no time to talk to me.\nDo you know what I hate the most?\nThe \"unread\" sign.","sourceUid":"merged-mrm943u5-242","sourceNo":707},{"id":177,"readerNo":178,"displayNo":497,"n":497,"type":"narration","vi":"- Sao? - Tên khốn.\nNgón tay gãy rồi hay sao mà không gọi lại?\nLúc anh ta theo đuổi tớ,\nsáng trưa chiều tối anh ấy đều bám lấy tớ.\nTình yêu ấy đã nhạt phai.\nChắc chắn anh ta có mối mới.","ko":"왜?\n망할 놈의 시키\n손가락이 부러졌나 왜 연락을 안 해!\n나 좋다고 쫓아 다닐 땐 아침, 점심, 저녁\n밥 먹었어? 뭐 먹었어?\n꼭꼭 씹어 먹었어? 잘도 물어보더니...\n맘이 식었어\n딴 년 생긴 게야","en":"-What? -That bastard. Are his fingers broken? Why can't he contact me? When he was into me, he wanted to be with me all day long. He's not into me any more, he has someone else.","text":"- Sao? - Tên khốn.\nNgón tay gãy rồi hay sao mà không gọi lại?\nLúc anh ta theo đuổi tớ,\nsáng trưa chiều tối anh ấy đều bám lấy tớ.\nTình yêu ấy đã nhạt phai.\nChắc chắn anh ta có mối mới.\n왜?\n망할 놈의 시키\n손가락이 부러졌나 왜 연락을 안 해!\n나 좋다고 쫓아 다닐 땐 아침, 점심, 저녁\n밥 먹었어? 뭐 먹었어?\n꼭꼭 씹어 먹었어? 잘도 물어보더니...\n맘이 식었어\n딴 년 생긴 게야\n-What? -That bastard. Are his fingers broken? Why can't he contact me? When he was into me, he wanted to be with me all day long. He's not into me any more, he has someone else.","sourceUid":"merged-mrm95q25-243","sourceNo":497},{"id":178,"readerNo":179,"displayNo":501,"n":501,"type":"narration","vi":"Bao giờ tớ mới được nói những câu này?\nChẳng qua cậu không biết thôi.\nCậu đơn độc nhất khi có biển người vây quanh.\nVà thấy trống trải nhất khi sống trong sự sung túc.\nCậu vẫn cô đơn kể cả khi có bồ…","ko":"난 언제 이런 말 해보나?\n아휴, 네가 뭘 몰라서 그래\n고독 중의 고독은 군중 속의 고독이고\n빈곤 중의 빈곤은 풍요 속의 빈곤이고\n애인이 있는데도 외로운...","en":"When will I ever get to say that? You just don't know. You're loneliest when you have people. You feel lacking when you have things. You're lonely when you have a boyfriend...","text":"Bao giờ tớ mới được nói những câu này?\nChẳng qua cậu không biết thôi.\nCậu đơn độc nhất khi có biển người vây quanh.\nVà thấy trống trải nhất khi sống trong sự sung túc.\nCậu vẫn cô đơn kể cả khi có bồ…\n난 언제 이런 말 해보나?\n아휴, 네가 뭘 몰라서 그래\n고독 중의 고독은 군중 속의 고독이고\n빈곤 중의 빈곤은 풍요 속의 빈곤이고\n애인이 있는데도 외로운...\nWhen will I ever get to say that? You just don't know. You're loneliest when you have people. You feel lacking when you have things. You're lonely when you have a boyfriend...","sourceUid":"merged-mrm98lou-246","sourceNo":501},{"id":179,"readerNo":180,"displayNo":719,"n":719,"type":"narration","vi":"[Thở dài]\n[cười]","ko":"[한숨 쉰다]\n[피식 웃는다]","en":"[Sighs]\n[laughter]","text":"[Thở dài]\n[cười]\n[한숨 쉰다]\n[피식 웃는다]\n[Sighs]\n[laughter]","sourceUid":"merged-mrm98p2b-247","sourceNo":719},{"id":180,"readerNo":181,"displayNo":725,"n":725,"type":"narration","vi":"[Thở dài]\n[Báo động văn bản]","ko":"[한숨 쉰다]\n[문자 알람]","en":"[Sighs]\n[Text Alarm]","text":"[Thở dài]\n[Báo động văn bản]\n[한숨 쉰다]\n[문자 알람]\n[Sighs]\n[Text Alarm]","sourceUid":"merged-mrm9apfx-249","sourceNo":725},{"id":181,"readerNo":182,"displayNo":727,"n":727,"type":"narration","vi":"","ko":"[문자 알람]","en":"","text":"[문자 알람]","sourceUid":"ko-mrli6nmw-1462","sourceNo":727},{"id":182,"readerNo":183,"displayNo":729,"n":729,"type":"narration","vi":"Anh đang ở Hongdae. Em qua đây không?\nMà thôi. Có vẻ mọi người sắp giải tán rồi. Để lần sau nhé.","ko":"홍대 앞인데, 올래?\n안 되겠다. 파장 분위기다\n다음에 보자","en":"I'm at Hongdae. Do you want to come?\nIt looks like everyone's leaving, let's get together next time.","text":"Anh đang ở Hongdae. Em qua đây không?\nMà thôi. Có vẻ mọi người sắp giải tán rồi. Để lần sau nhé.\n홍대 앞인데, 올래?\n안 되겠다. 파장 분위기다\n다음에 보자\nI'm at Hongdae. Do you want to come?\nIt looks like everyone's leaving, let's get together next time.","sourceUid":"merged-mrm9b2ky-250","sourceNo":729},{"id":183,"readerNo":184,"displayNo":732,"n":732,"type":"narration","vi":"Cái gì? Anh chỉ biết làm theo ý anh thôi. Em bực rồi.\nVừa hay.\n- Em mệt rồi. - Em là con sen chờ anh sai việc à?","ko":"뭐야? 이랬다저랬다 자기 마음대로야. 진짜 짜증 나\n잘됐네, 나도 피곤했는데\n내가 노예야? 대기조야?","en":"What? You do whatever you want. It's really annoying.\nGood.\n- I was tired. -You think I wait around for you?","text":"Cái gì? Anh chỉ biết làm theo ý anh thôi. Em bực rồi.\nVừa hay.\n- Em mệt rồi. - Em là con sen chờ anh sai việc à?\n뭐야? 이랬다저랬다 자기 마음대로야. 진짜 짜증 나\n잘됐네, 나도 피곤했는데\n내가 노예야? 대기조야?\nWhat? You do whatever you want. It's really annoying.\nGood.\n- I was tired. -You think I wait around for you?","sourceUid":"merged-mrm9dkuj-254","sourceNo":732},{"id":184,"readerNo":185,"displayNo":738,"n":738,"type":"narration","vi":"Giữa đêm mà anh gọi thì em vẫn phải cun cút mò đến à?\nAnh rước thẻ của anh về đi. Em không dùng đâu.\nThôi đi. Đấy là vấn đề của anh.\nEm không thể ra ngoài. Không đi đâu.\nCúp đi. Em không nói lâu được.\nEm đi ngủ đây. Đừng gọi em.","ko":"오빠가 오라고 하면 한밤중에라도 뛰쳐나가야 돼? 그럴 거면 카드 가져가 오빠 카드 안 써 아 됐어. 그건 오빠 사정이고...\n난 못 나가. 안 나가!\n끊어. 나 지금 통화 길게 못 해\n잘 거니까, 연락하지 마!","en":"Do I have to run out to see you whenever you call?\nThen take the credit card, I don't want to use it.\nNo, that's your problem.\nI can't go. I won't.\nI have to go.\nI'm going to bed. Don't call me.","text":"Giữa đêm mà anh gọi thì em vẫn phải cun cút mò đến à?\nAnh rước thẻ của anh về đi. Em không dùng đâu.\nThôi đi. Đấy là vấn đề của anh.\nEm không thể ra ngoài. Không đi đâu.\nCúp đi. Em không nói lâu được.\nEm đi ngủ đây. Đừng gọi em.\n오빠가 오라고 하면 한밤중에라도 뛰쳐나가야 돼? 그럴 거면 카드 가져가 오빠 카드 안 써 아 됐어. 그건 오빠 사정이고...\n난 못 나가. 안 나가!\n끊어. 나 지금 통화 길게 못 해\n잘 거니까, 연락하지 마!\nDo I have to run out to see you whenever you call?\nThen take the credit card, I don't want to use it.\nNo, that's your problem.\nI can't go. I won't.\nI have to go.\nI'm going to bed. Don't call me.","sourceUid":"merged-mrm9j0fw-261","sourceNo":738},{"id":185,"readerNo":186,"displayNo":747,"n":747,"type":"narration","vi":"Cúp rồi mà.\nEm chẳng nói gì cả.\nEm không ra ngoài à?\nĐây là cốc của em.\nChị xin lỗi.\n- Xin lỗi là xong à? Bẩn thỉu. - Cái gì?\nAi biết chị dùng cái miệng đó để làm những gì chứ?","ko":"끊었잖아\n누가 뭐래?\n나가는 거 아니었어?\n이거 내 컵이야\n미안하다...\n미안하면 다야, 더럽게...\n뭐?\n그 입술로 뭔 짓을 했는지 알게 뭐야?","en":"I hung up.\nI didn't say anything.\nWeren't you leaving?\nThis is mine.\nI'm sorry.\n-That doesn't make it okay. It's dirty. -What did you say?\nWho knows what you've been doing with those lips?","text":"Cúp rồi mà.\nEm chẳng nói gì cả.\nEm không ra ngoài à?\nĐây là cốc của em.\nChị xin lỗi.\n- Xin lỗi là xong à? Bẩn thỉu. - Cái gì?\nAi biết chị dùng cái miệng đó để làm những gì chứ?\n끊었잖아\n누가 뭐래?\n나가는 거 아니었어?\n이거 내 컵이야\n미안하다...\n미안하면 다야, 더럽게...\n뭐?\n그 입술로 뭔 짓을 했는지 알게 뭐야?\nI hung up.\nI didn't say anything.\nWeren't you leaving?\nThis is mine.\nI'm sorry.\n-That doesn't make it okay. It's dirty. -What did you say?\nWho knows what you've been doing with those lips?","sourceUid":"merged-mrm9lwt5-271","sourceNo":747},{"id":186,"readerNo":187,"displayNo":752,"n":752,"type":"narration","vi":"Bẩn thỉu ư?\nMiệng chị bẩn thỉu?\nỪ đấy. Bẩn lắm.\nChắc hẳn chị đã hôn đủ chỗ bằng cặp môi đó rồi.\nVậy cơ à?","ko":"더러워?\n내 입이 더러워?\n그래, 더러워\n그 입술로 온갖 데 여기저기 부비고 다녔을 거 아니야\n아, 그래?","en":"Dirty?\nMy mouth is dirty?\nYes, it is.\nYou must have kissed a lot of things with those lips.\nOh, really?","text":"Bẩn thỉu ư?\nMiệng chị bẩn thỉu?\nỪ đấy. Bẩn lắm.\nChắc hẳn chị đã hôn đủ chỗ bằng cặp môi đó rồi.\nVậy cơ à?\n더러워?\n내 입이 더러워?\n그래, 더러워\n그 입술로 온갖 데 여기저기 부비고 다녔을 거 아니야\n아, 그래?\nDirty?\nMy mouth is dirty?\nYes, it is.\nYou must have kissed a lot of things with those lips.\nOh, really?","sourceUid":"merged-mrm9o1xt-276","sourceNo":752},{"id":187,"readerNo":188,"displayNo":754,"n":754,"type":"narration","vi":"[Nhạc nền tâm linh bắt đầu]\n[Tiếng thở nặng nhọc]","ko":"[싸이키 배경 음악 시작]\n[가쁜 호흡 소리]","en":"[Psychic background music starts]\n[Sound of heavy breathing]","text":"[Nhạc nền tâm linh bắt đầu]\n[Tiếng thở nặng nhọc]\n[싸이키 배경 음악 시작]\n[가쁜 호흡 소리]\n[Psychic background music starts]\n[Sound of heavy breathing]","sourceUid":"merged-mrm9ot7b-277","sourceNo":754},{"id":188,"readerNo":189,"displayNo":757,"n":757,"type":"narration","vi":"Theo dõi xem miệng em có thối rữa không nhé.\nĐồ thần kinh chập mạch kia!\nChị chết với tôi, đồ đê tiện!","ko":"썩나 안 썩나 잘 살펴봐라! 아침저녁으로\n야! 미친년아!\n죽여버릴라 이 거지 같은 게, 아아!\n지금 뭐 하는 짓이야!\n으아아아악!\n아이!","en":"Watch very carefully if your lips rot or not. You crazy bitch! I'm going to kill you!","text":"Theo dõi xem miệng em có thối rữa không nhé.\nĐồ thần kinh chập mạch kia!\nChị chết với tôi, đồ đê tiện!\n썩나 안 썩나 잘 살펴봐라! 아침저녁으로\n야! 미친년아!\n죽여버릴라 이 거지 같은 게, 아아!\n지금 뭐 하는 짓이야!\n으아아아악!\n아이!\nWatch very carefully if your lips rot or not. You crazy bitch! I'm going to kill you!","sourceUid":"merged-mrm9sjc9-281","sourceNo":757},{"id":189,"readerNo":190,"displayNo":534,"n":534,"type":"narration","vi":"Chị ta hôn em á? Chị ta điên nặng lắm rồi. - Hai người có đá lưỡi không? - Anh! Được rồi. Em nín đi nào. Chị ta điên đến mức nào chứ? Anh tế chị ta một trận nhé?","ko":"(고두영) 키스했다고?\n완전 미친년이야\n그럼 혀도 넣었어?\n오빠아아!\n알았어, 알았어. 그만 울어\n야, 뭐 그딴 애가 다 있냐?\n어떻게... 오빠가 가서 혼내줄까?","en":"She kissed you?\nShe's a total psycho.\n-Were there tongues involved? -Hey!\nFine. Stop crying.\nHow crazy is she?\nDo you want me to go yell at her?","text":"Chị ta hôn em á? Chị ta điên nặng lắm rồi. - Hai người có đá lưỡi không? - Anh! Được rồi. Em nín đi nào. Chị ta điên đến mức nào chứ? Anh tế chị ta một trận nhé?\n(고두영) 키스했다고?\n완전 미친년이야\n그럼 혀도 넣었어?\n오빠아아!\n알았어, 알았어. 그만 울어\n야, 뭐 그딴 애가 다 있냐?\n어떻게... 오빠가 가서 혼내줄까?\nShe kissed you?\nShe's a total psycho.\n-Were there tongues involved? -Hey!\nFine. Stop crying.\nHow crazy is she?\nDo you want me to go yell at her?","sourceUid":"merged-mrm9xwvl-291","sourceNo":534},{"id":190,"readerNo":191,"displayNo":764,"n":764,"type":"narration","vi":"[la hét]\n[Khóc]\n[Nhạc nền tâm linh kết thúc]","ko":"[소리를 지른다]\n[운다]\n[싸이키 배경 음악 끝]","en":"[screams]\n[Crying]\n[Psychic background music ends]","text":"[la hét]\n[Khóc]\n[Nhạc nền tâm linh kết thúc]\n[소리를 지른다]\n[운다]\n[싸이키 배경 음악 끝]\n[screams]\n[Crying]\n[Psychic background music ends]","sourceUid":"merged-mrm9twao-285","sourceNo":764},{"id":191,"readerNo":192,"displayNo":766,"n":766,"type":"narration","vi":"","ko":"(송지원) 괜찮아... 응?\n[운다]","en":"","text":"(송지원) 괜찮아... 응?\n[운다]","sourceUid":"merged-mrm9w3vc-287","sourceNo":766},{"id":192,"readerNo":193,"displayNo":777,"n":777,"type":"narration","vi":"[nhạc jazz bắt đầu]","ko":"[재즈 음악 시작]","en":"[jazz music starts]","text":"[nhạc jazz bắt đầu]\n[재즈 음악 시작]\n[jazz music starts]","sourceUid":"ko-mrli6nmx-1512","sourceNo":777},{"id":193,"readerNo":194,"displayNo":545,"n":545,"type":"narration","vi":"Lúc nào cũng chị chị em em ngọt xớt\nnhưng tôi biết thừa là nó dè bỉu tôi.\nSao thế?\nChú cũng nghĩ là tôi bị điên à?\nCô bị trầy ở đây này.","ko":"겉으로는 언니언니 하면서\n속으로는 삐쭉거리는 거 내가 모를 줄 알아요...\n왜요?\n아저씨도 내가 미친년 같아요?\n여기... 긁혔네","en":"She acts so friendly,\nbut I know she doesn't like me.\nWhat?\nDo you think I'm crazy too?\nYou got scratched.","text":"Lúc nào cũng chị chị em em ngọt xớt\nnhưng tôi biết thừa là nó dè bỉu tôi.\nSao thế?\nChú cũng nghĩ là tôi bị điên à?\nCô bị trầy ở đây này.\n겉으로는 언니언니 하면서\n속으로는 삐쭉거리는 거 내가 모를 줄 알아요...\n왜요?\n아저씨도 내가 미친년 같아요?\n여기... 긁혔네\nShe acts so friendly,\nbut I know she doesn't like me.\nWhat?\nDo you think I'm crazy too?\nYou got scratched.","sourceUid":"merged-mrmvbfa5-6","sourceNo":545},{"id":194,"readerNo":195,"displayNo":781,"n":781,"type":"narration","vi":"Không, em sẽ tự làm. Em sẽ không bỏ qua chuyện này đâu. Suýt nữa tôi đã giết người đấy. Nó là Đức Trinh nữ Maria chắc? Nó cũng vượt rào mà dám coi thường tôi. Ngay từ đầu con nhỏ đó đã ghét tôi rồi.","ko":"됐어, 내가 할 거야\n내가 아주 가만 안 둘 거야\n반 죽여 놓으려다가 참았어요\n제가 무슨 성처녀 마리아도 아니고\n할 거 다 하고 다니면서 날 무슨 벌레 보듯 보는데...\n아! 걔가요\n처음부터 날 싫어했어요","en":"No, I'll do it.\nI'm not going to let this slide.\nI almost killed that one.\nIs she Virgin Mary?\nShe's no virgin and looks at me like I'm a slut.\nShe never liked me from the beginning.","text":"Không, em sẽ tự làm. Em sẽ không bỏ qua chuyện này đâu. Suýt nữa tôi đã giết người đấy. Nó là Đức Trinh nữ Maria chắc? Nó cũng vượt rào mà dám coi thường tôi. Ngay từ đầu con nhỏ đó đã ghét tôi rồi.\n됐어, 내가 할 거야\n내가 아주 가만 안 둘 거야\n반 죽여 놓으려다가 참았어요\n제가 무슨 성처녀 마리아도 아니고\n할 거 다 하고 다니면서 날 무슨 벌레 보듯 보는데...\n아! 걔가요\n처음부터 날 싫어했어요\nNo, I'll do it.\nI'm not going to let this slide.\nI almost killed that one.\nIs she Virgin Mary?\nShe's no virgin and looks at me like I'm a slut.\nShe never liked me from the beginning.","sourceUid":"merged-mrma2wek-300","sourceNo":781},{"id":195,"readerNo":196,"displayNo":787,"n":787,"type":"narration","vi":"[Nhạc Jazz kết thúc]","ko":"[재즈 음악 끝]","en":"[Jazz music ends]","text":"[Nhạc Jazz kết thúc]\n[재즈 음악 끝]\n[Jazz music ends]","sourceUid":"ko-mrli6nmx-1522","sourceNo":787},{"id":196,"readerNo":197,"displayNo":796,"n":796,"type":"narration","vi":"Em thấy thế nào?\nĐẹp đấy.\nEm chỉ cần dọn vào ở thôi.\nPhòng này của ai?\nEm đừng hiểu lầm anh.\nKhi anh muốn đánh bài với bạn…\nNếu em không ưng thì anh đổi phòng cho.\nCảnh đẹp lắm. Nhất là cảnh đêm.","ko":"어때?\n좋네\n몸만 들어오면 돼\n누가 쓰던 거야?\n아, 오해하지 마\n가끔 친구들하고 포커치고 놀 때...\n찝찝하면 바꿔. 바꿔줄게\n뷰도 좋아\n밤 되면 야경도 볼 수 있어...","en":"What do you think? It's good. All you have to do is to move in. Whose room was it? Don't get me wrong. Whenever I want to play poker with some friends... You can change whatever you want to. The view is nice, too. Especially at night.","text":"Em thấy thế nào?\nĐẹp đấy.\nEm chỉ cần dọn vào ở thôi.\nPhòng này của ai?\nEm đừng hiểu lầm anh.\nKhi anh muốn đánh bài với bạn…\nNếu em không ưng thì anh đổi phòng cho.\nCảnh đẹp lắm. Nhất là cảnh đêm.\n어때?\n좋네\n몸만 들어오면 돼\n누가 쓰던 거야?\n아, 오해하지 마\n가끔 친구들하고 포커치고 놀 때...\n찝찝하면 바꿔. 바꿔줄게\n뷰도 좋아\n밤 되면 야경도 볼 수 있어...\nWhat do you think? It's good. All you have to do is to move in. Whose room was it? Don't get me wrong. Whenever I want to play poker with some friends... You can change whatever you want to. The view is nice, too. Especially at night.","sourceUid":"merged-mrmvfs8f-8","sourceNo":796},{"id":197,"readerNo":198,"displayNo":805,"n":805,"type":"narration","vi":"Em có thể uống rượu ở đây.\nChúng ta có thể gặp nhau bất kỳ lúc nào.\nCũng không cần để ý ánh mắt dò xét của người khác.\nCó lúc em không thể nghe máy,\nanh cũng không thể gọi thường xuyên.\nEm sẽ dọn về đây chứ?\nEm sẽ cân nhắc.\nEm suy nghĩ gì nữa?","ko":"여기서 와인도 마실 수 있고... 보고 싶을 땐 언제든 볼 수 있고... 지금은 그렇잖아 다른 사람들 눈치 보인다고 통화 안 될 때도 있고 연락 안 될 때는 너무 많고 이사 올 거지? 생각 좀 해 보고... 생각할 게 뭐 있어?","en":"You can have wine here. We can see each other whenever we want to. We don't have to care about other people this way. Sometimes you can't talk on the phone, I can't reach you too often. You'll move in, right? I'll think about it. What's there to think?","text":"Em có thể uống rượu ở đây.\nChúng ta có thể gặp nhau bất kỳ lúc nào.\nCũng không cần để ý ánh mắt dò xét của người khác.\nCó lúc em không thể nghe máy,\nanh cũng không thể gọi thường xuyên.\nEm sẽ dọn về đây chứ?\nEm sẽ cân nhắc.\nEm suy nghĩ gì nữa?\n여기서 와인도 마실 수 있고... 보고 싶을 땐 언제든 볼 수 있고... 지금은 그렇잖아 다른 사람들 눈치 보인다고 통화 안 될 때도 있고 연락 안 될 때는 너무 많고 이사 올 거지? 생각 좀 해 보고... 생각할 게 뭐 있어?\nYou can have wine here. We can see each other whenever we want to. We don't have to care about other people this way. Sometimes you can't talk on the phone, I can't reach you too often. You'll move in, right? I'll think about it. What's there to think?","sourceUid":"merged-mrmvi85h-9","sourceNo":805},{"id":198,"readerNo":199,"displayNo":809,"n":809,"type":"narration","vi":"Chúng ta có thể dùng đồ đôi tùy ý.\nGiống vợ chồng son vậy.\nNhưng chúng ta là giả.\nThật lòng với nhau là được mà.","ko":"여기서 둘이 알콩달콩\n커플 컵, 커플 베개, 커플 잠옷...\n응? 신혼부부처럼\n그렇지만 가짜잖아\n마음만 진짜면 되지","en":"We can be as couple-y as we want.\nJust like a newly-wed couple.\nBut it's not real.\nWe can be real in heart.","text":"Chúng ta có thể dùng đồ đôi tùy ý.\nGiống vợ chồng son vậy.\nNhưng chúng ta là giả.\nThật lòng với nhau là được mà.\n여기서 둘이 알콩달콩\n커플 컵, 커플 베개, 커플 잠옷...\n응? 신혼부부처럼\n그렇지만 가짜잖아\n마음만 진짜면 되지\nWe can be as couple-y as we want.\nJust like a newly-wed couple.\nBut it's not real.\nWe can be real in heart.","sourceUid":"merged-mrmvqv3n-13","sourceNo":809},{"id":199,"readerNo":200,"displayNo":813,"n":813,"type":"narration","vi":"Có cách để sống nhàn hạ mà.\nChị kiếm bồ đi.\nEm giới thiệu cho chị nhé?","ko":"쉽게 사는 방법도 있어...\n애인 하나 만들어...\n소개해줄까?","en":"There's an easy way too, you know.\nGet a boyfriend.\nWould you like me to get you one?","text":"Có cách để sống nhàn hạ mà.\nChị kiếm bồ đi.\nEm giới thiệu cho chị nhé?\n쉽게 사는 방법도 있어...\n애인 하나 만들어...\n소개해줄까?\nThere's an easy way too, you know.\nGet a boyfriend.\nWould you like me to get you one?","sourceUid":"merged-mrmvs1ka-14","sourceNo":813},{"id":200,"readerNo":201,"displayNo":818,"n":818,"type":"narration","vi":"[Âm nhạc cổ điển bắt đầu]\n[tiếng giày]","ko":"[클래식 음악 시작]\n[구두 소리]","en":"[Classical music starts]\n[shoe sound]","text":"[Âm nhạc cổ điển bắt đầu]\n[tiếng giày]\n[클래식 음악 시작]\n[구두 소리]\n[Classical music starts]\n[shoe sound]","sourceUid":"merged-mrmvuzp0-17","sourceNo":818},{"id":201,"readerNo":202,"displayNo":820,"n":820,"type":"narration","vi":"Thôi khỏi.\nEm đói bụng.\nĐược rồi.\nChúng tôi chọn bàn này.","ko":"됐어!\n나 배고파...\n응...\n이쪽으로\n저 여기 앉을게요","en":"I'm fine.\nI'm hungry.\nOkay.\nWe'll take this table.","text":"Thôi khỏi.\nEm đói bụng.\nĐược rồi.\nChúng tôi chọn bàn này.\n됐어!\n나 배고파...\n응...\n이쪽으로\n저 여기 앉을게요\nI'm fine.\nI'm hungry.\nOkay.\nWe'll take this table.","sourceUid":"merged-mrmvtawx-15","sourceNo":820},{"id":202,"readerNo":203,"displayNo":826,"n":826,"type":"narration","vi":"- Vẫn chưa dọn xong. - Tôi sẽ chờ.\nBàn kia cũng ổn mà.\nEm thích vị trí kia.\nChúng tôi sẽ chờ.\nVâng, mời quý khách đi lối này.","ko":"저, 아직 테이블 정리가... (강이나) 그럼 기다릴게요 (장선호) 왜? 저기도 좋은데 왜? 나 저 자리가 좋은데... (장선호) 기다립시다 (매니저) 알겠습니다 이쪽으로 가시죠","en":"-We're not done clearing. -We'll wait.\nThat table is fine, though.\nI like that one.\nWe'll wait.\nOf course. Right this way.","text":"- Vẫn chưa dọn xong. - Tôi sẽ chờ.\nBàn kia cũng ổn mà.\nEm thích vị trí kia.\nChúng tôi sẽ chờ.\nVâng, mời quý khách đi lối này.\n저, 아직 테이블 정리가... (강이나) 그럼 기다릴게요 (장선호) 왜? 저기도 좋은데 왜? 나 저 자리가 좋은데... (장선호) 기다립시다 (매니저) 알겠습니다 이쪽으로 가시죠\n-We're not done clearing. -We'll wait.\nThat table is fine, though.\nI like that one.\nWe'll wait.\nOf course. Right this way.","sourceUid":"merged-mrmvwhqx-20","sourceNo":826},{"id":203,"readerNo":204,"displayNo":831,"n":831,"type":"narration","vi":"- Đi thôi. - Sao cơ? Mời quý khách chọn món.","ko":"우리 이제 가요 응? 응 바로 주문 도와드리겠습니다","en":"-Let's go. -What?\nWe'll help you with your order right away.","text":"- Đi thôi. - Sao cơ? Mời quý khách chọn món.\n우리 이제 가요 응? 응 바로 주문 도와드리겠습니다\n-Let's go. -What?\nWe'll help you with your order right away.","sourceUid":"merged-mrmvxwac-21","sourceNo":831},{"id":204,"readerNo":205,"displayNo":832,"n":832,"type":"narration","vi":"[Tiếng rót rượu]","ko":"[와인 따르는 소리]","en":"[Sound of pouring wine]","text":"[Tiếng rót rượu]\n[와인 따르는 소리]\n[Sound of pouring wine]","sourceUid":"ko-mrli6nmx-1567","sourceNo":832},{"id":205,"readerNo":206,"displayNo":835,"n":835,"type":"narration","vi":"Em có thể mua giường và sofa thật à?\nTất nhiên rồi.\nEm được tiêu bao nhiêu?\nAnh không chắc.\n- Khoảng 20 triệu won? - Thật á?","ko":"나 침대랑 소파... 진짜 다시 사도 돼? 사! 사도 돼 얼마까지 쓸 수 있어? 글쎄... 천? 천!","en":"Can I really buy a new bed and sofa?\nOf course.\nHow much can I spend?\nI'm not sure.\n-20 million won? -Really?","text":"Em có thể mua giường và sofa thật à?\nTất nhiên rồi.\nEm được tiêu bao nhiêu?\nAnh không chắc.\n- Khoảng 20 triệu won? - Thật á?\n나 침대랑 소파... 진짜 다시 사도 돼? 사! 사도 돼 얼마까지 쓸 수 있어? 글쎄... 천? 천!\nCan I really buy a new bed and sofa?\nOf course.\nHow much can I spend?\nI'm not sure.\n-20 million won? -Really?","sourceUid":"merged-mrmw4p2k-27","sourceNo":835},{"id":206,"readerNo":207,"displayNo":843,"n":843,"type":"narration","vi":"Xin chào. Em lại đến rồi này.\nNgười quen của em à?\nBạn em sao?\nBạn bè gì. Bọn em thuê nhà chung.\nRa vậy.","ko":"안녕, 또 왔어\n아는 사이야?\n친구?\n친구는 무슨, 하우스 메이트예요\n아...","en":"Hi, I came back.\nDo you know her?\nA friend?\nOf course not. She's my house mate.\nI see.","text":"Xin chào. Em lại đến rồi này.\nNgười quen của em à?\nBạn em sao?\nBạn bè gì. Bọn em thuê nhà chung.\nRa vậy.\n안녕, 또 왔어\n아는 사이야?\n친구?\n친구는 무슨, 하우스 메이트예요\n아...\nHi, I came back.\nDo you know her?\nA friend?\nOf course not. She's my house mate.\nI see.","sourceUid":"merged-mrmw8saz-34","sourceNo":843},{"id":207,"readerNo":208,"displayNo":846,"n":846,"type":"narration","vi":"Chị ấy không được tỏ ra quen với khách nên anh cứ bơ đi.\nLát nhớ để lại tiền boa.","ko":"아는 척하면 안 된대요 그냥 모르는 척해요 이따가 팁이나 좀 놓고 가요","en":"She's not supposed to say anything, so pretend that I didn't tell you.\nJust leave her a tip later.","text":"Chị ấy không được tỏ ra quen với khách nên anh cứ bơ đi.\nLát nhớ để lại tiền boa.\n아는 척하면 안 된대요 그냥 모르는 척해요 이따가 팁이나 좀 놓고 가요\nShe's not supposed to say anything, so pretend that I didn't tell you.\nJust leave her a tip later.","sourceUid":"merged-mrmw9im5-35","sourceNo":846},{"id":208,"readerNo":209,"displayNo":854,"n":854,"type":"narration","vi":"Em ăn thử miếng này đi.\nNgon nhỉ?\nThật sự rất ngon luôn.\nKhông bị ngấy.\nBữa ăn rất ngon đấy.","ko":"먹어봐\n혀구이\n음!\n맛있지\n이게 식기 전에 먹으면 맛있더라고\n안 느끼하고\n잘 먹었어요","en":"Try this. Isn't it good? It's really good. It's not too rich. It was really nice.","text":"Em ăn thử miếng này đi.\nNgon nhỉ?\nThật sự rất ngon luôn.\nKhông bị ngấy.\nBữa ăn rất ngon đấy.\n먹어봐\n혀구이\n음!\n맛있지\n이게 식기 전에 먹으면 맛있더라고\n안 느끼하고\n잘 먹었어요\nTry this. Isn't it good? It's really good. It's not too rich. It was really nice.","sourceUid":"merged-mrmwcd7t-37","sourceNo":854},{"id":209,"readerNo":210,"displayNo":856,"n":856,"type":"narration","vi":"[Nhạc cổ điển kết thúc] [Tiếng mở cửa]","ko":"[클래식 음악 끝] [문 여는 소리]","en":"[Classical music ends] [Sound of door opening]","text":"[Nhạc cổ điển kết thúc] [Tiếng mở cửa]\n[클래식 음악 끝] [문 여는 소리]\n[Classical music ends] [Sound of door opening]","sourceUid":"merged-mrmwd0j8-38","sourceNo":856},{"id":210,"readerNo":211,"displayNo":860,"n":860,"type":"narration","vi":"Em có đang bận không?\nGiúp tôi một tay.\nVâng.\nHãy ngồi xuống kia.\nEm ăn đi.\nĐồ ngọt giúp giải tỏa tâm trạng.\nNhìn tôi mệt mỏi lắm à?\nTại sao hôm nay em đuối sức sớm vậy?","ko":"지금 안 바쁘죠?\n나 좀 도와줘요\n예...\n저기 앉아봐요\n먹어요\n힘들 때 단 거 먹으면 좀 풀리잖아요\n내가 그렇게 힘들어 보였어요?\n오늘은 왜 그렇게 일찍 지쳤어요?","en":"You're not busy, are you?\nHelp me with something.\nOkay.\nHave a seat over there.\nEat.\nDesserts always make things better.\nDid I look that tired?\nWhy did you get tired so fast today?","text":"Em có đang bận không?\nGiúp tôi một tay.\nVâng.\nHãy ngồi xuống kia.\nEm ăn đi.\nĐồ ngọt giúp giải tỏa tâm trạng.\nNhìn tôi mệt mỏi lắm à?\nTại sao hôm nay em đuối sức sớm vậy?\n지금 안 바쁘죠?\n나 좀 도와줘요\n예...\n저기 앉아봐요\n먹어요\n힘들 때 단 거 먹으면 좀 풀리잖아요\n내가 그렇게 힘들어 보였어요?\n오늘은 왜 그렇게 일찍 지쳤어요?\nYou're not busy, are you?\nHelp me with something.\nOkay.\nHave a seat over there.\nEat.\nDesserts always make things better.\nDid I look that tired?\nWhy did you get tired so fast today?","sourceUid":"merged-mrmwldum-45","sourceNo":860},{"id":211,"readerNo":212,"displayNo":872,"n":872,"type":"dialogue","vi":"Không biết nữa. Tại sao lại mệt vậy nhỉ?\nMới chỉ 9:00 tối thôi mà.\nTôi chưa thể mệt được.\nNhưng làm sao anh biết…\nrằng tôi đang mệt?\nEm sẽ nhận ra nếu em thích ai đó.","ko":"그러게요\n왜 이렇게 힘들죠?\n아직 아홉시밖에 안 됐는데...\n벌써 지치면 안 되는데...\n근데 어떻게 알았어요?\n내가 힘들다는 거?\n좋아하면 알게 돼요...","en":"I'm not sure. Why am I so tired?\nIt's only 9 p.m.\nI can't be tired already.\nBut how did you know...\nthat I was tired?\nYou notice these things when you like someone.","text":"Không biết nữa. Tại sao lại mệt vậy nhỉ?\nMới chỉ 9:00 tối thôi mà.\nTôi chưa thể mệt được.\nNhưng làm sao anh biết…\nrằng tôi đang mệt?\nEm sẽ nhận ra nếu em thích ai đó.\n그러게요\n왜 이렇게 힘들죠?\n아직 아홉시밖에 안 됐는데...\n벌써 지치면 안 되는데...\n근데 어떻게 알았어요?\n내가 힘들다는 거?\n좋아하면 알게 돼요...\nI'm not sure. Why am I so tired?\nIt's only 9 p.m.\nI can't be tired already.\nBut how did you know...\nthat I was tired?\nYou notice these things when you like someone.","sourceUid":"merged-mrmwnh1q-50","sourceNo":872},{"id":212,"readerNo":213,"displayNo":873,"n":873,"type":"narration","vi":"[Tiếng đóng cửa]\n[Nhạc chủ đề bắt đầu]","ko":"[문 닫는 소리]\n[테마 음악 시작]","en":"[Sound of door closing]\n[Theme music starts]","text":"[Tiếng đóng cửa]\n[Nhạc chủ đề bắt đầu]\n[문 닫는 소리]\n[테마 음악 시작]\n[Sound of door closing]\n[Theme music starts]","sourceUid":"merged-mrmwptoc-52","sourceNo":873},{"id":213,"readerNo":214,"displayNo":879,"n":879,"type":"narration","vi":"Em thấy sao? Ngon chứ?\nTôi mới làm đấy.\nChà.\nKhông ngờ em cũng biết đùa.\nTôi thật lòng mà.\nKem trứng hơi cháy,\nvà bột nhão nên vỏ bánh không giòn.","ko":"어때요? 맛있죠?\n아까 내가 만든 건데...\n와! 진명 씨 농담도 할 줄 아는구나...\n진짠데...\n코스코드크림이 너무 탔잖아요\n빵 반죽은 너무 질어서 바삭한 맛도 없고...","en":"It's good, isn't it? I made it earlier. Wow. I didn't know you could make jokes. I'm not joking. You burnt the cream too much, and the bread isn't crispy.","text":"Em thấy sao? Ngon chứ?\nTôi mới làm đấy.\nChà.\nKhông ngờ em cũng biết đùa.\nTôi thật lòng mà.\nKem trứng hơi cháy,\nvà bột nhão nên vỏ bánh không giòn.\n어때요? 맛있죠?\n아까 내가 만든 건데...\n와! 진명 씨 농담도 할 줄 아는구나...\n진짠데...\n코스코드크림이 너무 탔잖아요\n빵 반죽은 너무 질어서 바삭한 맛도 없고...\nIt's good, isn't it? I made it earlier. Wow. I didn't know you could make jokes. I'm not joking. You burnt the cream too much, and the bread isn't crispy.","sourceUid":"merged-mrmwqy2t-55","sourceNo":879},{"id":214,"readerNo":215,"displayNo":882,"n":882,"type":"narration","vi":"Em ăn đi. Ăn ngon miệng nhé. Vâng.","ko":"먹어요. 좀 쉬다 와요 네","en":"Eat.\nEnjoy your break.\nI will.","text":"Em ăn đi. Ăn ngon miệng nhé. Vâng.\n먹어요. 좀 쉬다 와요 네\nEat.\nEnjoy your break.\nI will.","sourceUid":"merged-mrmwrj1x-57","sourceNo":882},{"id":215,"readerNo":216,"displayNo":883,"n":883,"type":"narration","vi":"[Nhạc chủ đề kết thúc]","ko":"[테마 음악 끝]","en":"[Theme music ends]","text":"[Nhạc chủ đề kết thúc]\n[테마 음악 끝]\n[Theme music ends]","sourceUid":"ko-mrli6nmx-1618","sourceNo":883},{"id":216,"readerNo":217,"displayNo":888,"n":888,"type":"narration","vi":"Bác tài ơi, hãy dừng lại một chút. Chị lên xe đi. Khỏi đi. Chị vẫn còn một học kỳ nữa nhỉ? Ừ.","ko":"기사님, 잠깐만요...\n타\n됐어\n한 학기 남았다고 그랬나?\n어","en":"Sir, could you pull over for a second?\nGet in.\nI'm fine.\nDid you say you have one semester left?\nYes.","text":"Bác tài ơi, hãy dừng lại một chút. Chị lên xe đi. Khỏi đi. Chị vẫn còn một học kỳ nữa nhỉ? Ừ.\n기사님, 잠깐만요...\n타\n됐어\n한 학기 남았다고 그랬나?\n어\nSir, could you pull over for a second?\nGet in.\nI'm fine.\nDid you say you have one semester left?\nYes.","sourceUid":"merged-mrmwuhg4-60","sourceNo":888},{"id":217,"readerNo":218,"displayNo":892,"n":892,"type":"narration","vi":"Vậy cũng coi như sắp xong.\nChị muốn làm cho công ty nào?\nSamsung hay Hyundai?\nHyundai trả bao nhiêu? Hơn 50 triệu một năm?","ko":"고생 끝나겠네 제일 가고 싶은 회사가 어디야? 삼성? 현대? 그런 덴 연봉이 얼마야? 5천 넘어?","en":"You'll be done soon, then.\nWhere do you want to work the most?\nSamsung hay Hyundai?\nSamsung? Hyundai?\nHow much do they pay? Over 50 million?","text":"Vậy cũng coi như sắp xong.\nChị muốn làm cho công ty nào?\nSamsung hay Hyundai?\nHyundai trả bao nhiêu? Hơn 50 triệu một năm?\n고생 끝나겠네 제일 가고 싶은 회사가 어디야? 삼성? 현대? 그런 덴 연봉이 얼마야? 5천 넘어?\nYou'll be done soon, then.\nWhere do you want to work the most?\nSamsung hay Hyundai?\nSamsung? Hyundai?\nHow much do they pay? Over 50 million?","sourceUid":"merged-mrmx0yvi-66","sourceNo":892},{"id":218,"readerNo":219,"displayNo":895,"n":895,"type":"narration","vi":"Chị cắm đầu làm từ sáng đến đêm, và rồi họ cho chị về hưu non khi chị bước sang tuổi 40.","ko":"아침부터 밤중까지 일하고\n죽으라 일해도 마흔 넘으면 대부분 명퇴라며?","en":"You put up with long work hours, and then you get laid off when you turn 40?","text":"Chị cắm đầu làm từ sáng đến đêm, và rồi họ cho chị về hưu non khi chị bước sang tuổi 40.\n아침부터 밤중까지 일하고\n죽으라 일해도 마흔 넘으면 대부분 명퇴라며?\nYou put up with long work hours, and then you get laid off when you turn 40?","sourceUid":"merged-mrmx4itg-69","sourceNo":895},{"id":219,"readerNo":220,"displayNo":638,"n":638,"type":"narration","vi":"Chị sống rất chăm chỉ, đến mức em tự hỏi sao chị sống được như vậy. Em chỉ tò mò chị bán mạng như vậy chỉ để làm nhân viên văn phòng thôi sao.","ko":"윤 선배 보면 정말 열심히 사는데\n어떻게 저렇게 사나 싶을 정돈데...\n그렇게까지 열심히 해서 되고 싶은 게\n겨우 회사원인가 궁금해서...","en":"You really try hard,\nDo you like that?\nI do wonder how you do it.\nI just want to know if you work so hard for that sort of life.","text":"Chị sống rất chăm chỉ, đến mức em tự hỏi sao chị sống được như vậy. Em chỉ tò mò chị bán mạng như vậy chỉ để làm nhân viên văn phòng thôi sao.\n윤 선배 보면 정말 열심히 사는데\n어떻게 저렇게 사나 싶을 정돈데...\n그렇게까지 열심히 해서 되고 싶은 게\n겨우 회사원인가 궁금해서...\nYou really try hard,\nDo you like that?\nI do wonder how you do it.\nI just want to know if you work so hard for that sort of life.","sourceUid":"merged-mrmxedae-79","sourceNo":638},{"id":220,"readerNo":221,"displayNo":640,"n":640,"type":"narration","vi":"Em nói đúng.\nThỉnh thoảng chị cũng xấu hổ lắm.","ko":"","en":"Right.\nI get embarrassed sometimes.","text":"Em nói đúng.\nThỉnh thoảng chị cũng xấu hổ lắm.\nRight.\nI get embarrassed sometimes.","sourceUid":"merged-mrmx8adb-75","sourceNo":640},{"id":221,"readerNo":222,"displayNo":899,"n":899,"type":"narration","vi":"[Nhạc chủ đề yên tĩnh bắt đầu]","ko":"[조용한 테마 음악 시작]","en":"[Quiet theme music starts]","text":"[Nhạc chủ đề yên tĩnh bắt đầu]\n[조용한 테마 음악 시작]\n[Quiet theme music starts]","sourceUid":"ko-mrli6nmx-1634","sourceNo":899},{"id":222,"readerNo":223,"displayNo":900,"n":900,"type":"narration","vi":"Nịnh nọt cấp trên, và uống rượu dù bản thân không muốn. Chị thích điều đó sao? Chị muốn sống như vậy à?","ko":"상사한테 아부하고\n먹기 싫어도 술 마시고...\n그게 좋아?\n그렇게 살고 싶어?","en":"Kissing your boss' butt, and drinking even when you don't want to. Is that the life you want?","text":"Nịnh nọt cấp trên, và uống rượu dù bản thân không muốn. Chị thích điều đó sao? Chị muốn sống như vậy à?\n상사한테 아부하고\n먹기 싫어도 술 마시고...\n그게 좋아?\n그렇게 살고 싶어?\nKissing your boss' butt, and drinking even when you don't want to. Is that the life you want?","sourceUid":"merged-mrmx70jt-74","sourceNo":900},{"id":223,"readerNo":224,"displayNo":646,"n":646,"type":"narration","vi":"Em kể về chị với anh ấy và anh ấy muốn đóng tiền học cho chị.","ko":"윤 선배 얘기했더니 등록금 내줄까 그러던데...","en":"I told him about you and he wanted to pay for your tuition.","text":"Em kể về chị với anh ấy và anh ấy muốn đóng tiền học cho chị.\n윤 선배 얘기했더니 등록금 내줄까 그러던데...\nI told him about you and he wanted to pay for your tuition.","sourceUid":"merged-mrmxhq1a-87","sourceNo":646},{"id":224,"readerNo":225,"displayNo":906,"n":906,"type":"narration","vi":"Giá mà ước mơ của chị là phi hành gia hay tổng thư ký Liên Hợp Quốc.","ko":"그치?\n나도 가끔 쪽팔려\n내 꿈이 우주비행사나 유엔 사무총장쯤이면 좋을 텐데...","en":"I wish my dream was to be an astronaut or UN secretary-general.","text":"Giá mà ước mơ của chị là phi hành gia hay tổng thư ký Liên Hợp Quốc.\n그치?\n나도 가끔 쪽팔려\n내 꿈이 우주비행사나 유엔 사무총장쯤이면 좋을 텐데...\nI wish my dream was to be an astronaut or UN secretary-general.","sourceUid":"merged-mrmxfkfk-83","sourceNo":906},{"id":225,"readerNo":226,"displayNo":910,"n":910,"type":"narration","vi":"Chị nhận được tiền boa chưa? Rồi. Khá nhiều. Không đưa lộn đâu ha? Số tiền đó chẳng là gì với họ.","ko":"참, 팁 받았어?\n응, 많이 놨더라\n잘못 놓은 거 아니지?\n그 정도는 아무 것도 아니야 그 사람들한테는...","en":"Did you get the tip?\nYes, that was a lot.\nThat wasn't a mistake, was it?\nThat's nothing for them.","text":"Chị nhận được tiền boa chưa? Rồi. Khá nhiều. Không đưa lộn đâu ha? Số tiền đó chẳng là gì với họ.\n참, 팁 받았어?\n응, 많이 놨더라\n잘못 놓은 거 아니지?\n그 정도는 아무 것도 아니야 그 사람들한테는...\nDid you get the tip?\nYes, that was a lot.\nThat wasn't a mistake, was it?\nThat's nothing for them.","sourceUid":"merged-mrmxgucp-84","sourceNo":910},{"id":226,"readerNo":227,"displayNo":916,"n":916,"type":"narration","vi":"Em bảo anh ấy nhé?\nTại sao?\nSao trăng gì? Em không muốn chị khổ như vậy.\nKhông cần đâu.","ko":"어때, 말해볼까? 왜? 왜긴 왜야? 윤 선배 고생하는 게 마음 아파서지 됐어","en":"Do you want me to talk to him?\nWhy?\nWhat do you mean? I don't want you to work that hard.\nI'm fine.","text":"Em bảo anh ấy nhé?\nTại sao?\nSao trăng gì? Em không muốn chị khổ như vậy.\nKhông cần đâu.\n어때, 말해볼까? 왜? 왜긴 왜야? 윤 선배 고생하는 게 마음 아파서지 됐어\nDo you want me to talk to him?\nWhy?\nWhat do you mean? I don't want you to work that hard.\nI'm fine.","sourceUid":"merged-mrmxjsxg-89","sourceNo":916},{"id":227,"readerNo":228,"displayNo":919,"n":919,"type":"narration","vi":"Em không bảo chị làm bạn gái của ai đó.\nChị hãy coi đó là học bổng.","ko":"애인 되라는 것도 아닌데?\n그냥 장학금이라고 생각해","en":"I'm not asking you to be anyone's girlfriend.\nThink of it as a scholarship.","text":"Em không bảo chị làm bạn gái của ai đó.\nChị hãy coi đó là học bổng.\n애인 되라는 것도 아닌데?\n그냥 장학금이라고 생각해\nI'm not asking you to be anyone's girlfriend.\nThink of it as a scholarship.","sourceUid":"merged-mrmxlw7q-92","sourceNo":919},{"id":228,"readerNo":229,"displayNo":921,"n":921,"type":"narration","vi":"Vậy thì hãy làm theo đúng trình tự.\nChị thật là khó chiều.\nChị sinh ra đã vậy rồi.\nChị ghét em đúng không?\nCòn em?","ko":"그럼 정식으로 절차 밟아서 줘 선배 참 답답하다 답답해도 할 수 없어\n윤 선밴 내가 싫지?\n그러는 넌","en":"Then make it a real scholarship.\nYou're so frustrating.\nThat's how I am.\nYou don't like me, do you?\nWhat about you?","text":"Vậy thì hãy làm theo đúng trình tự.\nChị thật là khó chiều.\nChị sinh ra đã vậy rồi.\nChị ghét em đúng không?\nCòn em?\n그럼 정식으로 절차 밟아서 줘 선배 참 답답하다 답답해도 할 수 없어\n윤 선밴 내가 싫지?\n그러는 넌\nThen make it a real scholarship.\nYou're so frustrating.\nThat's how I am.\nYou don't like me, do you?\nWhat about you?","sourceUid":"merged-mrmxnsjb-94","sourceNo":921},{"id":229,"readerNo":230,"displayNo":926,"n":926,"type":"narration","vi":"Vì sao em ghét chị?\nEm ghét chị…\nhay ghét sự nghèo khổ của chị?","ko":"넌 내가 왜 싫은 거냐? 넌... 내가 싫은 거냐? 내 가난이 싫은 거냐?","en":"Why do you not like me?\nDo you hate me...\nor my lack or money?","text":"Vì sao em ghét chị?\nEm ghét chị…\nhay ghét sự nghèo khổ của chị?\n넌 내가 왜 싫은 거냐? 넌... 내가 싫은 거냐? 내 가난이 싫은 거냐?\nWhy do you not like me?\nDo you hate me...\nor my lack or money?","sourceUid":"merged-mrmxotg0-95","sourceNo":926},{"id":230,"readerNo":231,"displayNo":930,"n":930,"type":"narration","vi":"Em ghét chị vì đố kỵ với chị.\nTuy chị nghèo, cộc cằn và gầy như bộ xương khô,\nnhưng chị lại biến em thành kẻ tầm thường.","ko":"부러워서 싫어\n가난하고 괴팍하고 깡마르고\n볼품도 없으면서 날 초라하게 만들어서 싫어\n질투 나게 만들어서 싫어","en":"I hate you because I'm jealous of you.\nAlthough you're poor, mean and skinny,\nyou make me feel small somehow.","text":"Em ghét chị vì đố kỵ với chị.\nTuy chị nghèo, cộc cằn và gầy như bộ xương khô,\nnhưng chị lại biến em thành kẻ tầm thường.\n부러워서 싫어\n가난하고 괴팍하고 깡마르고\n볼품도 없으면서 날 초라하게 만들어서 싫어\n질투 나게 만들어서 싫어\nI hate you because I'm jealous of you.\nAlthough you're poor, mean and skinny,\nyou make me feel small somehow.","sourceUid":"merged-mrmxqykw-100","sourceNo":930},{"id":231,"readerNo":232,"displayNo":672,"n":672,"type":"narration","vi":"Không quan trọng chị ta là sinh viên hay không.\nTrọng tâm vấn đề là chị ta lừa bọn mình hơn hai năm trời.","ko":"중요한 건 우리한테 거짓말했다는 거야\n그것도 2년 넘게 감쪽같이","en":"Whether she's a student or not isn't important,\nwhat's important is that she lied to us over two years.","text":"Không quan trọng chị ta là sinh viên hay không.\nTrọng tâm vấn đề là chị ta lừa bọn mình hơn hai năm trời.\n중요한 건 우리한테 거짓말했다는 거야\n그것도 2년 넘게 감쪽같이\nWhether she's a student or not isn't important,\nwhat's important is that she lied to us over two years.","sourceUid":"merged-mrmxyt27-111","sourceNo":672},{"id":232,"readerNo":233,"displayNo":934,"n":934,"type":"narration","vi":"Em ghét chị làm em đố kỵ với chị.\nEm muốn sống giống chị nhưng không thể.\nEm chỉ biết đố kỵ với chị thôi.\nVậy nên em mới bốc mùi.","ko":"너처럼 되고 싶은데 너처럼 될 수 없으니까\n미워하는 수밖에 없어\n그래서 냄새가 나는 거야\n내 질투에서는 썩은 냄새가 나","en":"I hate you because you make me jealous. I want to be like you but I can't. I can only hate you. That's why it smells.","text":"Em ghét chị làm em đố kỵ với chị.\nEm muốn sống giống chị nhưng không thể.\nEm chỉ biết đố kỵ với chị thôi.\nVậy nên em mới bốc mùi.\n너처럼 되고 싶은데 너처럼 될 수 없으니까\n미워하는 수밖에 없어\n그래서 냄새가 나는 거야\n내 질투에서는 썩은 냄새가 나\nI hate you because you make me jealous. I want to be like you but I can't. I can only hate you. That's why it smells.","sourceUid":"merged-mrmxtata-105","sourceNo":934},{"id":233,"readerNo":234,"displayNo":935,"n":935,"type":"narration","vi":"[Nhạc chủ đề yên tĩnh kết thúc]","ko":"[조용한 테마 음악 끝]","en":"[Quiet theme music ends]","text":"[Nhạc chủ đề yên tĩnh kết thúc]\n[조용한 테마 음악 끝]\n[Quiet theme music ends]","sourceUid":"ko-mrli6nmx-1670","sourceNo":935},{"id":234,"readerNo":235,"displayNo":938,"n":938,"type":"narration","vi":"Mùi thối rữa từ lòng đố kỵ.\nNhưng nội quy nhà này không nói chỉ sinh viên mới được thuê nhà.\nKhông có điều đó.","ko":"그렇지만 여기 규칙 중에 대학생만 입주 가능하다 그런 건 없잖아 학생이냐 아니냐가 중요한 게 아니잖아","en":"My jealousy stinks.\nBut it's not like this house is for college students.\nThat's not the rule.","text":"Mùi thối rữa từ lòng đố kỵ.\nNhưng nội quy nhà này không nói chỉ sinh viên mới được thuê nhà.\nKhông có điều đó.\n그렇지만 여기 규칙 중에 대학생만 입주 가능하다 그런 건 없잖아 학생이냐 아니냐가 중요한 게 아니잖아\nMy jealousy stinks.\nBut it's not like this house is for college students.\nThat's not the rule.","sourceUid":"merged-mrmxvieg-110","sourceNo":938},{"id":235,"readerNo":236,"displayNo":945,"n":945,"type":"narration","vi":"Cũng đâu đến nỗi. Những lời nói dối đó không gây hại cho ai.\nSao lại không?","ko":"그래서? \n그것도 애매하지\n강 언니 거짓말에 피해 본 사람이 있는 것도 아니고\n왜 없어?","en":"Well, no one got hurt because of her lie. What do you mean? Có tớ đây.","text":"Cũng đâu đến nỗi. Những lời nói dối đó không gây hại cho ai.\nSao lại không?\n그래서? \n그것도 애매하지\n강 언니 거짓말에 피해 본 사람이 있는 것도 아니고\n왜 없어?\nWell, no one got hurt because of her lie. What do you mean? Có tớ đây.","sourceUid":"merged-mrmy04i4-115","sourceNo":945},{"id":236,"readerNo":237,"displayNo":685,"n":685,"type":"narration","vi":"Trái tim bao dung như biển rộng.\nXã hội chúng ta bao dung với gái bán dâm từ khi nào vậy?","ko":"아주 포용력이 엄청나\n언제부터 우리 사회가 매춘에 이렇게 관대했대?","en":"Extremely accepting.\nSince when has our society been so forgiving towards prostitution?","text":"Trái tim bao dung như biển rộng.\nXã hội chúng ta bao dung với gái bán dâm từ khi nào vậy?\n아주 포용력이 엄청나\n언제부터 우리 사회가 매춘에 이렇게 관대했대?\nExtremely accepting.\nSince when has our society been so forgiving towards prostitution?","sourceUid":"merged-mrmy95io-127","sourceNo":685},{"id":237,"readerNo":238,"displayNo":952,"n":952,"type":"narration","vi":"Hai người phản đối sao? \nKhông đuổi chị ta đi hả? Tớ không nói thế… Còn em thế nào? Em á? Em mới dọn vào không lâu.","ko":"난 봤어 반대야? 강이나 내보내지 마? 난... 딱히 그런 건 아닌데... 넌? 넌 어쩔 건데? 저요? 저는... 들어온 지 얼마 되지도 않았고...","en":"I did.\nSo you vote no?\nLet's not kick her out?\nI wouldn't say that either...\nWhat about you?\nMe?\nI didn't really live here for a long time.","text":"Hai người phản đối sao? \nKhông đuổi chị ta đi hả? Tớ không nói thế… Còn em thế nào? Em á? Em mới dọn vào không lâu.\n난 봤어 반대야? 강이나 내보내지 마? 난... 딱히 그런 건 아닌데... 넌? 넌 어쩔 건데? 저요? 저는... 들어온 지 얼마 되지도 않았고...\nI did.\nSo you vote no?\nLet's not kick her out?\nI wouldn't say that either...\nWhat about you?\nMe?\nI didn't really live here for a long time.","sourceUid":"merged-mrmy4pqv-120","sourceNo":952},{"id":238,"readerNo":239,"displayNo":957,"n":957,"type":"narration","vi":"Liên quan gì đâu? Em nói suy nghĩ của mình đi.\nEm bỏ phiếu trắng.\nHai người độ lượng quá rồi.","ko":"그게 뭔 상관이야 그냥 네 의견만 말해\n저는...\n기권할래요\n와...\n너희 진짜 관대하다, 어?","en":"What does that matter? Just tell me what you think.\nI'd like to abstain.\nYou're all so generous.","text":"Liên quan gì đâu? Em nói suy nghĩ của mình đi.\nEm bỏ phiếu trắng.\nHai người độ lượng quá rồi.\n그게 뭔 상관이야 그냥 네 의견만 말해\n저는...\n기권할래요\n와...\n너희 진짜 관대하다, 어?\nWhat does that matter? Just tell me what you think.\nI'd like to abstain.\nYou're all so generous.","sourceUid":"merged-mrmy7kco-122","sourceNo":957},{"id":239,"readerNo":240,"displayNo":962,"n":962,"type":"narration","vi":"Chị ta bán dâm đấy. Hạng người bán thân nuôi miệng.\nChúng ta sống với kẻ như vậy đó. Hai người chấp nhận à?","ko":"강이나 창녀야. 몸 파는 여자!\n그런 여자랑 한집에서 사는 거야\n그게 괜찮아?","en":"She's a prostitute, she sells herself for money,\nand we live with her, are you okay with that?","text":"Chị ta bán dâm đấy. Hạng người bán thân nuôi miệng.\nChúng ta sống với kẻ như vậy đó. Hai người chấp nhận à?\n강이나 창녀야. 몸 파는 여자!\n그런 여자랑 한집에서 사는 거야\n그게 괜찮아?\nShe's a prostitute, she sells herself for money,\nand we live with her, are you okay with that?","sourceUid":"merged-mrmy9wyn-128","sourceNo":962},{"id":240,"readerNo":241,"displayNo":964,"n":964,"type":"narration","vi":"Ai biết chuyện gì sẽ xảy ra? Lỡ đàn ông mò vào đây thì sao? Hay vợ người ta đến làm loạn thì sao?","ko":"무슨 일이 생길지 어떻게 알아?\n남자가 쳐들어올지 본부인이 쳐들어와 깽판 놓을지...","en":"How do you know what's going to happen?\nWhat if a man breaks in? Or a wife comes to make a scene?","text":"Ai biết chuyện gì sẽ xảy ra? Lỡ đàn ông mò vào đây thì sao? Hay vợ người ta đến làm loạn thì sao?\n무슨 일이 생길지 어떻게 알아?\n남자가 쳐들어올지 본부인이 쳐들어와 깽판 놓을지...\nHow do you know what's going to happen?\nWhat if a man breaks in? Or a wife comes to make a scene?","sourceUid":"merged-mrmybfl4-131","sourceNo":964},{"id":241,"readerNo":242,"displayNo":968,"n":968,"type":"narration","vi":"Còn nữa. Nếu bố mẹ các cậu phát hiện ra thì sao?\nTiền bối Yoon, chị định thế nào?","ko":"그리고 당장 너희 부모님이 알아봐\n가만있겠어?\n윤 선배? 윤 선배는 어떡할 거야?","en":"And would your parents be fine if they find out?\nJin-Myung, what are you going to do?","text":"Còn nữa. Nếu bố mẹ các cậu phát hiện ra thì sao?\nTiền bối Yoon, chị định thế nào?\n그리고 당장 너희 부모님이 알아봐\n가만있겠어?\n윤 선배? 윤 선배는 어떡할 거야?\nAnd would your parents be fine if they find out?\nJin-Myung, what are you going to do?","sourceUid":"merged-mrmycoym-134","sourceNo":968},{"id":242,"readerNo":243,"displayNo":970,"n":970,"type":"narration","vi":"Bọn em đang bàn xem có đuổi Kang Yi Na không.\nHai vị thánh sống này chẳng thèm quan tâm.","ko":"지금 강이나 내보내느냐 마냐 의논 중인데...\n뭐 이 사람들은 워낙 대인배들이라 별로 상관없나 봐","en":"We're discussing if we're going to kick Yi-Na out.\nThese two are so forgiving and don't seem to care,","text":"Bọn em đang bàn xem có đuổi Kang Yi Na không.\nHai vị thánh sống này chẳng thèm quan tâm.\n지금 강이나 내보내느냐 마냐 의논 중인데...\n뭐 이 사람들은 워낙 대인배들이라 별로 상관없나 봐\nWe're discussing if we're going to kick Yi-Na out.\nThese two are so forgiving and don't seem to care,","sourceUid":"merged-mrmydreu-136","sourceNo":970},{"id":243,"readerNo":244,"displayNo":972,"n":972,"type":"narration","vi":"Nhưng em không chịu được.\nNếu Kang Yi Na sống ở đây thì em sẽ đi.","ko":"근데… 난 그렇게는 못 하겠어 강이나가 이 집에 살면 내가 나갈 거니까...","en":"but I'm not okay with this.\nIf she stays, I'm going to move out.","text":"Nhưng em không chịu được.\nNếu Kang Yi Na sống ở đây thì em sẽ đi.\n근데… 난 그렇게는 못 하겠어 강이나가 이 집에 살면 내가 나갈 거니까...\nbut I'm not okay with this.\nIf she stays, I'm going to move out.","sourceUid":"merged-mrmyejhb-137","sourceNo":972},{"id":244,"readerNo":245,"displayNo":975,"n":975,"type":"narration","vi":"Không cần làm vậy. Chị sẽ dọn đi. Vậy là vừa lòng em nhỉ?","ko":"그럴 필요 없어\n내가 나갈 거니까. 그럼 됐지?","en":"That won't be necessary.\nI'm moving out. Satisfied?","text":"Không cần làm vậy. Chị sẽ dọn đi. Vậy là vừa lòng em nhỉ?\n그럴 필요 없어\n내가 나갈 거니까. 그럼 됐지?\nThat won't be necessary.\nI'm moving out. Satisfied?","sourceUid":"merged-mrmyerl4-138","sourceNo":975},{"id":245,"readerNo":246,"displayNo":981,"n":981,"type":"narration","vi":"[Tiếng đóng cửa]\n[Tiếng cửa bíp]\n[âm nhạc chủ đề kỳ lạ bắt đầu]\n[Bật đèn]\n[Tắt đèn]\n[Thở dài]","ko":"[문 닫는 소리] [삑삑 문 소리] [음산한 테마 음악 시작] [불을 켠다] [불을 끈다] [한숨 쉰다]","en":"[Sound of door closing]\n[Sound of door beeping]\n[eerie theme music starts]\n[Turn on the light]\n[Turn off the light]\n[Sighs]","text":"[Tiếng đóng cửa]\n[Tiế  Too ordinary.","text":"Tên bạn là…\nGì cơ?\nTạm biệt.\nMời bạn.\nQuá bình thường.\n이름이...\n네?\n가세요\n드세요\n너무 평범해\nWhat's your name? Pardon me? Bye. Have some. Too ordinary.","sourceUid":"merged-mrmymc7b-147","sourceNo":996},{"id":251,"readerNo":252,"displayNo":1002,"n":1002,"type":"narration","vi":"Cũng phải có lúc này lúc kia, thỉnh thoảng nói dối,\nrồi sống náo nhiệt lên tí.\nXin lỗi.\nSao tìm người ở cùng lại khó thế này?","ko":"들쑥날쑥하고\n거짓말도 좀 할 것 같고\n인생이 좀 말이야... 응?\n다이나믹하게...\n미안\n이렇게 하메 구하기가 힘드냐?","en":"You have to be unpredictable, you need to lie a bit.\nLife has to be dynamic.\nSorry.\nWhy is it so hard to find a house mate?","text":"Cũng phải có lúc này lúc kia, thỉnh thoảng nói dối,\nrồi sống náo nhiệt lên tí.\nXin lỗi.\nSao tìm người ở cùng lại khó thế này?\n들쑥날쑥하고\n거짓말도 좀 할 것 같고\n인생이 좀 말이야... 응?\n다이나믹하게...\n미안\n이렇게 하메 구하기가 힘드냐?\nYou have to be unpredictable, you need to lie a bit.\nLife has to be dynamic.\nSorry.\nWhy is it so hard to find a house mate?","sourceUid":"merged-mrmys4ta-153","sourceNo":1002},{"id":252,"readerNo":253,"displayNo":1007,"n":1007,"type":"narration","vi":"- Song. - Dạ?\nAnh đừng có đối tốt với tôi.\nĐang đối tốt mà dừng lại thì chỉ càng mệt mỏi thôi.","ko":"음... 예! 송? 나한테 잘해주지 마요 잘해주다 그만두면 더 힘들어져요","en":"-Ji-Won. -Yes?\nDon't be nice to me.\nIt makes it harder when you stop being nice to me.","text":"- Song. - Dạ?\nAnh đừng có đối tốt với tôi.\nĐang đối tốt mà dừng lại thì chỉ càng mệt mỏi thôi.\n음... 예! 송? 나한테 잘해주지 마요 잘해주다 그만두면 더 힘들어져요\n-Ji-Won. -Yes?\nDon't be nice to me.\nIt makes it harder when you stop being nice to me.","sourceUid":"merged-mrmyv2zj-161","sourceNo":1007},{"id":253,"readerNo":254,"displayNo":1011,"n":1011,"type":"narration","vi":"[Nhạc chủ đề kết thúc]\n[Nhạc hỏi đáp bắt đầu]","ko":"[엔딩 테마 음악 끝]\n[질의·응답 음악 시작]","en":"[Ending theme music ends]\n[Question and answer music starts]","text":"[Nhạc chủ đề kết thúc]\n[Nhạc hỏi đáp bắt đầu]\n[엔딩 테마 음악 끝]\n[질의·응답 음악 시작]\n[Ending theme music ends]\n[Question and answer music starts]","sourceUid":"merged-mrmyx5kx-167","sourceNo":1011},{"id":254,"readerNo":255,"displayNo":1012,"n":1012,"type":"narration","vi":"Cứ đối tốt mãi là được mà.\nVậy cũng được chứ?","ko":"계속 잘해주면 되지 않나? 잘해줘도 되죠?","en":"Then I won't stop.\nIs that okay?\nHow many boyfriends do you currently have?","text":"Cứ đối tốt mãi là được mà.\nVậy cũng được chứ?\n계속 잘해주면 되지 않나? 잘해줘도 되죠?\nThen I won't stop.\nIs that okay?\nHow many boyfriends do you currently have?","sourceUid":"merged-mrmywpp5-165","sourceNo":1012},{"id":255,"readerNo":256,"displayNo":1014,"n":1014,"type":"narration","vi":"BẠN ĐANG CÓ BAO NHIÊU NGƯỜI YÊU? BẠN KIẾM ĐƯỢC BAO NHIÊU VÀ TIÊU BAO NHIÊU MỖI THÁNG? BẠN ĐỐ KỴ VỚI JIN MYUNG, ĐIỀU GÌ KHIẾN BẠN NHƯ VẬY?\nMọi người thấy rồi đó.\nTôi không rõ nữa. Khoảng tám triệu won? Tôi chưa từng tính qua.\nChị ấy chăm chỉ sống. Câu hỏi kiểu gì vậy?\nCẢM NHẬN VỀ NỤ HÔN GÂY SỐC CỦA BẠN VÀ YE EUN?\nCÓ NGƯỜI BẢO LÀ QUẤY RỐI TÌNH DỤC\nBẠN NHẬN THỨC ĐƯỢC SỰ QUYẾN RŨ CỦA BẢN THÂN KHÔNG?\nCHIẾC VÒNG TAY MANG Ý NGHĨA GÌ?","ko":"봐서 알지 않나? 대략은 모르겠어요 백 정도? 딱히 계산해본 적은 없어요\n무식하게 열심히 사는 거...\n무슨 질문이 그래요?","en":"You saw it. How much do you make? I'm not sure. About eight million won? I've never thought about it. You are jealous of Jin-Myung. What about her makes you jealous? She just tries so hard. Your kiss was shocking. How did it feel? What kind of question is that? Some call it sexual harassment.","text":"BẠN ĐANG CÓ BAO NHIÊU NGƯỜI YÊU? BẠN KIẾM ĐƯỢC BAO NHIÊU VÀ TIÊU BAO NHIÊU MỖI THÁNG? BẠN ĐỐ KỴ VỚI JIN MYUNG, ĐIỀU GÌ KHIẾN BẠN NHƯ VẬY?\nMọi người thấy rồi đó.\nTôi không rõ nữa. Khoảng tám triệu won? Tôi chưa từng tính qua.\nChị ấy chăm chỉ sống. Câu hỏi kiểu gì vậy?\nCẢM NHẬN VỀ NỤ HÔN GÂY SỐC CỦA BẠN VÀ YE EUN?\nCÓ NGƯỜI BẢO LÀ QUẤY RỐI TÌNH DỤC\nBẠN NHẬN THỨC ĐƯỢC SỰ QUYẾN RŨ CỦA BẢN THÂN KHÔNG?\nCHIẾC VÒNG TAY MANG Ý NGHĨA GÌ?\n봐서 알지 않나? 대략은 모르겠어요 백 정도? 딱히 계산해본 적은 없어요\n무식하게 열심히 사는 거...\n무슨 질문이 그래요?\nYou saw it. How much do you make? I'm not sure. About eight million won? I've never thought about it. You are jealous of Jin-Myung. What about her makes you jealous? She just tries so hard. Your kiss was shocking. How did it feel? What kind of question is that? Some call it sexual harassment.","sourceUid":"merged-mrmz629n-184","sourceNo":1014},{"id":256,"readerNo":257,"displayNo":731,"n":731,"type":"narration","vi":"Bùa may mắn.","ko":"부적...","en":"It's my lucky charm.","text":"Bùa may mắn.\n부적...\nIt's my lucky charm.","sourceUid":"merged-mrmz2vmo-181","sourceNo":731},{"id":257,"readerNo":258,"displayNo":1019,"n":1019,"type":"narration","vi":"Em ấy có thể kiện tôi. Tôi soi gương mỗi ngày. Tôi thích đường cong từ eo đến mông của mình.","ko":"고소하든가...\n매일 거울은 보니까...\n허리에서 엉덩이까지 내려가는 라인...","en":"She can sue me. Are you aware of that you're sexy? I do look in the mirror every day. I like my waist line the best. What does the bracelet mean?","text":"Em ấy có thể kiện tôi. Tôi soi gương mỗi ngày. Tôi thích đường cong từ eo đến mông của mình.\n고소하든가...\n매일 거울은 보니까...\n허리에서 엉덩이까지 내려가는 라인...\nShe can sue me. Are you aware of that you're sexy? I do look in the mirror every day. I like my waist line the best. What does the bracelet mean?","sourceUid":"merged-mrmz1zt5-178","sourceNo":1019},{"id":258,"readerNo":259,"displayNo":732,"n":732,"type":"dialogue","vi":"Biên dịch: Nguyễn Thị Huyền","ko":"","en":"Translated by: Eydie Lee","text":"Biên dịch: Nguyễn Thị Huyền\nTranslated by: Eydie Lee","sourceUid":"merged-mrmz23q9-179","sourceNo":732},{"id":259,"readerNo":260,"displayNo":1022,"n":1022,"type":"narration","vi":"[Nhạc hỏi đáp kết thúc]\n[Nhạc chủ đề chính bắt đầu]","ko":"[질의·응답 음악 끝]\n[메인 주제 음악 시작]","en":"[Q&A music ends] [Main theme music starts]","text":"[Nhạc hỏi đáp kết thúc]\n[Nhạc chủ đề chính bắt đầu]\n[질의·응답 음악 끝]\n[메인 주제 음악 시작]\n[Q&A music ends] [Main theme music starts]","sourceUid":"merged-mrmz27jt-180","sourceNo":1022}],"types":{"0":"narration","1":"narration","2":"narration","3":"narration","4":"narration","5":"narration","6": function waitMedia(a,timeout=5000){return new Promise(res=>{if(a.readyState>=1)return res(true);let done=false;let ok=()=>{if(done)return;done=true;clean();res(true)};let bad=()=>{if(done)return;done=true;clean();res(false)};let clean=()=>{a.removeEventListener('loadedmetadata',ok);a.removeEventListener('canplay',ok);a.removeEventListener('error',bad);clearTimeout(to)};a.addEventListener('loadedmetadata',ok,{once:true});a.addEventListener('canplay',ok,{once:true});a.addEventListener('error',bad,{once:true});let to=setTimeout(bad,timeout)})}
async function prepareEngine(kind,start=0){let src=await tryLoadCandidate(kind);if(!src)throw new Error('Không load được audio '+kind.toUpperCase()+'. Kiểm tra folder audio/tên file trên GitHub, hoặc chọn file thủ công. Bấm Audio paths để xem đường dẫn đang thử.');if(engine.src!==src){engine.pause();engine.src=src;engine.load();}let ok=await waitMedia(engine,8000);if(!ok)throw new Error('Không load được audio '+kind.toUpperCase()+'. File có thể chưa tải xong trên GitHub Pages, thử chờ vài giây rồi bấm lại.');applyEngineVolume(kind);try{engine.currentTime=Math.max(0,Number(start||0));}catch(e){}return engine}
async function unlockAudio(show=true){try{let src=await tryLoadCandidate('vi'); if(!src) src=await tryLoadCandidate('ko'); if(!src){if(show)alert('Chưa tìm thấy audio VI/KO. Kiểm tra thư mục audio hoặc chọn file MP3 thủ công.');return false}if(engine.src!==src){engine.src=src;engine.load();await waitMedia(engine,8000)}let oldVol=engine.volume;engine.volume=0.001;try{engine.currentTime=Math.min(0.05,Math.max(0,engine.currentTime||0));}catch(e){}await engine.play();engine.pause();engine.volume=oldVol||1;applyEngineVolume(engineKind||'vi');unlocked=true;setMsg('Đã unlock audio cho iPhone. Bây giờ bấm Smart Flow hoặc VI/KO.');return true}catch(e){unlocked=false;if(show)alert('iPhone chưa cho phát audio. Hãy bấm Unlock iPhone Audio một lần nữa.\n'+(e&&e.message?e.message:e));return false}}

function render(){let q=($('q').value||'').toLowerCase(),h='';blocks.forEach((b,i)=>{if(q&&!blockSearchText(b).includes(q))return;let L=split(b),vr=vi[String(b.id)],kr=ko[String(b.id)];let time=(vr?'<span class="timeBadge">VI '+fmt(vr.start)+'→'+fmt(vr.end)+'</span>':'<span class="badge no">No VI</span>')+' '+(kr?'<span class="timeBadge">KO '+fmt(kr.start)+'→'+fmt(kr.end)+'</span>':'<span class="badge no">No KO</span>');let cls=(i===cur?'active ':'')+(String(b.type||'').toLowerCase().includes('narr')?'narr':'');h+='<div class="seg '+cls+'" onclick="cur='+i+';render();side()"><div class="meta"><span>Cue #'+label(b,i)+'</span><span>'+time+'</span></div><div class="badges">'+(L.vi?'<span class="badge vi">VI</span>':'')+(L.ko?'<span class="badge ko">KO</span>':'')+(L.en?'<span class="badge">EN</span>':'')+'</div>'+langHtml(L)+'<div class="row" style="margin-top:8px"><button class="good" onclick="event.stopPropagation();cur='+i+';playCurrent(\'vi\')">VI Dub</button><button class="violet" onclick="event.stopPropagation();cur='+i+';playCurrent(\'ko\')">KO Live</button><button class="warn" onclick="event.stopPropagation();cur='+i+';smart()">Smart</button></div></div>'});$('list').innerHTML=h;$('stat').textContent=blocks.length+' blocks · current Cue #'+label(blocks[cur]||{},cur)+(isIOS()?' · iPhone mode: dùng 1 audio engine':'');side()}
function side(){let L=split(blocks[cur]||{});$('vip').textContent=L.vi;$('kop').textContent=L.ko}

function play(kind,i=cur,token=++tok){return new Promise(async res=>{let r=getRange(kind,i);if(!r)return res();try{let a=await prepareEngine(kind,r.start);let end=Number(r.end||0);let done=false;let cleanup=()=>{a.removeEventListener('timeupdate',check);a.removeEventListener('ended',ended);a.removeEventListener('error',errored)};let finish=()=>{if(done)return;done=true;cleanup();a.pause();res()};let check=()=>{if(done)return;if(token!==tok||!flow&&token!==tok)return finish();if(a.currentTime>=end-0.03)finish()};let ended=()=>finish();let errored=()=>finish();a.addEventListener('timeupdate',check);a.addEventListener('ended',ended,{once:true});a.addEventListener('error',errored,{once:true});setMsg(`Đang phát ${kind.toUpperCase()} Cue #${label(blocks[i]||{},i)} ${fmt(r.start)} → ${fmt(r.end)}`);try{await a.play();}catch(e){cleanup();if(isIOS()&&!unlocked){alert('iPhone cần unlock audio trước. Bấm Unlock iPhone Audio rồi thử lại.')}else{alert('Không phát được audio: '+(e&&e.message?e.message:e));}return res()}setTimeout(check,80)}catch(e){alert(e.message||e);res()}})}
function playCurrent(k){stopAll(false);tok++;play(k,cur,tok)}
function sequenceFor(mode){if(mode==='vi')return['vi'];if(mode==='ko')return['ko'];if(mode==='vi-ko-vi')return['vi','ko','vi'];return['vi','ko']}
async function smart(){let token=++tok;flow=true;if(isIOS()&&!unlocked){let ok=await unlockAudio(false);if(!ok){alert('Trên iPhone, hãy bấm Unlock iPhone Audio trước, sau đó bấm Smart Flow.');flow=false;return}}let mode=$('mode').value, seq=sequenceFor(mode);for(let i=cur;i<blocks.length&&token===tok&&flow;i++){cur=i;render();document.querySelector('.seg.active')?.scrollIntoView({block:'center'});for(const k of seq){if(token!==tok||!flow)break;await play(k,i,token)}}if(token===tok)setMsg('Smart Flow đã dừng/kết thúc')}
function stopAll(inc=true){if(inc)tok++;flow=false;via.pause();koa.pause();engine.pause();setMsg('Đã stop')}
function next(){cur=Math.min(blocks.length-1,cur+1);render()}function prev(){cur=Math.max(0,cur-1);render()}
$('viaf').onchange=e=>{let f=e.target.files[0];if(f){via.src=URL.createObjectURL(f);applyVisibleVolume('vi');if(!engine.src){engine.src=via.src;engineKind='vi';applyEngineVolume('vi')}unlocked=false;setMsg('Đã chọn VI audio. Nếu dùng iPhone, bấm Unlock.')}};
$('koaf').onchange=e=>{let f=e.target.files[0];if(f){koa.src=URL.createObjectURL(f);applyVisibleVolume('ko');unlocked=false;setMsg('Đã chọn KO audio. Nếu dùng iPhone, bấm Unlock.')}};
function tryAuto(){let vu=candidateUrls('vi')[0], ku=candidateUrls('ko')[0]; if(vu)via.src=vu; if(ku)koa.src=ku; applyVisibleVolume('vi');applyVisibleVolume('ko'); try{via.load();koa.load();}catch(e){} setMsg('Đã khai báo audio từ GitHub. Nếu iPhone chưa nghe, chờ vài giây rồi bấm Unlock/Smart Flow.')}initReaderVolumeControls();tryAuto();
(function addIphoneButtons(){let row=document.querySelector('.float .row');if(row){let b=document.createElement('button');b.textContent='Unlock iPhone Audio';b.className='warn';b.onclick=()=>unlockAudio(true);row.insertBefore(b,row.children[3]||null);let d=document.createElement('button');d.textContent='Audio paths';d.onclick=()=>showAudioPaths();row.appendChild(d);}})();
render();</script></body></html>
